name: Website CI

on:
  push:
    branches: [main]
    paths:
      - 'website/install.sh'
      - 'website/pipeline/**'
      - 'internal/dashboard/**'
      - 'scripts/check-pipeline-links.sh'
      - '.github/workflows/website-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'website/install.sh'
      - 'website/pipeline/**'
      - 'internal/dashboard/**'
      - 'scripts/check-pipeline-links.sh'
      - '.github/workflows/website-ci.yml'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Run ShellCheck
        run: shellcheck website/install.sh

  dashboard-tests:
    name: Dashboard Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Run dashboard tests
        run: go test -v ./internal/dashboard/

  pipeline-links:
    name: Pipeline Link Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Check pipeline cross-page links
        run: bash scripts/check-pipeline-links.sh

  install-linux:
    name: Install (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Run install script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash website/install.sh --no-modify-path

      - name: Verify env file created
        run: |
          test -f "$HOME/.tsuku/env"
          cat "$HOME/.tsuku/env"

      - name: Verify PATH setup works
        run: |
          source "$HOME/.tsuku/env"
          echo "PATH: $PATH"
          echo "TSUKU_HOME: $TSUKU_HOME"
          echo "$PATH" | grep -q "$HOME/.tsuku/bin" || (echo "bin not in PATH" && exit 1)
          echo "$PATH" | grep -q "$HOME/.tsuku/tools/current" || (echo "tools/current not in PATH" && exit 1)

      - name: Verify tsuku binary
        run: |
          source "$HOME/.tsuku/env"
          tsuku --version

  install-macos:
    name: Install (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Run install script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash website/install.sh --no-modify-path

      - name: Verify env file created
        run: |
          test -f "$HOME/.tsuku/env"
          cat "$HOME/.tsuku/env"

      - name: Verify PATH setup works
        run: |
          source "$HOME/.tsuku/env"
          echo "PATH: $PATH"
          echo "TSUKU_HOME: $TSUKU_HOME"
          echo "$PATH" | grep -q "$HOME/.tsuku/bin" || (echo "bin not in PATH" && exit 1)
          echo "$PATH" | grep -q "$HOME/.tsuku/tools/current" || (echo "tools/current not in PATH" && exit 1)

      - name: Verify tsuku binary
        run: |
          source "$HOME/.tsuku/env"
          tsuku --version
