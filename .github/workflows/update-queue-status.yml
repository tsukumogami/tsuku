name: Update Queue Status

on:
  push:
    branches: [main]
    paths:
      - 'recipes/**'
      - 'data/failures/**'

permissions:
  contents: write

concurrency:
  group: queue-operations-status-update
  cancel-in-progress: false

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v2
        with:
          app-id: ${{ secrets.TSUKU_BATCH_GENERATOR_APP_ID }}
          private-key: ${{ secrets.TSUKU_BATCH_GENERATOR_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Collect all recipes on disk
        id: detect
        run: |
          # Full scan: find ALL recipe files, not just the diff.
          # This makes the workflow idempotent -- if previous runs were
          # cancelled (GitHub replaces the pending run when a new push
          # arrives), the surviving run catches everything.
          RECIPES=$(find recipes -name '*.toml' -type f 2>/dev/null)

          if [ -z "$RECIPES" ]; then
            echo "No recipes found on disk"
            echo "has_recipes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RECIPE_COUNT=$(echo "$RECIPES" | wc -l)
          echo "Found $RECIPE_COUNT recipe files on disk"
          echo "has_recipes=true" >> "$GITHUB_OUTPUT"

      - name: Reconcile queue with recipes on disk
        if: steps.detect.outputs.has_recipes == 'true'
        run: |
          QUEUE_FILE="data/queues/priority-queue.json"

          if [ ! -f "$QUEUE_FILE" ]; then
            echo "Queue file not found at $QUEUE_FILE, nothing to update"
            exit 0
          fi

          # Build a JSON object mapping recipe name -> extracted source.
          # For each recipe, extract the source from its step actions.
          RECIPE_SOURCES_FILE=$(mktemp)
          echo "{" > "$RECIPE_SOURCES_FILE"
          FIRST=true

          for recipe_path in recipes/*/*.toml; do
            [ -f "$recipe_path" ] || continue
            recipe_name=$(basename "$recipe_path" .toml)

            # Extract source from recipe steps (same logic as before, but
            # we only need one source per recipe for the match check).
            SOURCE=""

            # github_archive / github_file
            if [ -z "$SOURCE" ]; then
              repo=$(grep -A5 'action\s*=\s*"github_archive"\|action\s*=\s*"github_file"' "$recipe_path" 2>/dev/null \
                | grep '^\s*repo\s*=' | head -1 \
                | sed 's/^[[:space:]]*repo[[:space:]]*=[[:space:]]*"//; s/"[[:space:]]*$//' || true)
              [ -n "$repo" ] && SOURCE="github:$repo"
            fi

            # cargo_install
            if [ -z "$SOURCE" ]; then
              crate=$(grep -A5 'action\s*=\s*"cargo_install"' "$recipe_path" 2>/dev/null \
                | grep '^\s*crate\s*=' | head -1 \
                | sed 's/^[[:space:]]*crate[[:space:]]*=[[:space:]]*"//; s/"[[:space:]]*$//' || true)
              [ -n "$crate" ] && SOURCE="cargo:$crate"
            fi

            # pipx_install
            if [ -z "$SOURCE" ]; then
              pkg=$(grep -A5 'action\s*=\s*"pipx_install"' "$recipe_path" 2>/dev/null \
                | grep '^\s*package\s*=' | head -1 \
                | sed 's/^[[:space:]]*package[[:space:]]*=[[:space:]]*"//; s/"[[:space:]]*$//' || true)
              [ -n "$pkg" ] && SOURCE="pypi:$pkg"
            fi

            # npm_install
            if [ -z "$SOURCE" ]; then
              pkg=$(grep -A5 'action\s*=\s*"npm_install"' "$recipe_path" 2>/dev/null \
                | grep '^\s*package\s*=' | head -1 \
                | sed 's/^[[:space:]]*package[[:space:]]*=[[:space:]]*"//; s/"[[:space:]]*$//' || true)
              [ -n "$pkg" ] && SOURCE="npm:$pkg"
            fi

            # gem_install
            if [ -z "$SOURCE" ]; then
              gem=$(grep -A5 'action\s*=\s*"gem_install"' "$recipe_path" 2>/dev/null \
                | grep '^\s*gem\s*=' | head -1 \
                | sed 's/^[[:space:]]*gem[[:space:]]*=[[:space:]]*"//; s/"[[:space:]]*$//' || true)
              [ -n "$gem" ] && SOURCE="rubygems:$gem"
            fi

            # homebrew / homebrew_bottle
            if [ -z "$SOURCE" ]; then
              formula=$(grep -A5 'action\s*=\s*"homebrew"\|action\s*=\s*"homebrew_bottle"' "$recipe_path" 2>/dev/null \
                | grep '^\s*formula\s*=' | head -1 \
                | sed 's/^[[:space:]]*formula[[:space:]]*=[[:space:]]*"//; s/"[[:space:]]*$//' || true)
              if [ -n "$formula" ]; then
                SOURCE="homebrew:$formula"
              elif grep -qE 'action\s*=\s*"(homebrew|homebrew_bottle)"' "$recipe_path" 2>/dev/null; then
                SOURCE="homebrew:$recipe_name"
              fi
            fi

            # Fall back to empty string if no source detected
            [ -z "$SOURCE" ] && SOURCE=""

            if [ "$FIRST" = "true" ]; then
              FIRST=false
            else
              echo "," >> "$RECIPE_SOURCES_FILE"
            fi
            # Use jq to safely encode the key/value
            printf '  %s: %s' \
              "$(echo "$recipe_name" | jq -R .)" \
              "$(echo "$SOURCE" | jq -R .)" >> "$RECIPE_SOURCES_FILE"
          done

          echo "" >> "$RECIPE_SOURCES_FILE"
          echo "}" >> "$RECIPE_SOURCES_FILE"

          # Validate the sources JSON
          if ! jq empty "$RECIPE_SOURCES_FILE" 2>/dev/null; then
            echo "::error::Failed to build recipe sources map"
            cat "$RECIPE_SOURCES_FILE"
            exit 1
          fi

          RECIPE_COUNT=$(jq 'length' "$RECIPE_SOURCES_FILE")
          echo "Built source map for $RECIPE_COUNT recipes"

          # Count entries that need updating before applying
          BEFORE_PENDING=$(jq '[.entries[] | select(.status != "success" and .status != "excluded")] | length' "$QUEUE_FILE")
          echo "Queue entries not yet success/excluded: $BEFORE_PENDING"

          # Single jq call: for each queue entry whose name matches a recipe
          # on disk and whose status is not already "success" or "excluded",
          # set status to "success". If the recipe source doesn't match the
          # queue source, also set confidence to "curated".
          jq --slurpfile sources "$RECIPE_SOURCES_FILE" '
            ($sources[0]) as $src_map |
            .entries |= map(
              if (.status != "success" and .status != "excluded") and ($src_map[.name] != null) then
                if .source == $src_map[.name] then
                  .status = "success"
                else
                  .status = "success" | .confidence = "curated"
                end
              else
                .
              end
            )
          ' "$QUEUE_FILE" > "${QUEUE_FILE}.tmp"

          # Validate before replacing
          if ! jq empty "${QUEUE_FILE}.tmp" 2>/dev/null; then
            echo "::error::Generated invalid JSON"
            rm -f "${QUEUE_FILE}.tmp"
            exit 1
          fi

          mv "${QUEUE_FILE}.tmp" "$QUEUE_FILE"
          rm -f "$RECIPE_SOURCES_FILE"

          AFTER_PENDING=$(jq '[.entries[] | select(.status != "success" and .status != "excluded")] | length' "$QUEUE_FILE")
          UPDATED=$((BEFORE_PENDING - AFTER_PENDING))
          echo "Updated $UPDATED queue entries to success"

          if [ "$UPDATED" -eq 0 ]; then
            echo "Queue already in sync, nothing to commit"
            echo "queue_updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "queue_updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.detect.outputs.has_recipes == 'true'
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version-file: go.mod

      - name: Build and run queue-maintain
        if: steps.detect.outputs.has_recipes == 'true'
        run: |
          go build -o queue-maintain ./cmd/queue-maintain
          ./queue-maintain

      - name: Commit and push changes
        if: steps.detect.outputs.has_recipes == 'true'
        run: |
          QUEUE_FILE="data/queues/priority-queue.json"

          git add "$QUEUE_FILE"
          if git diff --cached --quiet; then
            echo "No queue changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(batch): reconcile queue status with recipes on disk"

          for attempt in 1 2 3; do
            if [ "$attempt" -gt 1 ]; then
              echo "Push failed (attempt $((attempt-1))/3), retrying..."
              sleep $((2 ** attempt))
              git pull --rebase
            fi
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
          done
          echo "::error::Push failed after 3 attempts"
          exit 1
