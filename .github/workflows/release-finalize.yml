# Finalize Release -- step 3 of the release pipeline.
#
# Triggered automatically when release.yml (step 2) completes successfully.
# Delegates to shirabe's reusable finalize workflow, which:
#   1. Verifies at least 16 binary assets are present
#   2. Promotes the draft release to published
#   3. Runs .release/post-release.sh (generates unified checksums.txt)
#
# Expected assets (16 binaries):
#   4 Go (goreleaser)  +  4 Rust glibc  +  2 Rust musl  +  6 LLM
#
# Requires: RELEASE_PAT secret with release edit permission.

name: Finalize Release

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  extract-tag:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        run: echo "tag=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"

  finalize:
    needs: extract-tag
    uses: tsukumogami/shirabe/.github/workflows/finalize-release.yml@v0.3.0
    with:
      tag: ${{ needs.extract-tag.outputs.tag }}
      expected-assets: 16
    secrets:
      token: ${{ secrets.RELEASE_PAT }}
