name: Sandbox Tests

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'internal/recipe/recipes/**/*.toml'
      - 'test-matrix.json'
      - 'test/scripts/**'
      - '.github/workflows/sandbox-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'internal/recipe/recipes/**/*.toml'
      - 'test-matrix.json'
      - 'test/scripts/**'
      - '.github/workflows/sandbox-tests.yml'

jobs:
  matrix:
    name: Matrix
    runs-on: ubuntu-latest
    outputs:
      linux: ${{ steps.matrix.outputs.linux }}
      code-changed: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Detect if code files changed (vs docs-only changes)
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'internal/recipe/recipes/**/*.toml'
              - 'test-matrix.json'

      - name: Generate test matrix
        id: matrix
        run: |
          LINUX=$(jq -c '[.ci.linux[] as $id | {id: $id, tool: .tests[$id].tool, desc: .tests[$id].desc, recipe: .tests[$id].recipe}]' test-matrix.json)
          echo "linux=$LINUX" >> $GITHUB_OUTPUT

  sandbox-linux:
    name: "Linux Sandbox Tests"
    needs: matrix
    if: needs.matrix.outputs.code-changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Build tsuku
        run: CGO_ENABLED=0 go build -o tsuku ./cmd/tsuku

      - name: Run all sandbox tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Point registry to current branch so PR tests can access migrated recipes
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          FAILED=()
          TESTS='${{ needs.matrix.outputs.linux }}'

          while IFS= read -r item; do
            tool=$(echo "$item" | jq -r '.tool')
            desc=$(echo "$item" | jq -r '.desc')
            recipe=$(echo "$item" | jq -r '.recipe // empty')

            echo "::group::Testing $tool ($desc)"

            # Fresh TSUKU_HOME per test
            export TSUKU_HOME="${{ runner.temp }}/tsuku-sandbox-$tool"
            mkdir -p "$TSUKU_HOME"

            # Generate eval plan
            if [ -n "$recipe" ]; then
              ./tsuku eval --recipe "$recipe" --install-deps > plan.json
            else
              ./tsuku eval "$tool" --install-deps > plan.json
            fi

            # Run sandbox install
            if ! ./tsuku install --plan plan.json --sandbox --force; then
              FAILED+=("$tool")
            fi

            echo "::endgroup::"
          done < <(echo "$TESTS" | jq -c '.[]')

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed sandbox tests: ${FAILED[*]}"
            exit 1
          fi

          echo "All Linux sandbox tests passed"
