name: Deploy Recipes (Deprecated)

# DEPRECATED: registry.tsuku.dev is deprecated in favor of tsuku.dev/recipes.json
# This workflow is kept for backwards compatibility during the transition period.
# See issue #353 for context.
#
# The website deployment (deploy-website.yml) now generates and serves recipes.json
# from the same origin, eliminating CORS requirements and enabling full preview testing.

on:
  push:
    branches: [main]
    paths:
      - 'internal/recipe/recipes/**/*.toml'
      - 'scripts/generate-registry.py'
      - '.github/workflows/deploy-recipes.yml'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'

      - name: Generate recipes.json
        run: |
          cd internal/recipe
          python3 ../../scripts/generate-registry.py

      - name: Prepare deployment
        run: |
          mkdir -p _site
          cp internal/recipe/_site/recipes.json _site/
          echo "registry.tsuku.dev" > _site/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
