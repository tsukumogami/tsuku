name: Deploy Website

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'blog/**'
      - 'internal/recipe/recipes/**/*.toml'
      - 'recipes/**/*.toml'
      - 'scripts/generate-registry.py'
      - '.github/workflows/deploy-website.yml'
  pull_request:
    branches: [main]
    paths:
      - 'website/**'
      - 'blog/**'
      - 'internal/recipe/recipes/**/*.toml'
      - 'recipes/**/*.toml'
      - 'scripts/generate-registry.py'
      - '.github/workflows/deploy-website.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install Hugo
        env:
          HUGO_VERSION: "0.147.0"
        run: |
          wget -q -O /tmp/hugo_${HUGO_VERSION}_linux-amd64.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.deb
          wget -q -O /tmp/hugo_checksums.txt \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_checksums.txt
          cd /tmp && grep "hugo_${HUGO_VERSION}_linux-amd64.deb" hugo_checksums.txt | sha256sum -c
          sudo dpkg -i /tmp/hugo_${HUGO_VERSION}_linux-amd64.deb

      - name: Build blog
        run: hugo --source blog --destination $PWD/website/blog

      - name: Generate recipes.json
        run: |
          python3 scripts/generate-registry.py
          cp _site/recipes.json website/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca  # v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_DEPLOYER_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: tsuku-dev
          directory: website
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref || github.ref_name }}
