name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: "Release version without v prefix (e.g., 0.6.2)"
      tag:
        required: true
        type: string
        description: "Git tag (e.g., v0.6.2)"
      ref:
        required: true
        type: string
        default: main
        description: "Branch to release from"

jobs:
  release:
    uses: tsukumogami/shirabe/.github/workflows/release.yml@v0.2.0
    with:
      version: ${{ inputs.version }}
      tag: ${{ inputs.tag }}
      ref: ${{ inputs.ref }}
    secrets:
      token: ${{ secrets.RELEASE_PAT }}
