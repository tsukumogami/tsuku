name: Lint Workflows

on:
  push:
    branches: [main]
    paths:
      - '.github/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/**'

jobs:
  lint-workflows:
    name: Lint Workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Check for retired runners
        run: .github/scripts/checks/retired-runners.sh
      - name: Check CI consolidation patterns
        run: .github/scripts/checks/ci-patterns-lint.sh
