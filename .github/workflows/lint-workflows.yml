name: Lint Workflows

on:
  push:
    branches: [main]
    paths:
      - '.github/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/**'

jobs:
  lint-workflows:
    name: Lint Workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Check for retired runners
        run: .github/scripts/checks/retired-runners.sh
      - name: Check CI consolidation patterns
        run: .github/scripts/checks/ci-patterns-lint.sh
