name: Lint Workflows

on:
  push:
    branches: [main]
    paths:
      - '.github/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/**'

jobs:
  lint-workflows:
    name: Lint Workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Check for retired runners
        run: .github/scripts/checks/retired-runners.sh
      - name: Check CI consolidation patterns
        run: .github/scripts/checks/ci-patterns-lint.sh
