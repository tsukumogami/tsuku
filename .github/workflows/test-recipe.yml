# Test Recipe - Cross-platform validation for changed recipes.
#
# This workflow tests changed recipes across all supported platforms
# using sandbox containers (Linux) and native installs (macOS).
# It does NOT skip library recipes -- testing library recipes across
# platforms is its primary purpose.
#
# Triggers:
#   - workflow_dispatch: manually test a recipe by name
#   - pull_request: auto-detect changed recipes in the PR

name: Test Recipe

on:
  workflow_dispatch:
    inputs:
      recipe:
        description: "Recipe name (e.g., gmp, libgit2)"
        required: true
        type: string
  pull_request:
    paths:
      - "recipes/**/*.toml"
      - "internal/recipe/recipes/**/*.toml"
      - ".github/workflows/test-recipe.yml"

concurrency:
  group: test-recipe-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Build tsuku for all target platforms, detect changed recipes, and split into batches.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      recipes: ${{ steps.detect.outputs.recipes }}
      has_recipes: ${{ steps.detect.outputs.has_recipes }}
      linux_batches: ${{ steps.batch.outputs.linux_batches }}
      has_linux_batches: ${{ steps.batch.outputs.has_linux_batches }}
      batch_count: ${{ steps.batch.outputs.batch_count }}
      darwin_batches: ${{ steps.batch.outputs.darwin_batches }}
      has_darwin_batches: ${{ steps.batch.outputs.has_darwin_batches }}
      darwin_batch_count: ${{ steps.batch.outputs.darwin_batch_count }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # needed for git diff on PRs

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version-file: go.mod

      - name: Cross-compile tsuku
        run: |
          CGO_ENABLED=0 GOOS=linux  GOARCH=amd64 go build -o tsuku-linux-amd64  ./cmd/tsuku
          CGO_ENABLED=0 GOOS=linux  GOARCH=arm64 go build -o tsuku-linux-arm64  ./cmd/tsuku
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o tsuku-darwin-arm64 ./cmd/tsuku
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o tsuku-darwin-amd64 ./cmd/tsuku

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: tsuku-binaries
          path: |
            tsuku-linux-amd64
            tsuku-linux-arm64
            tsuku-darwin-arm64
            tsuku-darwin-amd64
          retention-days: 1

      - name: Detect recipe
        id: detect
        run: |
          RECIPES="[]"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: resolve recipe name to path
            NAME="${{ inputs.recipe }}"
            FIRST="${NAME:0:1}"
            PATH_CANDIDATE="recipes/$FIRST/$NAME.toml"
            if [ -f "$PATH_CANDIDATE" ]; then
              # Classify ecosystem from first action = "..." line in the TOML
              ECOSYSTEM="none"
              FIRST_ACTION=$(grep -m1 'action\s*=\s*"' "$PATH_CANDIDATE" | sed 's/.*action\s*=\s*"\([^"]*\)".*/\1/' || true)
              case "$FIRST_ACTION" in
              cargo_build|cargo_install) ECOSYSTEM="rust" ;;
              npm_install|npm_exec)      ECOSYSTEM="nodejs" ;;
              go_build|go_install)       ECOSYSTEM="go" ;;
              pipx_install)              ECOSYSTEM="python" ;;
              gem_install)               ECOSYSTEM="ruby" ;;
              esac
              RECIPES=$(jq -n --arg name "$NAME" --arg path "$PATH_CANDIDATE" --arg eco "$ECOSYSTEM" '[{name: $name, path: $path, ecosystem: $eco}]')
            else
              echo "::error::Recipe not found: $PATH_CANDIDATE"
              exit 1
            fi
          else
            # PR trigger: detect changed recipe files
            CHANGED=$(git diff --name-only --diff-filter=d origin/main...HEAD -- 'recipes/**/*.toml' 'internal/recipe/recipes/**/*.toml' || true)
            if [ -z "$CHANGED" ]; then
              echo "No recipe files changed in this PR."
              echo "recipes=[]" >> "$GITHUB_OUTPUT"
              echo "has_recipes=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Build JSON array of changed recipes
            RECIPES="[]"
            for path in $CHANGED; do
              name=$(basename "$path" .toml)
              # Classify ecosystem from first action = "..." line in the TOML
              ECOSYSTEM="none"
              FIRST_ACTION=$(grep -m1 'action\s*=\s*"' "$path" | sed 's/.*action\s*=\s*"\([^"]*\)".*/\1/' || true)
              case "$FIRST_ACTION" in
              cargo_build|cargo_install) ECOSYSTEM="rust" ;;
              npm_install|npm_exec)      ECOSYSTEM="nodejs" ;;
              go_build|go_install)       ECOSYSTEM="go" ;;
              pipx_install)              ECOSYSTEM="python" ;;
              gem_install)               ECOSYSTEM="ruby" ;;
              esac
              RECIPES=$(echo "$RECIPES" | jq --arg name "$name" --arg path "$path" --arg eco "$ECOSYSTEM" '. + [{name: $name, path: $path, ecosystem: $eco}]')
            done
          fi

          echo "recipes=$(echo "$RECIPES" | jq -c .)" >> "$GITHUB_OUTPUT"
          COUNT=$(echo "$RECIPES" | jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            echo "has_recipes=true" >> "$GITHUB_OUTPUT"
            echo "Found $COUNT recipe(s) to test:"
            echo "$RECIPES" | jq -r '.[].name'
          else
            echo "has_recipes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Split recipes into batches
        id: batch
        run: |
          RECIPES='${{ steps.detect.outputs.recipes }}'

          if [ -z "$RECIPES" ] || [ "$RECIPES" = "[]" ]; then
            echo "linux_batches=[]" >> "$GITHUB_OUTPUT"
            echo "has_linux_batches=false" >> "$GITHUB_OUTPUT"
            echo "batch_count=0" >> "$GITHUB_OUTPUT"
            echo "darwin_batches=[]" >> "$GITHUB_OUTPUT"
            echo "has_darwin_batches=false" >> "$GITHUB_OUTPUT"
            echo "darwin_batch_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Read batch sizes from config or use defaults.
          # Linux config can be:
          #   - a number: uniform batch size for all recipes
          #   - an object: per-ecosystem sizes, where each value is either
          #     a number (fixed size) or {"max": N, "min_batches": M} for
          #     dynamic sizing: batch_size = min(max, ceil(count/min_batches))
          LINUX_BATCH_CONFIG='5'
          DARWIN_BATCH_SIZE=20
          if [ -f .github/ci-batch-config.json ]; then
            LINUX_BATCH_CONFIG=$(jq -c '.batch_sizes["test-recipe"].linux // 5' .github/ci-batch-config.json)
            DARWIN_BATCH_SIZE=$(jq -r '.batch_sizes["test-recipe"].darwin // 20' .github/ci-batch-config.json)
          fi
          echo "Linux batch config: $LINUX_BATCH_CONFIG"
          echo "Darwin batch size: $DARWIN_BATCH_SIZE"

          # Sort by ecosystem so same-ecosystem recipes land in the same batch,
          # enabling foundation image reuse within each batch job.
          RECIPES=$(echo "$RECIPES" | jq -c 'sort_by(.ecosystem)')

          # Split recipes into Linux batches.
          LINUX_BATCHES=$(echo "$RECIPES" | jq -c --argjson cfg "$LINUX_BATCH_CONFIG" '
            # resolve_bs: given a config entry and group size, return batch size
            def resolve_bs(entry; n):
              if (entry | type) == "number" then entry
              elif (entry | type) == "object" and entry.max then
                [entry.max, ((n + entry.min_batches - 1) / entry.min_batches | floor)] | min
              else 5
              end;

            if ($cfg | type) == "number" then
              . as $all |
              [range(0; length; $cfg)] |
              to_entries |
              map({batch_id: (.key + 1), recipes: $all[.value:.value + $cfg]})
            else
              group_by(.ecosystem) |
              map(
                . as $grp |
                (.[0].ecosystem) as $eco |
                resolve_bs(($cfg[$eco] // $cfg["default"]) // 5; $grp | length) as $bs |
                [range(0; ($grp | length); $bs)] |
                map($grp[.:.+$bs])
              ) |
              add |
              to_entries |
              map({batch_id: (.key + 1), recipes: .value})
            end
          ')

          echo "linux_batches=$LINUX_BATCHES" >> "$GITHUB_OUTPUT"

          LINUX_BATCH_COUNT=$(echo "$LINUX_BATCHES" | jq 'length')
          echo "batch_count=$LINUX_BATCH_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$LINUX_BATCH_COUNT" -gt 0 ]; then
            echo "has_linux_batches=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_linux_batches=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Generated $LINUX_BATCH_COUNT Linux batch(es)"

          # Split recipes into Darwin batches (larger batch size since macOS runners are more expensive)
          DARWIN_BATCHES=$(echo "$RECIPES" | jq -c --argjson bs "$DARWIN_BATCH_SIZE" '
            . as $all |
            [range(0; length; $bs)] |
            to_entries |
            map({batch_id: (.key + 1), recipes: $all[.value:.value + $bs]})
          ')

          echo "darwin_batches=$DARWIN_BATCHES" >> "$GITHUB_OUTPUT"

          DARWIN_BATCH_COUNT=$(echo "$DARWIN_BATCHES" | jq 'length')
          echo "darwin_batch_count=$DARWIN_BATCH_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$DARWIN_BATCH_COUNT" -gt 0 ]; then
            echo "has_darwin_batches=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_darwin_batches=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Generated $DARWIN_BATCH_COUNT Darwin batch(es) of up to $DARWIN_BATCH_SIZE recipes"

  # Linux x86_64: test in sandbox containers for all five families.
  # Recipes are split into batches (one job per batch) and families run in parallel
  # per recipe. Each family gets its own TSUKU_HOME to avoid staging conflicts, but
  # all share a download cache via symlink so large downloads (e.g., Rust toolchain)
  # are fetched once and reused across families and recipes.
  test-linux-x86_64:
    name: "Linux x86_64 (batch ${{ matrix.batch.batch_id }}/${{ needs.build.outputs.batch_count }})"
    needs: build
    if: needs.build.outputs.has_linux_batches == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJson(needs.build.outputs.linux_batches) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: tsuku-binaries

      - name: Make binary executable
        run: chmod +x tsuku-linux-amd64

      - name: Restore download cache
        uses: actions/cache@b7e8d49f17405cc70c1c120101943203c98d3a4b  # v5.0.3
        with:
          path: /tmp/tsuku-shared-downloads
          key: test-recipe-downloads-linux-amd64-${{ hashFiles('recipes/**/*.toml', 'internal/recipe/recipes/**/*.toml') }}
          restore-keys: |
            test-recipe-downloads-linux-amd64-

      - name: Test recipes in Linux x86_64 containers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Point registry at checked-out repo so dependency recipes from this
          # PR branch are found (they don't exist in the remote registry yet).
          TSUKU_REGISTRY_URL: ${{ github.workspace }}
        run: |
          FAMILIES=("debian" "rhel" "arch" "suse" "alpine")
          SHARED_CACHE="/tmp/tsuku-shared-downloads"
          mkdir -p "$SHARED_CACHE"
          chmod 700 "$SHARED_CACHE"
          RECIPES='${{ toJson(matrix.batch.recipes) }}'

          TOTAL=0
          PASSED=0
          FAILED=0
          RESULTS=""

          COUNT=$(echo "$RECIPES" | jq 'length')
          for i in $(seq 0 $((COUNT - 1))); do
            recipe_name=$(echo "$RECIPES" | jq -r ".[$i].name")
            recipe_path=$(echo "$RECIPES" | jq -r ".[$i].path")

            # Skip recipes that don't support this platform
            if grep -q 'supported_os' "$recipe_path"; then
              if ! grep 'supported_os' "$recipe_path" | grep -q '"linux"'; then
                echo "SKIP: $recipe_name (supported_os excludes linux)"
                continue
              fi
            fi
            if grep 'unsupported_platforms' "$recipe_path" | grep -q '"linux/amd64"' 2>/dev/null; then
              echo "SKIP: $recipe_name (unsupported on linux/amd64)"
              continue
            fi

            RECIPE_START=$(date +%s)
            PIDS=()
            for family in "${FAMILIES[@]}"; do
              # Skip musl/alpine if recipe only supports glibc
              if [ "$family" = "alpine" ] && grep -q 'supported_libc' "$recipe_path" && ! grep 'supported_libc' "$recipe_path" | grep -q '"musl"'; then
                echo "SKIP: $recipe_name on $family (supported_libc excludes musl)"
                continue
              fi
              TOTAL=$((TOTAL + 1))
              RESULT_FILE=".result-${recipe_name}-${family}.json"
              LOG_FILE=".log-${recipe_name}-${family}.txt"

              (
                FAMILY_HOME="/tmp/tsuku-${recipe_name}-${family}"
                mkdir -p "$FAMILY_HOME/cache"
                ln -sf "$SHARED_CACHE" "$FAMILY_HOME/cache/downloads"

                TSUKU_HOME="$FAMILY_HOME" TSUKU_TELEMETRY=0 \
                  ./tsuku-linux-amd64 install --sandbox --force \
                    --dangerously-suppress-security \
                    --recipe "$recipe_path" \
                    --target-family "$family" \
                    --env GITHUB_TOKEN="$GITHUB_TOKEN" \
                    --env TSUKU_REGISTRY_URL="$TSUKU_REGISTRY_URL" \
                    --json > "$RESULT_FILE" 2>"$LOG_FILE" || true
              ) &
              PIDS+=($!)
            done

            # Wait for all families of this recipe to complete
            for pid in "${PIDS[@]}"; do
              wait "$pid" || true
            done
            RECIPE_ELAPSED=$(( $(date +%s) - RECIPE_START ))

            # Collect results
            for family in "${FAMILIES[@]}"; do
              # Skip musl/alpine if recipe only supports glibc
              if [ "$family" = "alpine" ] && grep -q 'supported_libc' "$recipe_path" && ! grep 'supported_libc' "$recipe_path" | grep -q '"musl"'; then
                continue
              fi
              RESULT_FILE=".result-${recipe_name}-${family}.json"

              echo "::group::$recipe_name on $family (x86_64)"

              if [ -f "$RESULT_FILE" ] && jq -e . "$RESULT_FILE" > /dev/null 2>&1; then
                SANDBOX_PASSED=$(jq -r '.passed' "$RESULT_FILE")
                EXIT_CODE=$(jq -r '.install_exit_code' "$RESULT_FILE")
              else
                SANDBOX_PASSED="false"
                EXIT_CODE=1
              fi

              if [ "$SANDBOX_PASSED" = "true" ]; then
                PASSED=$((PASSED + 1))
                RESULTS="$RESULTS| $recipe_name | $family | pass | ${RECIPE_ELAPSED}s |\n"
                echo "PASS: $recipe_name on $family (${RECIPE_ELAPSED}s)"
              else
                FAILED=$((FAILED + 1))
                RESULTS="$RESULTS| $recipe_name | $family | **FAIL** (exit $EXIT_CODE) | ${RECIPE_ELAPSED}s |\n"
                echo "FAIL: $recipe_name on $family (exit $EXIT_CODE, ${RECIPE_ELAPSED}s)"
              fi

              echo "::endgroup::"
            done

            # Clean up installed tools to free disk for the next recipe.
            # Sandbox containers run as root, so files are root-owned.
            sudo rm -rf /tmp/tsuku-${recipe_name}-* 2>/dev/null || true
          done

          # Write job summary
          {
            echo "### Linux x86_64 (batch ${{ matrix.batch.batch_id }}) Results"
            echo ""
            echo "Passed: $PASSED / $TOTAL"
            echo ""
            echo "| Recipe | Family | Status | Duration |"
            echo "|--------|--------|--------|----------|"
            echo -e "$RESULTS"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED of $TOTAL tests failed (Linux x86_64 batch ${{ matrix.batch.batch_id }})"
            exit 1
          fi

  # Linux arm64: test in sandbox containers for four families (no arch arm64 image).
  # Same batched parallel-families approach as x86_64.
  test-linux-arm64:
    name: "Linux arm64 (batch ${{ matrix.batch.batch_id }}/${{ needs.build.outputs.batch_count }})"
    needs: build
    if: needs.build.outputs.has_linux_batches == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJson(needs.build.outputs.linux_batches) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: tsuku-binaries

      - name: Make binary executable
        run: chmod +x tsuku-linux-arm64

      - name: Restore download cache
        uses: actions/cache@b7e8d49f17405cc70c1c120101943203c98d3a4b  # v5.0.3
        with:
          path: /tmp/tsuku-shared-downloads
          key: test-recipe-downloads-linux-arm64-${{ hashFiles('recipes/**/*.toml', 'internal/recipe/recipes/**/*.toml') }}
          restore-keys: |
            test-recipe-downloads-linux-arm64-

      - name: Test recipes in Linux arm64 containers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: ${{ github.workspace }}
        run: |
          # Four Linux arm64 families (no arch -- no arm64 image available)
          FAMILIES=("debian" "rhel" "suse" "alpine")
          SHARED_CACHE="/tmp/tsuku-shared-downloads"
          mkdir -p "$SHARED_CACHE"
          chmod 700 "$SHARED_CACHE"
          RECIPES='${{ toJson(matrix.batch.recipes) }}'

          TOTAL=0
          PASSED=0
          FAILED=0
          RESULTS=""

          COUNT=$(echo "$RECIPES" | jq 'length')
          for i in $(seq 0 $((COUNT - 1))); do
            recipe_name=$(echo "$RECIPES" | jq -r ".[$i].name")
            recipe_path=$(echo "$RECIPES" | jq -r ".[$i].path")

            # Skip recipes that don't support this platform
            if grep -q 'supported_os' "$recipe_path"; then
              if ! grep 'supported_os' "$recipe_path" | grep -q '"linux"'; then
                echo "SKIP: $recipe_name (supported_os excludes linux)"
                continue
              fi
            fi
            if grep 'unsupported_platforms' "$recipe_path" | grep -q '"linux/arm64"' 2>/dev/null; then
              echo "SKIP: $recipe_name (unsupported on linux/arm64)"
              continue
            fi

            RECIPE_START=$(date +%s)
            PIDS=()
            for family in "${FAMILIES[@]}"; do
              # Skip musl/alpine if recipe only supports glibc
              if [ "$family" = "alpine" ] && grep -q 'supported_libc' "$recipe_path" && ! grep 'supported_libc' "$recipe_path" | grep -q '"musl"'; then
                echo "SKIP: $recipe_name on $family (supported_libc excludes musl)"
                continue
              fi
              TOTAL=$((TOTAL + 1))
              RESULT_FILE=".result-${recipe_name}-${family}.json"
              LOG_FILE=".log-${recipe_name}-${family}.txt"

              (
                FAMILY_HOME="/tmp/tsuku-${recipe_name}-${family}"
                mkdir -p "$FAMILY_HOME/cache"
                ln -sf "$SHARED_CACHE" "$FAMILY_HOME/cache/downloads"

                TSUKU_HOME="$FAMILY_HOME" TSUKU_TELEMETRY=0 \
                  ./tsuku-linux-arm64 install --sandbox --force \
                    --dangerously-suppress-security \
                    --recipe "$recipe_path" \
                    --target-family "$family" \
                    --env GITHUB_TOKEN="$GITHUB_TOKEN" \
                    --env TSUKU_REGISTRY_URL="$TSUKU_REGISTRY_URL" \
                    --json > "$RESULT_FILE" 2>"$LOG_FILE" || true
              ) &
              PIDS+=($!)
            done

            # Wait for all families of this recipe to complete
            for pid in "${PIDS[@]}"; do
              wait "$pid" || true
            done
            RECIPE_ELAPSED=$(( $(date +%s) - RECIPE_START ))

            # Collect results
            for family in "${FAMILIES[@]}"; do
              # Skip musl/alpine if recipe only supports glibc
              if [ "$family" = "alpine" ] && grep -q 'supported_libc' "$recipe_path" && ! grep 'supported_libc' "$recipe_path" | grep -q '"musl"'; then
                continue
              fi
              RESULT_FILE=".result-${recipe_name}-${family}.json"

              echo "::group::$recipe_name on $family (arm64)"

              if [ -f "$RESULT_FILE" ] && jq -e . "$RESULT_FILE" > /dev/null 2>&1; then
                SANDBOX_PASSED=$(jq -r '.passed' "$RESULT_FILE")
                EXIT_CODE=$(jq -r '.install_exit_code' "$RESULT_FILE")
              else
                SANDBOX_PASSED="false"
                EXIT_CODE=1
              fi

              if [ "$SANDBOX_PASSED" = "true" ]; then
                PASSED=$((PASSED + 1))
                RESULTS="$RESULTS| $recipe_name | $family | pass | ${RECIPE_ELAPSED}s |\n"
                echo "PASS: $recipe_name on $family (${RECIPE_ELAPSED}s)"
              else
                FAILED=$((FAILED + 1))
                RESULTS="$RESULTS| $recipe_name | $family | **FAIL** (exit $EXIT_CODE) | ${RECIPE_ELAPSED}s |\n"
                echo "FAIL: $recipe_name on $family (exit $EXIT_CODE, ${RECIPE_ELAPSED}s)"
              fi

              echo "::endgroup::"
            done

            # Clean up installed tools to free disk for the next recipe.
            # Sandbox containers run as root, so files are root-owned.
            sudo rm -rf /tmp/tsuku-${recipe_name}-* 2>/dev/null || true
          done

          # Write job summary
          {
            echo "### Linux arm64 (batch ${{ matrix.batch.batch_id }}) Results"
            echo ""
            echo "Passed: $PASSED / $TOTAL"
            echo ""
            echo "| Recipe | Family | Status | Duration |"
            echo "|--------|--------|--------|----------|"
            echo -e "$RESULTS"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED of $TOTAL tests failed (Linux arm64 batch ${{ matrix.batch.batch_id }})"
            exit 1
          fi

  # macOS arm64: native runner test.
  # Recipes are split into batches (one job per batch) to stay within the timeout.
  # macOS batches are larger than Linux since there are no family variants.
  test-darwin-arm64:
    name: "macOS arm64 (batch ${{ matrix.batch.batch_id }}/${{ needs.build.outputs.darwin_batch_count }})"
    needs: build
    if: needs.build.outputs.has_darwin_batches == 'true'
    runs-on: macos-14
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJson(needs.build.outputs.darwin_batches) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: tsuku-binaries

      - name: Make binary executable
        run: chmod +x tsuku-darwin-arm64

      - name: Install GNU coreutils for gtimeout
        run: brew install coreutils

      - name: Restore download cache
        uses: actions/cache@b7e8d49f17405cc70c1c120101943203c98d3a4b  # v5.0.3
        with:
          path: /tmp/tsuku-shared-downloads
          key: test-recipe-downloads-darwin-arm64-${{ hashFiles('recipes/**/*.toml', 'internal/recipe/recipes/**/*.toml') }}
          restore-keys: |
            test-recipe-downloads-darwin-arm64-

      - name: Test recipes on macOS arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: ${{ github.workspace }}
        run: |
          SHARED_CACHE="/tmp/tsuku-shared-downloads"
          mkdir -p "$SHARED_CACHE"
          chmod 700 "$SHARED_CACHE"
          RECIPES='${{ toJson(matrix.batch.recipes) }}'

          TOTAL=0
          PASSED=0
          FAILED=0
          RESULTS=""

          COUNT=$(echo "$RECIPES" | jq 'length')
          for i in $(seq 0 $((COUNT - 1))); do
            recipe_name=$(echo "$RECIPES" | jq -r ".[$i].name")
            recipe_path=$(echo "$RECIPES" | jq -r ".[$i].path")

            # Skip recipes that don't support this platform
            if grep -q 'supported_os' "$recipe_path"; then
              if ! grep 'supported_os' "$recipe_path" | grep -q '"darwin"'; then
                echo "SKIP: $recipe_name (supported_os excludes darwin)"
                continue
              fi
            fi
            if grep 'unsupported_platforms' "$recipe_path" | grep -q '"darwin/arm64"' 2>/dev/null; then
              echo "SKIP: $recipe_name (unsupported on darwin/arm64)"
              continue
            fi

            TOTAL=$((TOTAL + 1))
            RECIPE_START=$(date +%s)

            echo "::group::$recipe_name on macOS arm64"

            export TSUKU_HOME="${{ runner.temp }}/tsuku-$recipe_name"
            mkdir -p "$TSUKU_HOME/cache"
            ln -sf "$SHARED_CACHE" "$TSUKU_HOME/cache/downloads"

            if gtimeout 600 ./tsuku-darwin-arm64 install --force \
                --dangerously-suppress-security \
                --recipe "$recipe_path" 2>&1; then
              RECIPE_ELAPSED=$(( $(date +%s) - RECIPE_START ))
              PASSED=$((PASSED + 1))
              RESULTS="$RESULTS| $recipe_name | darwin-arm64 | pass | ${RECIPE_ELAPSED}s |\n"
              echo "PASS: $recipe_name on macOS arm64 (${RECIPE_ELAPSED}s)"
            else
              EXIT_CODE=$?
              RECIPE_ELAPSED=$(( $(date +%s) - RECIPE_START ))
              FAILED=$((FAILED + 1))
              RESULTS="$RESULTS| $recipe_name | darwin-arm64 | **FAIL** (exit $EXIT_CODE) | ${RECIPE_ELAPSED}s |\n"
              echo "FAIL: $recipe_name on macOS arm64 (exit $EXIT_CODE, ${RECIPE_ELAPSED}s)"
            fi

            echo "::endgroup::"

            # Clean up installed tools to free disk for the next recipe.
            rm -rf "${{ runner.temp }}/tsuku-${recipe_name}" 2>/dev/null || true
          done

          # Write job summary
          {
            echo "### macOS arm64 (batch ${{ matrix.batch.batch_id }}) Results"
            echo ""
            echo "Passed: $PASSED / $TOTAL"
            echo ""
            echo "| Recipe | Family | Status | Duration |"
            echo "|--------|--------|--------|----------|"
            echo -e "$RESULTS"
            if [ "$FAILED" -gt 0 ]; then
              echo ""
              echo "> Platform failures indicate which \`when\` filters to add to the recipe."
              echo "> They are not required fixes before merge."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED of $TOTAL tests failed on macOS arm64 (batch ${{ matrix.batch.batch_id }})"
            exit 1
          fi

  # macOS x86_64: native runner test.
  # Same batched approach as macOS arm64.
  test-darwin-x86_64:
    name: "macOS x86_64 (batch ${{ matrix.batch.batch_id }}/${{ needs.build.outputs.darwin_batch_count }})"
    needs: build
    if: needs.build.outputs.has_darwin_batches == 'true'
    runs-on: macos-15-intel
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        batch: ${{ fromJson(needs.build.outputs.darwin_batches) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: tsuku-binaries

      - name: Make binary executable
        run: chmod +x tsuku-darwin-amd64

      - name: Install GNU coreutils for gtimeout
        run: brew install coreutils

      - name: Restore download cache
        uses: actions/cache@b7e8d49f17405cc70c1c120101943203c98d3a4b  # v5.0.3
        with:
          path: /tmp/tsuku-shared-downloads
          key: test-recipe-downloads-darwin-amd64-${{ hashFiles('recipes/**/*.toml', 'internal/recipe/recipes/**/*.toml') }}
          restore-keys: |
            test-recipe-downloads-darwin-amd64-

      - name: Test recipes on macOS x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: ${{ github.workspace }}
        run: |
          SHARED_CACHE="/tmp/tsuku-shared-downloads"
          mkdir -p "$SHARED_CACHE"
          chmod 700 "$SHARED_CACHE"
          RECIPES='${{ toJson(matrix.batch.recipes) }}'

          TOTAL=0
          PASSED=0
          FAILED=0
          RESULTS=""

          COUNT=$(echo "$RECIPES" | jq 'length')
          for i in $(seq 0 $((COUNT - 1))); do
            recipe_name=$(echo "$RECIPES" | jq -r ".[$i].name")
            recipe_path=$(echo "$RECIPES" | jq -r ".[$i].path")

            # Skip recipes that don't support this platform
            if grep -q 'supported_os' "$recipe_path"; then
              if ! grep 'supported_os' "$recipe_path" | grep -q '"darwin"'; then
                echo "SKIP: $recipe_name (supported_os excludes darwin)"
                continue
              fi
            fi
            if grep 'unsupported_platforms' "$recipe_path" | grep -q '"darwin/amd64"' 2>/dev/null; then
              echo "SKIP: $recipe_name (unsupported on darwin/amd64)"
              continue
            fi

            TOTAL=$((TOTAL + 1))
            RECIPE_START=$(date +%s)

            echo "::group::$recipe_name on macOS x86_64"

            export TSUKU_HOME="${{ runner.temp }}/tsuku-$recipe_name"
            mkdir -p "$TSUKU_HOME/cache"
            ln -sf "$SHARED_CACHE" "$TSUKU_HOME/cache/downloads"

            if gtimeout 600 ./tsuku-darwin-amd64 install --force \
                --dangerously-suppress-security \
                --recipe "$recipe_path" 2>&1; then
              RECIPE_ELAPSED=$(( $(date +%s) - RECIPE_START ))
              PASSED=$((PASSED + 1))
              RESULTS="$RESULTS| $recipe_name | darwin-x86_64 | pass | ${RECIPE_ELAPSED}s |\n"
              echo "PASS: $recipe_name on macOS x86_64 (${RECIPE_ELAPSED}s)"
            else
              EXIT_CODE=$?
              RECIPE_ELAPSED=$(( $(date +%s) - RECIPE_START ))
              FAILED=$((FAILED + 1))
              RESULTS="$RESULTS| $recipe_name | darwin-x86_64 | **FAIL** (exit $EXIT_CODE) | ${RECIPE_ELAPSED}s |\n"
              echo "FAIL: $recipe_name on macOS x86_64 (exit $EXIT_CODE, ${RECIPE_ELAPSED}s)"
            fi

            echo "::endgroup::"

            # Clean up installed tools to free disk for the next recipe.
            rm -rf "${{ runner.temp }}/tsuku-${recipe_name}" 2>/dev/null || true
          done

          # Write job summary
          {
            echo "### macOS x86_64 (batch ${{ matrix.batch.batch_id }}) Results"
            echo ""
            echo "Passed: $PASSED / $TOTAL"
            echo ""
            echo "| Recipe | Family | Status | Duration |"
            echo "|--------|--------|--------|----------|"
            echo -e "$RESULTS"
            if [ "$FAILED" -gt 0 ]; then
              echo ""
              echo "> Platform failures indicate which \`when\` filters to add to the recipe."
              echo "> They are not required fixes before merge."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED of $TOTAL tests failed on macOS x86_64 (batch ${{ matrix.batch.batch_id }})"
            exit 1
          fi
