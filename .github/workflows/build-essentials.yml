name: Build Essentials

on:
  schedule:
    # Weekly on Sunday at midnight UTC
    - cron: '0 0 * * 0'
  push:
    branches: [main]
    paths:
      - 'internal/recipe/recipes/**/*.toml'
      - 'internal/actions/homebrew*.go'
      - 'internal/actions/configure_make.go'
      - 'internal/actions/cmake_build.go'
      - 'internal/actions/meson_build.go'
      - 'internal/actions/extract.go'
      - 'internal/actions/setup_build_env.go'
      - 'internal/sandbox/**/*.go'
      - 'cmd/tsuku/eval.go'
      - 'cmd/tsuku/install_deps.go'
      - 'cmd/tsuku/install_lib.go'
      - 'testdata/recipes/*.toml'
      - 'test/scripts/verify-*.sh'
      - 'test/scripts/test-*-provisioning.sh'
      - 'test/scripts/test-tls-cacerts.sh'
      - '.github/workflows/build-essentials.yml'
      - 'go.mod'
  pull_request:
    branches: [main]
    paths:
      - 'internal/recipe/recipes/**/*.toml'
      - 'internal/actions/homebrew*.go'
      - 'internal/actions/configure_make.go'
      - 'internal/actions/cmake_build.go'
      - 'internal/actions/meson_build.go'
      - 'internal/actions/extract.go'
      - 'internal/actions/setup_build_env.go'
      - 'internal/sandbox/**/*.go'
      - 'cmd/tsuku/eval.go'
      - 'cmd/tsuku/install_deps.go'
      - 'cmd/tsuku/install_lib.go'
      - 'testdata/recipes/*.toml'
      - 'scripts/*.sh'
      - 'test/scripts/verify-*.sh'
      - 'test/scripts/test-*-provisioning.sh'
      - 'test/scripts/test-tls-cacerts.sh'
      - '.github/workflows/build-essentials.yml'
      - 'go.mod'

jobs:
  # Consolidated Linux build essentials tests
  # Each tool runs via tsuku install --sandbox for containerized execution.
  # TLS test runs host-level (multi-recipe orchestration across ca-certs + curl).
  # Pattern follows test-recipe.yml: --sandbox --force --json with result parsing.
  test-linux:
    name: "Linux x86_64: build essentials"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Build tsuku
        run: CGO_ENABLED=0 go build -o tsuku ./cmd/tsuku

      - name: Test tools via sandbox
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          TOTAL=0
          PASSED=0
          FAILED_COUNT=0
          RESULTS=""

          sandbox_test() {
              local name="$1"
              shift
              TOTAL=$((TOTAL + 1))
              echo "::group::Sandbox: $name"
              RESULT_FILE=".result-${name}.json"

              ./tsuku install --sandbox --force "$@" \
                --env GITHUB_TOKEN="$GITHUB_TOKEN" \
                --json > "$RESULT_FILE" 2>/dev/null || true

              if [ -f "$RESULT_FILE" ] && jq -e . "$RESULT_FILE" > /dev/null 2>&1; then
                SANDBOX_PASSED=$(jq -r '.passed' "$RESULT_FILE")
                EXIT_CODE=$(jq -r '.install_exit_code' "$RESULT_FILE")
              else
                SANDBOX_PASSED="false"
                EXIT_CODE=1
              fi

              if [ "$SANDBOX_PASSED" = "true" ]; then
                PASSED=$((PASSED + 1))
                RESULTS="$RESULTS| $name | pass |\n"
                echo "PASS: $name"
              else
                FAILED_COUNT=$((FAILED_COUNT + 1))
                RESULTS="$RESULTS| $name | **FAIL** (exit $EXIT_CODE) |\n"
                echo "FAIL: $name (exit $EXIT_CODE)"
              fi
              echo "::endgroup::"
          }

          # Homebrew tools (make excluded - see #1581)
          # pngcrush tests dependency chain: pngcrush -> libpng -> zlib
          for tool in pkg-config cmake gdbm pngcrush; do
            sandbox_test "$tool" "$tool"
          done

          # Source build recipes
          sandbox_test "libsixel-source" --recipe testdata/recipes/libsixel-source.toml
          sandbox_test "ninja" ninja
          sandbox_test "sqlite-source" --recipe testdata/recipes/sqlite-source.toml
          sandbox_test "git-source" --recipe testdata/recipes/git-source.toml

          # Binary install
          sandbox_test "zig" zig

          # TLS test (host-level, multi-recipe orchestration)
          echo "::group::TLS CA certs"
          TOTAL=$((TOTAL + 1))
          export TSUKU_HOME="${{ runner.temp }}/tsuku-tls"
          if timeout 300 ./test/scripts/test-tls-cacerts.sh ./tsuku; then
            PASSED=$((PASSED + 1))
            RESULTS="$RESULTS| tls-cacerts | pass |\n"
            echo "PASS: tls-cacerts"
          else
            FAILED_COUNT=$((FAILED_COUNT + 1))
            RESULTS="$RESULTS| tls-cacerts | **FAIL** |\n"
            echo "FAIL: tls-cacerts"
          fi
          echo "::endgroup::"

          # Job summary
          {
            echo "### Linux Build Essentials Results"
            echo ""
            echo "Passed: $PASSED / $TOTAL"
            echo ""
            echo "| Tool | Status |"
            echo "|------|--------|"
            echo -e "$RESULTS"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED_COUNT" -gt 0 ]; then
            echo "::error::$FAILED_COUNT of $TOTAL tests failed"
            exit 1
          fi
          echo "All Linux build essentials tests passed"

  # Test source build with zig cc in container without system gcc
  # This validates that configure_make falls back to zig when no gcc exists
  # Libtool compatibility via -print-prog-name workaround (ziglang/zig#17273)
  test-no-gcc:
    name: "No-GCC Container: gdbm-source"
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
      options: --user root

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Install minimal deps: NO gcc, but YES make (from apt, not Homebrew)
      # The test validates zig cc as compiler fallback, not tsuku make installation
      - name: Install minimal dependencies
        run: |
          apt-get update
          apt-get install -y wget curl ca-certificates git make
          # Some apt packages may pull in gcc as a dependency
          # Find and remove any system compilers to ensure zig is used
          echo "Checking for system compilers..."
          echo "which gcc: $(which gcc 2>/dev/null || echo 'not found')"
          echo "type gcc: $(type gcc 2>/dev/null || echo 'not found')"
          # Remove gcc/cc from standard locations and alternatives
          apt-get remove -y gcc gcc-* g++ 2>/dev/null || true
          rm -f /usr/bin/gcc* /usr/bin/cc /usr/bin/g++* /usr/bin/c++ 2>/dev/null || true
          update-alternatives --remove-all gcc 2>/dev/null || true
          update-alternatives --remove-all cc 2>/dev/null || true
          # Clear shell command hash table
          hash -r 2>/dev/null || true
          # Verify no system compiler binary exists (not functions/aliases)
          if [ -x /usr/bin/gcc ] || [ -x /usr/bin/cc ]; then
            echo "ERROR: gcc binary still found!"
            ls -la /usr/bin/gcc* /usr/bin/cc 2>/dev/null || true
            exit 1
          fi
          echo "Verified: No system compiler binary present"
          echo "System make: $(which make)"

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Build tsuku
        run: CGO_ENABLED=0 go build -o tsuku ./cmd/tsuku

      - name: Install zig (provides compiler)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: ./tsuku install --force zig

      - name: Build gdbm from source (uses zig cc)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          # Don't add tsuku tools to PATH - the Go code handles zig setup internally
          # and we want configure to detect system make, not the Homebrew make
          echo "Building gdbm-source - should use zig cc since no gcc exists"
          echo "System make: $(which make)"
          ./tsuku install --recipe testdata/recipes/gdbm-source.toml --force

      - name: "Verify gdbm-source functionality"
        run: ./test/scripts/verify-tool.sh gdbm-source

  # Test sandbox with multi-family support
  # Validates system dependency extraction and container building across Linux families
  test-sandbox-cmake:
    name: "Sandbox multifamily: cmake"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Build tsuku
        run: CGO_ENABLED=0 go build -o tsuku ./cmd/tsuku

      - name: Test sandbox across Linux families
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          FAMILIES=(debian rhel arch alpine suse)
          FAILED=()
          for family in "${FAMILIES[@]}"; do
            echo "::group::Sandbox cmake on $family"
            timeout 300 bash -c '
              ./tsuku eval cmake --os linux --linux-family '"$family"' --install-deps > plan.json
              ./tsuku install --plan plan.json --sandbox --force
            '
            EXIT_CODE=$?
            if [ "$EXIT_CODE" != "0" ]; then FAILED+=("$family"); fi
            echo "::endgroup::"
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed families: ${FAILED[*]}"
            exit 1
          fi

  test-sandbox-ninja:
    name: "Sandbox multifamily: ninja"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Build tsuku
        run: CGO_ENABLED=0 go build -o tsuku ./cmd/tsuku

      - name: Test sandbox across Linux families
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          FAMILIES=(debian rhel arch alpine suse)
          FAILED=()
          for family in "${FAMILIES[@]}"; do
            echo "::group::Sandbox ninja on $family"
            timeout 300 bash -c '
              ./tsuku eval ninja --os linux --linux-family '"$family"' --install-deps > plan.json
              ./tsuku install --plan plan.json --sandbox --force
            '
            EXIT_CODE=$?
            if [ "$EXIT_CODE" != "0" ]; then FAILED+=("$family"); fi
            echo "::endgroup::"
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed families: ${FAILED[*]}"
            exit 1
          fi

  # Aggregated macOS Apple Silicon tests (reduces runner queue pressure)
  test-macos-arm64:
    name: "macOS Apple Silicon (arm64)"
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Build tsuku
        run: go build -o tsuku ./cmd/tsuku

      - name: Run all macOS tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          FAILED=()
          CACHE_DIR="${{ runner.temp }}/tsuku-cache/downloads"
          mkdir -p "$CACHE_DIR"

          run_test() {
            local name="$1"
            local tool="$2"
            local recipe="$3"
            local verify_binary="${4:-false}"

            echo "::group::Testing $name"

            # Fresh TSUKU_HOME per test with shared download cache
            export TSUKU_HOME="${{ runner.temp }}/tsuku-$name"
            mkdir -p "$TSUKU_HOME/cache"
            ln -s "$CACHE_DIR" "$TSUKU_HOME/cache/downloads" 2>/dev/null || true

            # Install
            if [ -n "$recipe" ]; then
              if ! ./tsuku install --recipe "$recipe" --force; then
                FAILED+=("$name")
                echo "::endgroup::"
                return
              fi
            else
              if ! ./tsuku install --force "$tool"; then
                FAILED+=("$name")
                echo "::endgroup::"
                return
              fi
            fi

            # Verify functionality
            if ! ./test/scripts/verify-tool.sh "$tool"; then
              FAILED+=("$name (verify)")
            fi

            # Optional: verify binary quality (relocation + system deps)
            if [ "$verify_binary" = "true" ]; then
              ./test/scripts/verify-binary.sh "$tool" || FAILED+=("$name (binary)")
            fi

            echo "::endgroup::"
          }

          # Homebrew tools (gdbm excluded on macOS - see issue #605)
          # make excluded - binary name differs by platform (gmake on macOS) - see #1581
          run_test "pkg-config" "pkg-config" "" "true"
          run_test "cmake" "cmake" "" "true"
          run_test "pngcrush" "pngcrush" "" "true"

          # Source builds
          run_test "gdbm-source" "gdbm-source" "testdata/recipes/gdbm-source.toml"
          run_test "libsixel-source" "libsixel-source" "testdata/recipes/libsixel-source.toml"
          run_test "ninja" "ninja" ""
          run_test "sqlite-source" "sqlite-source" "testdata/recipes/sqlite-source.toml"
          # git-source excluded on macOS - see issue #881

          # Zig
          run_test "zig" "zig" "" "true"

          # Report failures
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed tests: ${FAILED[*]}"
            exit 1
          fi

          echo "All macOS Apple Silicon tests passed"

  # Aggregated macOS Intel tests (reduces runner queue pressure)
  test-macos-intel:
    name: "macOS Intel (x86_64)"
    runs-on: macos-15-intel
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Build tsuku
        run: go build -o tsuku ./cmd/tsuku

      - name: Run all macOS tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          FAILED=()
          CACHE_DIR="${{ runner.temp }}/tsuku-cache/downloads"
          mkdir -p "$CACHE_DIR"

          run_test() {
            local name="$1"
            local tool="$2"
            local recipe="$3"
            local verify_binary="${4:-false}"

            echo "::group::Testing $name"

            # Fresh TSUKU_HOME per test with shared download cache
            export TSUKU_HOME="${{ runner.temp }}/tsuku-$name"
            mkdir -p "$TSUKU_HOME/cache"
            ln -s "$CACHE_DIR" "$TSUKU_HOME/cache/downloads" 2>/dev/null || true

            # Install
            if [ -n "$recipe" ]; then
              if ! ./tsuku install --recipe "$recipe" --force; then
                FAILED+=("$name")
                echo "::endgroup::"
                return
              fi
            else
              if ! ./tsuku install --force "$tool"; then
                FAILED+=("$name")
                echo "::endgroup::"
                return
              fi
            fi

            # Verify functionality
            if ! ./test/scripts/verify-tool.sh "$tool"; then
              FAILED+=("$name (verify)")
            fi

            # Optional: verify binary quality (relocation + system deps)
            if [ "$verify_binary" = "true" ]; then
              ./test/scripts/verify-binary.sh "$tool" || FAILED+=("$name (binary)")
            fi

            echo "::endgroup::"
          }

          # Homebrew tools (gdbm excluded on macOS - see issue #605)
          # make excluded - binary name differs by platform (gmake on macOS) - see #1581
          run_test "pkg-config" "pkg-config" "" "true"
          run_test "cmake" "cmake" "" "true"
          run_test "pngcrush" "pngcrush" "" "true"

          # Source builds
          run_test "gdbm-source" "gdbm-source" "testdata/recipes/gdbm-source.toml"
          # libsixel-source excluded on macOS - see issue #880
          run_test "ninja" "ninja" ""
          run_test "sqlite-source" "sqlite-source" "testdata/recipes/sqlite-source.toml"
          # git-source excluded on macOS - see issue #881

          # Zig
          run_test "zig" "zig" "" "true"

          # Report failures
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed tests: ${FAILED[*]}"
            exit 1
          fi

          echo "All macOS Intel tests passed"
