name: Integration Tests

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'test/scripts/**'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'test/scripts/**'
      - '.github/workflows/integration-tests.yml'

jobs:
  checksum-pinning:
    name: "Checksum Pinning Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Run checksum pinning tests across families
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          FAMILIES=(debian rhel arch alpine suse)
          FAILED=()
          for family in "${FAMILIES[@]}"; do
            echo "::group::Checksum pinning on $family"
            if ! timeout 300 ./test/scripts/test-checksum-pinning.sh "$family"; then
              FAILED+=("$family")
            fi
            echo "::endgroup::"
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed families: ${FAILED[*]}"
            exit 1
          fi
          echo "All checksum pinning tests passed"

  homebrew-linux:
    name: "Homebrew: ${{ matrix.family }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # alpine excluded: pkg-config uses apk_install (not homebrew) on musl
        family: [debian, rhel, arch, suse]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Run homebrew recipe test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: ./test/scripts/test-homebrew-recipe.sh pkg-config ${{ matrix.family }}

  library-integrity:
    name: "Library Integrity: ${{ matrix.library }} (${{ matrix.family }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        library: [zlib, libyaml]
        family: [debian]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Run library integrity test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: ./test/scripts/test-library-integrity.sh ${{ matrix.library }} ${{ matrix.family }}

  library-dlopen-glibc:
    name: "Library dlopen: ${{ matrix.library }} (glibc)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # openssl excluded: system libcrypto.so.3 conflicts with tsuku-installed version (see #1090)
        library: [zlib, libyaml, gcc-libs]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            cmd/tsuku-dltest/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-dltest-${{ runner.os }}-${{ hashFiles('cmd/tsuku-dltest/Cargo.lock') }}
          restore-keys: |
            rust-dltest-${{ runner.os }}-

      - name: Run library dlopen test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: ./test/scripts/test-library-dlopen.sh ${{ matrix.library }} debian

  # musl/Alpine dlopen tests use recipe-derived package lists.
  # This validates that recipes correctly declare their system dependencies.
  library-dlopen-musl:
    name: "Library dlopen: ${{ matrix.library }} (musl)"
    runs-on: ubuntu-latest
    container:
      image: golang:1.23-alpine
    strategy:
      fail-fast: false
      matrix:
        library: [zlib, libyaml, gcc-libs]
    env:
      GOTOOLCHAIN: auto
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install bootstrap dependencies
        run: |
          # Minimal bootstrap: Go is in the container, add tools for Rust build
          apk add --no-cache curl gcc musl-dev bash git
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable

      - name: Build tsuku
        run: go build -o tsuku ./cmd/tsuku

      - name: Install recipe-declared dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          # Get packages declared in the recipe for Alpine/musl
          DEPS=$(./tsuku info --deps-only --system --family alpine ${{ matrix.library }})
          if [ -n "$DEPS" ]; then
            echo "Installing recipe-declared packages: $DEPS"
            apk add --no-cache $DEPS
          else
            echo "No system packages declared for ${{ matrix.library }} on Alpine"
          fi

      - name: Run library dlopen test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          source $HOME/.cargo/env
          ./test/scripts/test-library-dlopen.sh ${{ matrix.library }} alpine

  library-dlopen-macos:
    name: "Library dlopen: ${{ matrix.library }} (darwin)"
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        # openssl excluded: system libcrypto conflicts with tsuku-installed version (see #1090)
        library: [zlib, libyaml, gcc-libs]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            cmd/tsuku-dltest/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-dltest-${{ runner.os }}-${{ hashFiles('cmd/tsuku-dltest/Cargo.lock') }}
          restore-keys: |
            rust-dltest-${{ runner.os }}-

      - name: Run library dlopen test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: ./test/scripts/test-library-dlopen.sh ${{ matrix.library }} darwin
