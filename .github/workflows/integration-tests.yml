name: Integration Tests

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'test/scripts/**'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'test/scripts/**'
      - '.github/workflows/integration-tests.yml'

jobs:
  checksum-pinning:
    name: "Checksum Pinning Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Run checksum pinning tests across families
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          FAMILIES=(debian rhel arch alpine suse)
          FAILED=()
          for family in "${FAMILIES[@]}"; do
            echo "::group::Checksum pinning on $family"
            if ! timeout 300 ./test/scripts/test-checksum-pinning.sh "$family"; then
              FAILED+=("$family")
            fi
            echo "::endgroup::"
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed families: ${FAILED[*]}"
            exit 1
          fi
          echo "All checksum pinning tests passed"

  homebrew-linux:
    name: "Homebrew Linux Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Run homebrew recipe tests across families
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          # alpine excluded: pkg-config uses apk_install (not homebrew) on musl
          FAMILIES=(debian rhel arch suse)
          FAILED=()
          for family in "${FAMILIES[@]}"; do
            echo "::group::Homebrew pkg-config on $family"
            if ! timeout 300 ./test/scripts/test-homebrew-recipe.sh pkg-config "$family"; then
              FAILED+=("$family")
            fi
            echo "::endgroup::"
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed families: ${FAILED[*]}"
            exit 1
          fi
          echo "All homebrew tests passed"

  library-integrity:
    name: "Library Integrity Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Run library integrity tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          LIBRARIES=(zlib libyaml)
          FAILED=()
          for lib in "${LIBRARIES[@]}"; do
            echo "::group::Library integrity: $lib (debian)"
            if ! timeout 300 ./test/scripts/test-library-integrity.sh "$lib" debian; then
              FAILED+=("$lib")
            fi
            echo "::endgroup::"
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed libraries: ${FAILED[*]}"
            exit 1
          fi
          echo "All library integrity tests passed"

  library-dlopen-glibc:
    name: "Library dlopen Tests (glibc)"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            cmd/tsuku-dltest/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-dltest-${{ runner.os }}-${{ hashFiles('cmd/tsuku-dltest/Cargo.lock') }}
          restore-keys: |
            rust-dltest-${{ runner.os }}-

      - name: Run dlopen tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          # openssl excluded: system libcrypto.so.3 conflicts with tsuku-installed version (see #1090)
          LIBRARIES=(zlib libyaml gcc-libs)
          FAILED=()
          for lib in "${LIBRARIES[@]}"; do
            echo "::group::dlopen: $lib (glibc)"
            if ! timeout 300 ./test/scripts/test-library-dlopen.sh "$lib" debian; then
              FAILED+=("$lib")
            fi
            echo "::endgroup::"
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed libraries: ${FAILED[*]}"
            exit 1
          fi
          echo "All glibc dlopen tests passed"

  # musl/Alpine dlopen tests use recipe-derived package lists.
  # This validates that recipes correctly declare their system dependencies.
  library-dlopen-musl:
    name: "Library dlopen Tests (musl)"
    runs-on: ubuntu-latest
    container:
      image: golang:1.23-alpine
    timeout-minutes: 60
    env:
      GOTOOLCHAIN: auto
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install bootstrap dependencies
        run: |
          apk add --no-cache curl gcc musl-dev bash git
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable

      - name: Build tsuku
        run: go build -o tsuku ./cmd/tsuku

      - name: Run dlopen tests
        shell: bash -e {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          source $HOME/.cargo/env
          LIBRARIES=(zlib libyaml gcc-libs)
          FAILED=()
          for lib in "${LIBRARIES[@]}"; do
            echo "::group::dlopen: $lib (musl)"
            # Install recipe-declared packages for this library
            DEPS=$(./tsuku info --deps-only --system --family alpine "$lib")
            if [ -n "$DEPS" ]; then
              echo "Installing recipe-declared packages: $DEPS"
              apk add --no-cache $DEPS
            fi
            if ! timeout 300 ./test/scripts/test-library-dlopen.sh "$lib" alpine; then
              FAILED+=("$lib")
            fi
            echo "::endgroup::"
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed libraries: ${FAILED[*]}"
            exit 1
          fi
          echo "All musl dlopen tests passed"

  library-dlopen-macos:
    name: "Library dlopen Tests (darwin)"
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            cmd/tsuku-dltest/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-dltest-${{ runner.os }}-${{ hashFiles('cmd/tsuku-dltest/Cargo.lock') }}
          restore-keys: |
            rust-dltest-${{ runner.os }}-

      - name: Run dlopen tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSUKU_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}
        run: |
          # openssl excluded: system libcrypto conflicts with tsuku-installed version (see #1090)
          LIBRARIES=(zlib libyaml gcc-libs)
          FAILED=()
          for lib in "${LIBRARIES[@]}"; do
            echo "::group::dlopen: $lib (darwin)"
            if ! ./test/scripts/test-library-dlopen.sh "$lib" darwin; then
              FAILED+=("$lib")
            fi
            echo "::endgroup::"
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed libraries: ${FAILED[*]}"
            exit 1
          fi
          echo "All darwin dlopen tests passed"
