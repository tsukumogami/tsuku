name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # GoReleaser creates the draft release and builds Go binaries
  release:
    name: Release (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version-file: "go.mod"
          cache-dependency-path: go.sum

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Cannot release with untidy module files."
            exit 1
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29  # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release with notes from tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Fetch tag annotations (not included in checkout)
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" --force
          # Extract full tag annotation message
          git tag -l --format='%(contents)' "${TAG}" > /tmp/release-notes.md
          echo "Release notes extracted:"
          cat /tmp/release-notes.md
          # Update the release body with our curated notes
          gh release edit "$TAG" --notes-file /tmp/release-notes.md
          echo "Updated release $TAG with release notes"

  # Build Rust binary (tsuku-dltest) on native runners
  build-rust:
    name: "Build Rust (${{ matrix.platform }})"
    needs: [release]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc builds
          - platform: linux-amd64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: tsuku-dltest-linux-amd64
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: tsuku-dltest-linux-arm64
          # macOS builds
          - platform: darwin-amd64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            artifact: tsuku-dltest-darwin-amd64
          - platform: darwin-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            artifact: tsuku-dltest-darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: |
            cmd/tsuku-dltest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.75"

      - name: Inject version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s/^version = .*/version = \"$VERSION\"/" cmd/tsuku-dltest/Cargo.toml
          else
            sed -i "s/^version = .*/version = \"$VERSION\"/" cmd/tsuku-dltest/Cargo.toml
          fi
          echo "Building version: $VERSION"

      - name: Build release binary
        working-directory: cmd/tsuku-dltest
        run: cargo build --release

      - name: Sign binary (macOS)
        if: startsWith(matrix.runner, 'macos')
        run: codesign -s - cmd/tsuku-dltest/target/release/tsuku-dltest

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp cmd/tsuku-dltest/target/release/tsuku-dltest "${{ matrix.artifact }}"
          gh release upload "${GITHUB_REF_NAME}" "${{ matrix.artifact }}" --clobber

  # Build musl variants of tsuku-dltest (re-enabled by M47 platform compatibility work)
  # Alpine image read from container-images.json (shared with platform-integration.yml)
  build-rust-musl:
    name: "Build Rust (${{ matrix.platform }}-musl)"
    needs: [release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-22.04
            artifact: tsuku-dltest-linux-amd64-musl
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            artifact: tsuku-dltest-linux-arm64-musl
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: |
            cmd/tsuku-dltest
            container-images.json

      - name: Inject version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" cmd/tsuku-dltest/Cargo.toml
          echo "Building version: $VERSION"

      - name: Build in Alpine container
        run: |
          ALPINE_IMAGE=$(jq -r '.alpine.image' container-images.json)
          docker run --rm -v "$PWD:/workspace" -w /workspace "$ALPINE_IMAGE" sh -c '
            apk add --no-cache rust cargo
            cd cmd/tsuku-dltest
            cargo build --release
          '

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp cmd/tsuku-dltest/target/release/tsuku-dltest "${{ matrix.artifact }}"
          gh release upload "${GITHUB_REF_NAME}" "${{ matrix.artifact }}" --clobber

  # Build tsuku-llm addon for all platforms (GPU backends)
  # Artifact naming: tsuku-llm-v{version}-{os}-{arch}[-{backend}]
  # macOS omits backend suffix (Metal is the only option per arch).
  #
  # CUDA version coupling: builds against CUDA toolkit 12.4. The cuda-runtime
  # recipe (recipes/c/cuda-runtime.toml) must provide ABI-compatible 12.x libs.
  build-llm:
    name: "Build tsuku-llm (${{ matrix.platform }})"
    needs: [release]
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds (Metal support built-in)
          - platform: darwin-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: darwin-arm64
            backend: metal
          - platform: darwin-amd64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            artifact_suffix: darwin-amd64
            backend: metal

          # Linux AMD64 builds
          - platform: linux-amd64-cuda
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-amd64-cuda
            backend: cuda
          - platform: linux-amd64-vulkan
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-amd64-vulkan
            backend: vulkan
          # Linux ARM64 builds
          - platform: linux-arm64-cuda
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_suffix: linux-arm64-cuda
            backend: cuda
          - platform: linux-arm64-vulkan
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_suffix: linux-arm64-vulkan
            backend: vulkan
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          sparse-checkout: |
            tsuku-llm
            proto

      - name: Compute artifact name
        id: artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARTIFACT_NAME="tsuku-llm-v${VERSION}-${{ matrix.artifact_suffix }}"
          echo "name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Artifact name: ${ARTIFACT_NAME}"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.75"

      - name: Install protobuf compiler
        run: |
          if [[ "$OSTYPE" == "darwin"* ]]; then
            brew install protobuf
          else
            sudo apt-get update
            sudo apt-get install -y protobuf-compiler
          fi

      - name: Install CUDA toolkit (Linux CUDA builds)
        if: matrix.backend == 'cuda' && startsWith(matrix.runner, 'ubuntu')
        run: |
          # Install CUDA toolkit for building.
          # CUDA version coupling: changing the major version here requires
          # updating recipes/c/cuda-runtime.toml to provide compatible libraries.
          # CUDA 12 maintains forward compat within the major version.
          ARCH=$(dpkg --print-architecture)
          if [ "$ARCH" = "amd64" ]; then
            REPO_ARCH="x86_64"
            DISTRO="ubuntu2204"
            CUDA_VER="12-4"
          else
            # cuda-toolkit-12-4 is not published for sbsa (ARM64).
            # Use 12-6 which is the most stable version available.
            REPO_ARCH="sbsa"
            DISTRO="ubuntu2404"
            CUDA_VER="12-6"
          fi
          wget "https://developer.download.nvidia.com/compute/cuda/repos/${DISTRO}/${REPO_ARCH}/cuda-keyring_1.1-1_all.deb"
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y "cuda-toolkit-${CUDA_VER}"
          # Resolve the installed CUDA path
          CUDA_MAJOR_MINOR="${CUDA_VER//-/.}"
          echo "/usr/local/cuda-${CUDA_MAJOR_MINOR}/bin" >> $GITHUB_PATH
          echo "CUDA_PATH=/usr/local/cuda-${CUDA_MAJOR_MINOR}" >> $GITHUB_ENV

      - name: Install Vulkan SDK (Linux Vulkan builds)
        if: matrix.backend == 'vulkan' && startsWith(matrix.runner, 'ubuntu')
        run: |
          # Install Vulkan SDK headers and libraries.
          # The Lunarg PPA only provides x86_64 packages. On ARM64, install
          # the distro-provided Vulkan development headers instead.
          ARCH=$(dpkg --print-architecture)
          if [ "$ARCH" = "amd64" ]; then
            wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
            sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
              https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
            sudo apt-get update
            sudo apt-get install -y vulkan-sdk
          else
            sudo apt-get update
            sudo apt-get install -y libvulkan-dev spirv-tools glslang-tools
          fi
          echo "VULKAN_SDK=/usr" >> $GITHUB_ENV

      - name: Inject version
        run: |
          VERSION="${{ steps.artifact.outputs.version }}"
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s/^version = .*/version = \"$VERSION\"/" tsuku-llm/Cargo.toml
          else
            sed -i "s/^version = .*/version = \"$VERSION\"/" tsuku-llm/Cargo.toml
          fi
          echo "Building version: $VERSION"

      - name: Build release binary
        working-directory: tsuku-llm
        env:
          LLAMA_BACKEND: ${{ matrix.backend }}
        run: |
          # Set backend-specific features
          case "${{ matrix.backend }}" in
            metal)
              cargo build --release --features metal
              ;;
            cuda)
              cargo build --release --features cuda
              ;;
            vulkan)
              cargo build --release --features vulkan
              ;;
          esac

      - name: Sign binary (macOS)
        if: startsWith(matrix.runner, 'macos')
        run: codesign -s - tsuku-llm/target/release/tsuku-llm

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp tsuku-llm/target/release/tsuku-llm "${{ steps.artifact.outputs.name }}"
          gh release upload "${GITHUB_REF_NAME}" "${{ steps.artifact.outputs.name }}" --clobber

  # Integration tests on native platforms
  integration-test:
    name: "Integration Test (${{ matrix.platform }})"
    needs: [release, build-rust, build-llm]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-22.04
            os: linux
            arch: amd64
            dltest_binary: tsuku-dltest-linux-amd64
            llm_binary: ""
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
            dltest_binary: tsuku-dltest-linux-arm64
            llm_binary: ""
          - platform: darwin-amd64
            runner: macos-15-intel
            os: darwin
            arch: amd64
            dltest_binary: tsuku-dltest-darwin-amd64
            llm_binary: tsuku-llm-v{version}-darwin-amd64
          - platform: darwin-arm64
            runner: macos-latest
            os: darwin
            arch: arm64
            dltest_binary: tsuku-dltest-darwin-arm64
            llm_binary: tsuku-llm-v{version}-darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Download binaries from draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # goreleaser default naming: tsuku-{os}-{arch}_{version}_{os}_{arch}
          TSUKU_BINARY="tsuku-${{ matrix.os }}-${{ matrix.arch }}_${VERSION}_${{ matrix.os }}_${{ matrix.arch }}"
          mkdir -p ./artifacts

          # Build download patterns
          PATTERNS=("--pattern" "${TSUKU_BINARY}" "--pattern" "${{ matrix.dltest_binary }}")

          # Add llm binary pattern for macOS runners
          LLM_TEMPLATE="${{ matrix.llm_binary }}"
          if [ -n "$LLM_TEMPLATE" ]; then
            LLM_BINARY="${LLM_TEMPLATE//\{version\}/$VERSION}"
            PATTERNS+=("--pattern" "$LLM_BINARY")
            echo "LLM_BINARY=${LLM_BINARY}" >> "$GITHUB_ENV"
          fi

          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            "${PATTERNS[@]}" \
            --dir ./artifacts
          chmod +x ./artifacts/*
          # Store binary name for later steps
          echo "TSUKU_BINARY=${TSUKU_BINARY}" >> "$GITHUB_ENV"

      - name: Validate tsuku version
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED_VERSION="${TAG#v}"
          TSUKU_VERSION=$(./artifacts/${TSUKU_BINARY} --version 2>&1)
          echo "tsuku version output: $TSUKU_VERSION"
          if ! echo "$TSUKU_VERSION" | grep -q "$EXPECTED_VERSION"; then
            echo "ERROR: tsuku version mismatch"
            echo "Expected to contain: $EXPECTED_VERSION"
            echo "Got: $TSUKU_VERSION"
            exit 1
          fi
          echo "tsuku version check passed"

      - name: Validate tsuku-dltest version
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED_VERSION="${TAG#v}"
          DLTEST_VERSION=$(./artifacts/${{ matrix.dltest_binary }} --version 2>&1)
          echo "tsuku-dltest version output: $DLTEST_VERSION"
          if ! echo "$DLTEST_VERSION" | grep -q "$EXPECTED_VERSION"; then
            echo "ERROR: tsuku-dltest version mismatch"
            echo "Expected to contain: $EXPECTED_VERSION"
            echo "Got: $DLTEST_VERSION"
            exit 1
          fi
          echo "tsuku-dltest version check passed"

      - name: Validate tsuku-llm binary (macOS only)
        if: env.LLM_BINARY != ''
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED_VERSION="${TAG#v}"
          # Verify binary runs and shows help
          ./artifacts/${LLM_BINARY} --help
          # Verify version output
          LLM_VERSION=$(./artifacts/${LLM_BINARY} --version 2>&1 || true)
          echo "tsuku-llm version output: $LLM_VERSION"
          if ! echo "$LLM_VERSION" | grep -q "$EXPECTED_VERSION"; then
            echo "WARNING: tsuku-llm version string not found in output"
          fi
          echo "tsuku-llm validation passed"

  finalize-release:
    name: Finalize Release
    needs: [integration-test, build-rust-musl, build-llm]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all artifacts present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Go binaries use goreleaser default naming: tsuku-{os}-{arch}_{version}_{os}_{arch}
          # Rust binaries use simple naming: tsuku-dltest-{os}-{arch}
          EXPECTED_ARTIFACTS=(
            # Go binaries (from goreleaser) - versioned naming
            "tsuku-linux-amd64_${VERSION}_linux_amd64"
            "tsuku-linux-arm64_${VERSION}_linux_arm64"
            "tsuku-darwin-amd64_${VERSION}_darwin_amd64"
            "tsuku-darwin-arm64_${VERSION}_darwin_arm64"
            # Rust binaries - glibc (from build-rust)
            tsuku-dltest-linux-amd64
            tsuku-dltest-linux-arm64
            tsuku-dltest-darwin-amd64
            tsuku-dltest-darwin-arm64
            # Rust binaries - musl (from build-rust-musl)
            tsuku-dltest-linux-amd64-musl
            tsuku-dltest-linux-arm64-musl
            # LLM addon binaries (from build-llm)
            "tsuku-llm-v${VERSION}-darwin-arm64"
            "tsuku-llm-v${VERSION}-darwin-amd64"
            "tsuku-llm-v${VERSION}-linux-amd64-cuda"
            "tsuku-llm-v${VERSION}-linux-amd64-vulkan"
            "tsuku-llm-v${VERSION}-linux-arm64-cuda"
            "tsuku-llm-v${VERSION}-linux-arm64-vulkan"
          )

          echo "Verifying all ${#EXPECTED_ARTIFACTS[@]} artifacts are present..."
          ASSETS=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name')

          for artifact in "${EXPECTED_ARTIFACTS[@]}"; do
            if ! echo "$ASSETS" | grep -q "^${artifact}$"; then
              echo "ERROR: Missing artifact: $artifact"
              exit 1
            fi
            echo "Found: $artifact"
          done
          echo "All artifacts verified"

      - name: Download artifacts and generate checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p ./artifacts
          cd ./artifacts

          # Download all binary artifacts (exclude existing checksums.txt from goreleaser)
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "tsuku-*" \
            --skip-existing

          # Generate unified checksums for all binaries
          sha256sum tsuku-* > checksums.txt
          echo "Generated checksums.txt:"
          cat checksums.txt

      - name: Upload checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" ./artifacts/checksums.txt --clobber
          echo "Uploaded checksums.txt"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false
          echo "Published release $TAG"
