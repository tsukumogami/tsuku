codecov:
  notify:
    after_n_builds: 1

coverage:
  range: "70...90"
  status:
    project:
      default:
        target: 75%
        threshold: 1%
    patch:
      default:
        target: 50%

ignore:
  - "bundled/**/*"
  - "cmd/**/*"
  - "internal/install/**/*"
  - "internal/testutil/**/*"
  - "telemetry/**/*"
  - "website/**/*"
  - "*_test.go"
