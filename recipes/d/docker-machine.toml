[metadata]
  name = "docker-machine"
  description = "Create Docker hosts locally and on cloud providers"
  homepage = "https://docs.gitlab.com/runner/executors/docker_machine.html"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "docker-machine"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/docker-machine"]

[verify]
  command = "docker-machine --version"
  pattern = ""
