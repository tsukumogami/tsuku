[metadata]
  name = "diffutils"
  description = "File comparison utilities"
  homepage = "https://www.gnu.org/software/diffutils/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "diffutils"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/cmp", "bin/diff", "bin/diff3", "bin/sdiff"]

[verify]
  command = "cmp --version"
  pattern = ""
