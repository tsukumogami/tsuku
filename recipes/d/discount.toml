[metadata]
  name = "discount"
  description = "C implementation of Markdown"
  homepage = "https://www.pell.portland.or.us/~orc/Code/discount/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "discount"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/makepage", "bin/markdown", "bin/mkd2html", "bin/theme"]

[verify]
  command = "makepage --version"
  pattern = ""
