[metadata]
  name = "dagger"
  description = "Portable devkit for CI/CD pipelines"
  homepage = "https://dagger.io"
  version_format = ""
  requires_sudo = false
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "dagger"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/dagger"]

[verify]
  command = "dagger --version"
  pattern = ""
