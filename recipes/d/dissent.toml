[metadata]
  name = "dissent"
  description = "GTK4 Discord client in Go"
  homepage = "https://github.com/diamondburned/dissent"
  version_format = ""
  requires_sudo = false
  # macOS: missing runtime_dependencies (needs libadwaita)
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]
  runtime_dependencies = [
    "cairo",
    "gettext",
    "glib",
    "graphene",
  ]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "dissent"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/dissent"]

[verify]
  command = "dissent --version"
  pattern = ""
