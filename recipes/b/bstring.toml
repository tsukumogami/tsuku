[metadata]
  name = "bstring"
  description = "Fork of Paul Hsieh's Better String Library"
  homepage = "https://mike.steinert.ca/bstring/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "bstring"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "bstring"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libbstring.so", "lib/libbstring.so.1", "lib/libbstring.so.1.0.3", "lib/pkgconfig/bstring.pc", "include/bstraux.h", "include/bstrlib.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "bstring"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libbstring.1.dylib", "lib/libbstring.dylib", "lib/pkgconfig/bstring.pc", "include/bstraux.h", "include/bstrlib.h"]
  [steps.when]
    os = ["darwin"]
