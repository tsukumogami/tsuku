[metadata]
  name = "bwa"
  description = "Burrow-Wheeler Aligner for pairwise alignment of DNA"
  homepage = "https://github.com/lh3/bwa"
  version_format = ""
  requires_sudo = false
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "bwa"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/bwa"]

[verify]
  command = "bwa"
  pattern = ""
  mode = "output"
  reason = "bwa prints usage and exits non-zero when called without arguments or with --version"
  exit_code = 1
