[metadata]
name = "bazel"
description = "Fast, scalable, multi-language build system"
homepage = "https://bazel.build/"
version_format = "semver"
curated = true
# Bazel binaries embed an OpenJDK runtime that uses glibc-style dynamic
# linking; they fail to start on musl (Alpine has no bazel apk package).
supported_libc = ["glibc"]

# Linux: single binary published per architecture, glibc only.
[[steps]]
action = "github_file"
when = { os = ["linux"], libc = ["glibc"] }
repo = "bazelbuild/bazel"
asset_pattern = "bazel-{version}-linux-{arch}"
arch_mapping = { amd64 = "x86_64", arm64 = "arm64" }
binaries = [{src = "bazel-{version}-linux-{arch}", dest = "bin/bazel"}]

# macOS: per-arch single binary.
[[steps]]
action = "github_file"
when = { os = ["darwin"] }
repo = "bazelbuild/bazel"
asset_pattern = "bazel-{version}-darwin-{arch}"
arch_mapping = { amd64 = "x86_64", arm64 = "arm64" }
binaries = [{src = "bazel-{version}-darwin-{arch}", dest = "bin/bazel"}]

[verify]
command = "bazel --version"
pattern = "bazel {version}"
