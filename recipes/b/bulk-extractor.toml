  version_format = ""
  requires_sudo = false
  unsupported_platforms = ["darwin/arm64", "darwin/amd64", "linux/arm64"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
