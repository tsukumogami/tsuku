[metadata]
name = "velero"
description = "Kubernetes backup and restore"
homepage = "https://github.com/vmware-tanzu/velero"
version_format = "semver"
curated = true

# Linux: statically linked Go binary works on glibc and musl
[[steps]]
action = "github_archive"
when = { os = ["linux"], libc = ["glibc", "musl"] }
repo = "vmware-tanzu/velero"
asset_pattern = "velero-v{version}-linux-{arch}.tar.gz"
strip_dirs = 1
binaries = ["velero"]

# macOS: Intel and Apple Silicon binaries
[[steps]]
action = "github_archive"
when = { os = ["darwin"] }
repo = "vmware-tanzu/velero"
asset_pattern = "velero-v{version}-darwin-{arch}.tar.gz"
strip_dirs = 1
binaries = ["velero"]

[verify]
command = "velero version --client-only"
pattern = "{version}"
