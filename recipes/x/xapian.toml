[metadata]
  name = "xapian"
  description = "C++ search engine library"
  homepage = "https://xapian.org/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "xapian"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/copydatabase", "bin/quest", "bin/simpleexpand", "bin/simpleindex", "bin/simplesearch", "bin/xapian-check", "bin/xapian-compact", "bin/xapian-config", "bin/xapian-delve", "bin/xapian-metadata", "bin/xapian-pos", "bin/xapian-progsrv", "bin/xapian-replicate", "bin/xapian-replicate-server", "bin/xapian-tcpsrv"]

[verify]
  command = "copydatabase --version"
  pattern = ""
