[metadata]
  name = "xxhash"
  description = "Extremely fast non-cryptographic hash algorithm"
  homepage = "https://xxhash.com"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "xxhash"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/xxh128sum", "bin/xxh32sum", "bin/xxh3sum", "bin/xxh64sum", "bin/xxhsum"]

[verify]
  command = "xxh128sum --version"
  pattern = ""
