[metadata]
  name = "gitui"
  description = "Blazing fast terminal-ui for git written in rust"
  homepage = "https://github.com/gitui-org/gitui"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["openssl@3"]
  tier = 0
  type = ""
  llm_validation = "skipped"
supported_os = ["linux"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "gitui"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/gitui"]

[verify]
  command = "gitui --version"
  pattern = ""
