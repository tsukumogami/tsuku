[metadata]
  name = "gupnp-av"
  description = "Library to help implement UPnP A/V profiles"
  homepage = "https://wiki.gnome.org/GUPnP/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["gettext", "glib"]
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "gupnp-av"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libgupnp-av-1.0.so", "lib/libgupnp-av-1.0.so.3", "lib/libgupnp-av-1.0.so.3.14.4", "lib/pkgconfig/gupnp-av-1.0.pc", "include/gupnp-av-1.0/libgupnp-av/gupnp-av-enums.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-av-error.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-av.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-cds-last-change-parser.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-container.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-contributor.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-createclass.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-descriptor.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-item.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-object.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-parser.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-resource.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-writer.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-dlna.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-feature-list-parser.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-feature.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-last-change-parser.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-media-collection.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-protocol-info.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-search-criteria-parser.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "gupnp-av"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libgupnp-av-1.0.3.dylib", "lib/libgupnp-av-1.0.dylib", "lib/pkgconfig/gupnp-av-1.0.pc", "include/gupnp-av-1.0/libgupnp-av/gupnp-av-enums.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-av-error.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-av.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-cds-last-change-parser.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-container.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-contributor.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-createclass.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-descriptor.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-item.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-object.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-parser.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-resource.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-didl-lite-writer.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-dlna.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-feature-list-parser.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-feature.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-last-change-parser.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-media-collection.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-protocol-info.h", "include/gupnp-av-1.0/libgupnp-av/gupnp-search-criteria-parser.h"]
  [steps.when]
    os = ["darwin"]
