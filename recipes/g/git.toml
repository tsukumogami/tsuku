[metadata]
name = "git"
description = "Distributed revision control system"
homepage = "https://git-scm.com/"
version_format = "semver"
curated = true
dependencies = ["curl"]

# glibc Linux: Homebrew bottle
[[steps]]
action = "homebrew"
formula = "git"
when = { os = ["linux"], libc = ["glibc"] }

[[steps]]
action = "install_binaries"
install_mode = "directory"
outputs = ["bin/git"]
when = { os = ["linux"], libc = ["glibc"] }

# musl Linux: Alpine package
[[steps]]
action = "apk_install"
packages = ["git"]
when = { os = ["linux"], libc = ["musl"] }

# macOS: Homebrew
[[steps]]
action = "homebrew"
formula = "git"
when = { os = ["darwin"] }

[[steps]]
action = "install_binaries"
install_mode = "directory"
outputs = ["bin/git"]
when = { os = ["darwin"] }

[verify]
command = "git --version"
pattern = "git version {version}"
