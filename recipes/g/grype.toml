[metadata]
name = "grype"
description = "Vulnerability scanner for container images"
homepage = "https://github.com/anchore/grype"
version_format = "semver"
curated = true

# Linux: statically linked Go binary works on glibc and musl
[[steps]]
action = "github_archive"
when = { os = ["linux"], libc = ["glibc", "musl"] }
repo = "anchore/grype"
asset_pattern = "grype_{version}_linux_{arch}.tar.gz"
strip_dirs = 0
binaries = ["grype"]

# macOS: Intel and Apple Silicon binaries
[[steps]]
action = "github_archive"
when = { os = ["darwin"] }
repo = "anchore/grype"
asset_pattern = "grype_{version}_darwin_{arch}.tar.gz"
strip_dirs = 0
binaries = ["grype"]

[verify]
command = "grype version"
pattern = "{version}"
