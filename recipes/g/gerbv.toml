[metadata]
  name = "gerbv"
  description = "Gerber (RS-274X) viewer"
  homepage = "https://gerbv.github.io/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["cairo", "glib", "gettext"]
  # macOS: dyld fails to load self-library libgerbv.1.dylib
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "gerbv"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/gerbv"]

[verify]
  command = "gerbv --version"
  pattern = ""
