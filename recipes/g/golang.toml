[metadata]
name = "golang"
description = "The Go programming language compiler and tools"
homepage = "https://go.dev/"
version_format = "semver"
curated = true

[version]
github_repo = "golang/go"

[[steps]]
action = "download_archive"
when = { os = ["linux"], libc = ["glibc", "musl"] }
url = "https://go.dev/dl/go{version}.linux-{arch}.tar.gz"
strip_dirs = 1
install_mode = "directory"
binaries = ["bin/go", "bin/gofmt"]

[[steps]]
action = "download_archive"
when = { os = ["darwin"] }
url = "https://go.dev/dl/go{version}.darwin-{arch}.tar.gz"
strip_dirs = 1
install_mode = "directory"
binaries = ["bin/go", "bin/gofmt"]

[verify]
command = "go version"
pattern = "go{version}"
