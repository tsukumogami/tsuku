[metadata]
  name = "git-delta"
  description = "Syntax-highlighting pager for git and diff output"
  homepage = "https://github.com/dandavison/delta"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["libgit2", "oniguruma"]
  # macOS: blocked by rpath issue (https://github.com/tsukumogami/tsuku/issues/1965)
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "git-delta"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/delta"]

[verify]
  command = "delta --version"
  pattern = ""
