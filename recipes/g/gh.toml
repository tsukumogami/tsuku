[metadata]
name = "gh"
description = "GitHub command-line tool"
homepage = "https://cli.github.com/"
version_format = "semver"
curated = true
supported_os = ["darwin", "linux"]
supported_arch = ["amd64", "arm64"]

[version]
github_repo = "cli/cli"
tag_prefix = "v"

# macOS: GitHub release zip (gh_VERSION_macOS_ARCH.zip)
[[steps]]
action = "github_archive"
when = { os = ["darwin"] }
repo = "cli/cli"
asset_pattern = "gh_{version}_{os}_{arch}.zip"
strip_dirs = 1
binaries = ["bin/gh"]
os_mapping = { darwin = "macOS" }
arch_mapping = { amd64 = "amd64", arm64 = "arm64" }

# Linux: GitHub release tarball (gh_VERSION_linux_ARCH.tar.gz)
[[steps]]
action = "github_archive"
when = { os = ["linux"] }
repo = "cli/cli"
asset_pattern = "gh_{version}_{os}_{arch}.tar.gz"
strip_dirs = 1
binaries = ["bin/gh"]
os_mapping = { linux = "linux" }
arch_mapping = { amd64 = "amd64", arm64 = "arm64" }

[verify]
command = "gh --version"
pattern = ""
