[metadata]
  name = "goreleaser"
  description = "Deliver Go binaries as fast and easily as possible"
  homepage = "https://goreleaser.com/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "goreleaser"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/goreleaser"]

[verify]
  command = "goreleaser --version"
  pattern = ""
