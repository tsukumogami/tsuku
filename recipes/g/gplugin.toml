[metadata]
  name = "gplugin"
  description = "GObject based library that implements a reusable plugin system"
  homepage = "https://keep.imfreedom.org/gplugin/gplugin/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["glib", "gettext"]
  # macOS: dyld fails to load self-library libgplugin.0.dylib
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "gplugin"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/gplugin-gtk4-viewer", "bin/gplugin-query"]

[verify]
  command = "gplugin-gtk4-viewer --version"
  pattern = ""
