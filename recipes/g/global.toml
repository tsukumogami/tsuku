[metadata]
  name = "global"
  description = "Simple way to load your configs from yaml/aws/gcp"
  homepage = "https://github.com/railsware/global"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
unsupported_platforms = ["linux/arm64", "linux/debian", "linux/rhel", "linux/arch/amd64", "linux/suse", "linux/alpine"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "gem_install"
  executables = ["console"]
  gem = "global"

[verify]
  command = "console --version"
  pattern = ""
