[metadata]
  name = "gputils"
  description = "GNU PIC Utilities"
  homepage = "https://gputils.sourceforge.io/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "gputils"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/gpasm", "bin/gpdasm", "bin/gplib", "bin/gplink", "bin/gpstrip", "bin/gpvc", "bin/gpvo"]

[verify]
  command = "gpasm --version"
  pattern = ""
