[metadata]
  name = "gkrellm"
  description = "Extensible GTK system monitoring application"
  homepage = "https://billw2.github.io/gkrellm/gkrellm.html"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["gettext", "glib", "openssl"]
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "gkrellm"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "gkrellm"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/gkrellm", "bin/gkrellmd"]

[verify]
  command = "gkrellm --version"
  pattern = ""
