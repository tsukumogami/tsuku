[metadata]
  name = "tdb"
  description = "Trivial DataBase, by the Samba project"
  homepage = "https://tdb.samba.org/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "tdb"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/tdbbackup", "bin/tdbdump", "bin/tdbrestore", "bin/tdbtool"]

[verify]
  command = "tdbbackup --version"
  pattern = ""
