[metadata]
  name = "tfstate-lookup"
  description = "Lookup resource attributes in tfstate"
  homepage = "https://github.com/fujiwara/tfstate-lookup"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "tfstate-lookup"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/tfstate-lookup"]

[verify]
  command = "tfstate-lookup --version"
  pattern = ""
