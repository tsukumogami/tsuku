[metadata]
name = "tmux"
description = "Terminal multiplexer"
homepage = "https://github.com/tmux/tmux"
# tmux uses non-standard versions like "3.6a"; raw format preserves them as-is
version_format = "raw"
curated = true
# The homebrew bottle's binary references libevent, libutf8proc, and libncurses
# from sibling packages. The engine reads this list at install time and patches
# RPATH entries pointing at $TSUKU_HOME/libs/<dep>-<version>/lib relative to the
# binary's location, so no per-step `dependencies` or `set_rpath` is required.
runtime_dependencies = ["libevent", "utf8proc", "ncurses"]

# glibc Linux: Homebrew bottle
[[steps]]
action = "homebrew"
formula = "tmux"
when = { os = ["linux"], libc = ["glibc"] }

[[steps]]
action = "install_binaries"
install_mode = "directory"
outputs = ["bin/tmux"]
when = { os = ["linux"], libc = ["glibc"] }

# musl Linux: Alpine package
[[steps]]
action = "apk_install"
packages = ["tmux"]
when = { os = ["linux"], libc = ["musl"] }

# macOS: Homebrew bottle. The bottle's binary load chain references
# libevent, libutf8proc, and libncurses; the engine resolves those via
# the metadata-level `runtime_dependencies` declared above.
[[steps]]
action = "homebrew"
formula = "tmux"
when = { os = ["darwin"] }

[[steps]]
action = "install_binaries"
when = { os = ["darwin"] }
install_mode = "directory"
outputs = ["bin/tmux"]

[verify]
command = "tmux -V"
pattern = "tmux {version}"
