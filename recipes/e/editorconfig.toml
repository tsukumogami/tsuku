[metadata]
  name = "editorconfig"
  description = "Maintain consistent coding style between multiple editors"
  homepage = "https://editorconfig.org/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["pcre2"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "editorconfig"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/editorconfig", "bin/editorconfig-0.12.10"]

[verify]
  command = "editorconfig --version"
  pattern = ""
