[metadata]
  name = "enter-tex"
  description = "TeX/LaTeX text editor"
  homepage = "https://gitlab.gnome.org/swilmet/enter-tex"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["gettext", "glib", "libgee"]
  # macOS: missing libgedit-tepl (undeclared dep)
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "enter-tex"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "enter-tex"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/enter-tex"]

[verify]
  command = "enter-tex --version"
  pattern = ""
