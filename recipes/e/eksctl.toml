[metadata]
name = "eksctl"
description = "CLI for Amazon EKS"
homepage = "https://github.com/eksctl-io/eksctl"
version_format = "semver"
curated = true

# Linux: statically linked Go binary works on glibc and musl
[[steps]]
action = "github_archive"
when = { os = ["linux"], libc = ["glibc", "musl"] }
repo = "eksctl-io/eksctl"
asset_pattern = "eksctl_Linux_{arch}.tar.gz"
strip_dirs = 0
binaries = ["eksctl"]

# macOS: Intel and Apple Silicon binaries
[[steps]]
action = "github_archive"
when = { os = ["darwin"] }
repo = "eksctl-io/eksctl"
asset_pattern = "eksctl_Darwin_{arch}.tar.gz"
strip_dirs = 0
binaries = ["eksctl"]

[verify]
command = "eksctl version"
pattern = "{version}"
