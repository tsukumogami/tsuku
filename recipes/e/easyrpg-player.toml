[metadata]
  name = "easyrpg-player"
  description = "RPG Maker 2000/2003 games interpreter"
  homepage = "https://easyrpg.org/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = [
    "fmt",
    "freetype",
    "inih",
    "libogg",
    "libpng",
    "libsndfile",
    "libxmp",
    "mpg123",
    "pixman",
    "sdl2",
    "speexdsp",
  ]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "easyrpg-player"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "easyrpg-player"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/easyrpg-player"]

[verify]
  command = "easyrpg-player --version"
  pattern = ""
