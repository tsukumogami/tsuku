[metadata]
  name = "etcd"
  description = "Key value store for shared configuration and service discovery"
  homepage = "https://github.com/etcd-io/etcd"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "etcd"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/etcd", "bin/etcdctl", "bin/etcdutl"]

[verify]
  command = "etcd --version"
  pattern = ""
