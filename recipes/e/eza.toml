[metadata]
  name = "eza"
  description = "Modern, maintained replacement for ls"
  homepage = "https://github.com/eza-community/eza"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["libgit2"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "eza"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/eza"]

[verify]
  command = "eza --version"
  pattern = ""
