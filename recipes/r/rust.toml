[metadata]
name = "rust"
description = "Rust programming language and Cargo package manager"
homepage = "https://www.rust-lang.org"
version_format = "semver"
curated = true

[version]
github_repo = "rust-lang/rust"

[[steps]]
action = "download"
when = { os = ["linux"], libc = ["glibc"] }
url = "https://static.rust-lang.org/dist/rust-{version}-{arch}-unknown-linux-gnu.tar.gz"
checksum_url = "https://static.rust-lang.org/dist/rust-{version}-{arch}-unknown-linux-gnu.tar.gz.sha256"
arch_mapping = { amd64 = "x86_64", arm64 = "aarch64" }

[[steps]]
action = "extract"
when = { os = ["linux"], libc = ["glibc"] }
archive = "rust-{version}-{arch}-unknown-linux-gnu.tar.gz"
format = "tar.gz"
strip_dirs = 1
arch_mapping = { amd64 = "x86_64", arm64 = "aarch64" }

[[steps]]
action = "run_command"
when = { os = ["linux"], libc = ["glibc"] }
command = "./install.sh --prefix={install_dir} --disable-ldconfig"

[[steps]]
action = "install_binaries"
when = { os = ["linux"], libc = ["glibc"] }
binaries = ["bin/cargo", "bin/rustc", "bin/rustup"]
install_mode = "directory"

[[steps]]
action = "apk_install"
packages = ["libgcc"]
when = { os = ["linux"], linux_family = "alpine" }

[[steps]]
action = "download"
when = { os = ["linux"], linux_family = "alpine" }
url = "https://static.rust-lang.org/dist/rust-{version}-{arch}-unknown-linux-musl.tar.gz"
checksum_url = "https://static.rust-lang.org/dist/rust-{version}-{arch}-unknown-linux-musl.tar.gz.sha256"
arch_mapping = { amd64 = "x86_64", arm64 = "aarch64" }

[[steps]]
action = "extract"
when = { os = ["linux"], linux_family = "alpine" }
archive = "rust-{version}-{arch}-unknown-linux-musl.tar.gz"
format = "tar.gz"
strip_dirs = 1
arch_mapping = { amd64 = "x86_64", arm64 = "aarch64" }

[[steps]]
action = "run_command"
when = { os = ["linux"], linux_family = "alpine" }
command = "./install.sh --prefix={install_dir} --disable-ldconfig"
dependencies = ["bash"]

[[steps]]
action = "install_binaries"
when = { os = ["linux"], linux_family = "alpine" }
binaries = ["bin/cargo", "bin/rustc", "bin/rustup"]
install_mode = "directory"

[[steps]]
action = "download"
when = { os = ["darwin"] }
url = "https://static.rust-lang.org/dist/rust-{version}-{arch}-apple-darwin.tar.gz"
checksum_url = "https://static.rust-lang.org/dist/rust-{version}-{arch}-apple-darwin.tar.gz.sha256"
arch_mapping = { amd64 = "x86_64", arm64 = "aarch64" }

[[steps]]
action = "extract"
when = { os = ["darwin"] }
archive = "rust-{version}-{arch}-apple-darwin.tar.gz"
format = "tar.gz"
strip_dirs = 1
arch_mapping = { amd64 = "x86_64", arm64 = "aarch64" }

[[steps]]
action = "run_command"
when = { os = ["darwin"] }
command = "./install.sh --prefix={install_dir} --disable-ldconfig"

[[steps]]
action = "install_binaries"
when = { os = ["darwin"] }
binaries = ["bin/cargo", "bin/rustc", "bin/rustup"]
install_mode = "directory"

[verify]
command = "cargo --version"
pattern = "cargo {version}"
