[metadata]
name = "rbenv"
description = "Manage your app's Ruby environment"
homepage = "https://github.com/rbenv/rbenv"
version_format = "semver"
curated = true

# glibc Linux: Homebrew bottle
[[steps]]
action = "homebrew"
formula = "rbenv"
when = { os = ["linux"], libc = ["glibc"] }

[[steps]]
action = "install_binaries"
install_mode = "directory"
outputs = ["bin/rbenv"]
when = { os = ["linux"], libc = ["glibc"] }

# musl Linux: Alpine package
[[steps]]
action = "apk_install"
packages = ["rbenv"]
when = { os = ["linux"], libc = ["musl"] }

# macOS: Homebrew
[[steps]]
action = "homebrew"
formula = "rbenv"
when = { os = ["darwin"] }

[[steps]]
action = "install_binaries"
install_mode = "directory"
outputs = ["bin/rbenv"]
when = { os = ["darwin"] }

[verify]
command = "rbenv --version"
pattern = "rbenv {version}"
