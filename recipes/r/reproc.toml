[metadata]
  name = "reproc"
  description = "Cross-platform (C99/C++11) process library"
  homepage = "https://github.com/DaanDeMeyer/reproc"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "reproc"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "reproc"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libreproc++.a", "lib/libreproc++.so", "lib/libreproc++.so.14", "lib/libreproc++.so.14.2.4", "lib/libreproc.a", "lib/libreproc.so", "lib/libreproc.so.14", "lib/libreproc.so.14.2.4", "lib/pkgconfig/reproc++.pc", "lib/pkgconfig/reproc.pc", "include/reproc/drain.h", "include/reproc/export.h", "include/reproc/reproc.h", "include/reproc/run.h", "include/reproc++/arguments.hpp", "include/reproc++/detail/array.hpp", "include/reproc++/detail/type_traits.hpp", "include/reproc++/drain.hpp", "include/reproc++/env.hpp", "include/reproc++/export.hpp", "include/reproc++/input.hpp", "include/reproc++/reproc.hpp", "include/reproc++/run.hpp"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "reproc"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libreproc++.14.2.4.dylib", "lib/libreproc++.14.dylib", "lib/libreproc++.a", "lib/libreproc++.dylib", "lib/libreproc.14.2.4.dylib", "lib/libreproc.14.dylib", "lib/libreproc.a", "lib/libreproc.dylib", "lib/pkgconfig/reproc++.pc", "lib/pkgconfig/reproc.pc", "include/reproc/drain.h", "include/reproc/export.h", "include/reproc/reproc.h", "include/reproc/run.h", "include/reproc++/arguments.hpp", "include/reproc++/detail/array.hpp", "include/reproc++/detail/type_traits.hpp", "include/reproc++/drain.hpp", "include/reproc++/env.hpp", "include/reproc++/export.hpp", "include/reproc++/input.hpp", "include/reproc++/reproc.hpp", "include/reproc++/run.hpp"]
  [steps.when]
    os = ["darwin"]
