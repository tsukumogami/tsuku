[metadata]
  name = "rpds-py"
  description = "Python bindings to Rust's persistent data structures"
  homepage = "https://rpds.readthedocs.io/en/latest/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "rpds-py"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/python3.13/site-packages/rpds/rpds.cpython-313-x86_64-linux-gnu.so", "lib/python3.14/site-packages/rpds/rpds.cpython-314-x86_64-linux-gnu.so"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "rpds-py"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/python3.13/site-packages/rpds/rpds.cpython-313-darwin.so", "lib/python3.14/site-packages/rpds/rpds.cpython-314-darwin.so"]
  [steps.when]
    os = ["darwin"]
