[metadata]
  name = "ripgrep"
  description = "Search tool like grep and The Silver Searcher"
  homepage = "https://github.com/BurntSushi/ripgrep"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["pcre2"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "ripgrep"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/rg"]

[verify]
  command = "rg --version"
  pattern = ""
