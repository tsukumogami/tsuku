[metadata]
  name = "readosm"
  description = "Extract valid data from an Open Street Map input file"
  homepage = "https://www.gaia-gis.it/fossil/readosm/index"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "readosm"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "readosm"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libreadosm.a", "lib/libreadosm.so", "lib/libreadosm.so.1", "lib/libreadosm.so.1.0.1", "lib/pkgconfig/readosm.pc", "include/readosm.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "readosm"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libreadosm.1.dylib", "lib/libreadosm.a", "lib/libreadosm.dylib", "lib/pkgconfig/readosm.pc", "include/readosm.h"]
  [steps.when]
    os = ["darwin"]
