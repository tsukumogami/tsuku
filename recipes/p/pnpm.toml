[metadata]
name = "pnpm"
description = "Fast, disk-space-efficient package manager for Node.js"
homepage = "https://pnpm.io/"
version_format = "semver"
curated = true

# glibc Linux
[[steps]]
action = "github_file"
repo = "pnpm/pnpm"
when = { os = ["linux"], libc = ["glibc"] }
asset_pattern = "pnpm-linux-{arch}"
binary = "pnpm"
arch_mapping = { amd64 = "x64", arm64 = "arm64" }

# musl Linux (static build works on Alpine)
[[steps]]
action = "github_file"
repo = "pnpm/pnpm"
when = { os = ["linux"], libc = ["musl"] }
asset_pattern = "pnpm-linuxstatic-{arch}"
binary = "pnpm"
arch_mapping = { amd64 = "x64", arm64 = "arm64" }

# macOS
[[steps]]
action = "github_file"
repo = "pnpm/pnpm"
when = { os = ["darwin"] }
asset_pattern = "pnpm-macos-{arch}"
binary = "pnpm"
arch_mapping = { amd64 = "x64", arm64 = "arm64" }

[verify]
command = "pnpm --version"
pattern = "{version}"
