[metadata]
  name = "pugixml"
  description = "Light-weight C++ XML processing library"
  homepage = "https://pugixml.org/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "pugixml"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "pugixml"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libpugixml.a", "lib/libpugixml.so", "lib/libpugixml.so.1", "lib/libpugixml.so.1.15", "lib/pkgconfig/pugixml.pc", "include/pugiconfig.hpp", "include/pugixml.hpp"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "pugixml"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libpugixml.1.15.dylib", "lib/libpugixml.1.dylib", "lib/libpugixml.a", "lib/libpugixml.dylib", "lib/pkgconfig/pugixml.pc", "include/pugiconfig.hpp", "include/pugixml.hpp"]
  [steps.when]
    os = ["darwin"]
