[metadata]
  name = "pixman"
  description = "Low-level library for pixel manipulation"
  homepage = "https://cairographics.org/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "pixman"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "pixman"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libpixman-1.so", "lib/libpixman-1.so.0", "lib/libpixman-1.so.0.46.4", "lib/pkgconfig/pixman-1.pc", "include/pixman-1/pixman-version.h", "include/pixman-1/pixman.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "pixman"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libpixman-1.0.dylib", "lib/libpixman-1.dylib", "lib/pkgconfig/pixman-1.pc", "include/pixman-1/pixman-version.h", "include/pixman-1/pixman.h"]
  [steps.when]
    os = ["darwin"]
