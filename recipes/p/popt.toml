[metadata]
  name = "popt"
  description = "Library like getopt(3) with a number of enhancements"
  homepage = "https://github.com/rpm-software-management/popt"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "popt"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libpopt.a", "lib/libpopt.so", "lib/libpopt.so.0", "lib/libpopt.so.0.0.2", "lib/pkgconfig/popt.pc", "include/popt.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "popt"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libpopt.0.dylib", "lib/libpopt.a", "lib/libpopt.dylib", "lib/pkgconfig/popt.pc", "include/popt.h"]
  [steps.when]
    os = ["darwin"]
