[metadata]
  name = "powerman"
  description = "Control (remotely and in parallel) switched power distribution units"
  homepage = "https://github.com/chaos/powerman"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
  runtime_dependencies = ["jansson"]
  # macOS: blocked by rpath issue (https://github.com/tsukumogami/tsuku/issues/1965)
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "powerman"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "powerman"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/pm", "bin/powerman"]

[verify]
  command = "pm --version"
  pattern = ""
