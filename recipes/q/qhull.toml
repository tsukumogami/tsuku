[metadata]
  name = "qhull"
  description = "Computes convex hulls in n dimensions"
  homepage = "https://www.qhull.org/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64", "linux/arm64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "qhull"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/qconvex", "bin/qdelaunay", "bin/qhalf", "bin/qhull", "bin/qvoronoi", "bin/rbox"]

[verify]
  command = "qconvex --version"
  pattern = ""
