[metadata]
  name = "qtserialport"
  description = "Provides classes to interact with hardware and virtual serial ports"
  homepage = "https://www.qt.io/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["qtbase"]
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "qtserialport"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "qtserialport"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libQt6SerialPort.so", "lib/libQt6SerialPort.so.6", "lib/libQt6SerialPort.so.6.10.2", "lib/pkgconfig/Qt6SerialPort.pc", "include/QtSerialPort/6.10.2/QtSerialPort/private/qserialport_p.h", "include/QtSerialPort/6.10.2/QtSerialPort/private/qserialportinfo_p.h", "include/QtSerialPort/6.10.2/QtSerialPort/private/qtserialport-config_p.h", "include/QtSerialPort/QSerialPort", "include/QtSerialPort/QSerialPortInfo", "include/QtSerialPort/QtSerialPort", "include/QtSerialPort/QtSerialPortDepends", "include/QtSerialPort/QtSerialPortVersion", "include/QtSerialPort/qserialport.h", "include/QtSerialPort/qserialportglobal.h", "include/QtSerialPort/qserialportinfo.h", "include/QtSerialPort/qtserialport-config.h", "include/QtSerialPort/qtserialportexports.h", "include/QtSerialPort/qtserialportversion.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "qtserialport"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/pkgconfig/Qt6SerialPort.pc"]
  [steps.when]
    os = ["darwin"]
