[metadata]
  name = "nim"
  description = "Statically typed compiled systems programming language"
  homepage = "https://nim-lang.org/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "nim"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/atlas", "bin/nim", "bin/nimble", "bin/nimgrep", "bin/nimpretty", "bin/nimsuggest", "bin/testament"]

[verify]
  command = "atlas --version"
  pattern = ""
