[metadata]
  name = "nss"
  description = "Libraries for security-enabled client and server applications"
  homepage = "https://firefox-source-docs.mozilla.org/security/nss/index.html"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["nspr"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "nss"

[[steps]]
