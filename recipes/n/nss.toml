  binaries = ["bin/addbuiltin", "bin/atob", "bin/baddbdir", "bin/bltest", "bin/btoa", "bin/certutil", "bin/chktest", "bin/cmsutil", "bin/conflict", "bin/crlutil", "bin/crmftest", "bin/dbtest", "bin/dbtool", "bin/derdump", "bin/dertimetest", "bin/digest", "bin/ecperf", "bin/encodeinttest", "bin/fbectest", "bin/fipstest", "bin/httpserv", "bin/listsuites", "bin/lowhashtest", "bin/makepqg", "bin/mangle", "bin/modutil", "bin/multinit", "bin/nonspr10", "bin/nss-config", "bin/nss-policy-check", "bin/nssdefaults", "bin/ocspclnt", "bin/ocspresp", "bin/oidcalc", "bin/p7content", "bin/p7env", "bin/p7sign", "bin/p7verify", "bin/pk11ectest", "bin/pk11gcmtest", "bin/pk11importtest", "bin/pk11mode", "bin/pk12util", "bin/pk1sign", "bin/pkix-errcodes", "bin/pp", "bin/pwdecrypt", "bin/remtest", "bin/rsaperf", "bin/rsapoptst", "bin/sdbthreadtst", "bin/sdrtest", "bin/secmodtest", "bin/selfserv", "bin/shlibsign", "bin/signtool", "bin/signver", "bin/ssltap", "bin/strsclnt", "bin/symkeyutil", "bin/tstclnt", "bin/validation", "bin/vfychain", "bin/vfyserv"]

