[metadata]
  name = "npth"
  description = "New GNU portable threads library"
  homepage = "https://gnupg.org/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "npth"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libnpth.so", "lib/libnpth.so.0", "lib/libnpth.so.0.3.0", "lib/pkgconfig/npth.pc", "include/npth.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "npth"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libnpth.0.dylib", "lib/libnpth.dylib", "lib/pkgconfig/npth.pc", "include/npth.h"]
  [steps.when]
    os = ["darwin"]
