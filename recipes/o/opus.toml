[metadata]
  name = "opus"
  description = "Audio codec"
  homepage = "https://www.opus-codec.org/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "opus"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "opus"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libopus.a", "lib/libopus.so", "lib/libopus.so.0", "lib/libopus.so.0.11.1", "lib/pkgconfig/opus.pc", "include/opus/opus.h", "include/opus/opus_defines.h", "include/opus/opus_multistream.h", "include/opus/opus_projection.h", "include/opus/opus_types.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "opus"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libopus.0.dylib", "lib/libopus.a", "lib/libopus.dylib", "lib/pkgconfig/opus.pc", "include/opus/opus.h", "include/opus/opus_defines.h", "include/opus/opus_multistream.h", "include/opus/opus_projection.h", "include/opus/opus_types.h"]
  [steps.when]
    os = ["darwin"]
