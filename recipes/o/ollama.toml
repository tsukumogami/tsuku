[metadata]
  name = "ollama"
  description = "Create, run, and share large language models (LLMs)"
  homepage = "https://ollama.com/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["mlx-c"]
  tier = 0
  type = ""
  llm_validation = "skipped"
unsupported_platforms = ["darwin/amd64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "ollama"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/ollama"]

[verify]
  command = "ollama --version"
  pattern = ""
