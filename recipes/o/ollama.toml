[metadata]
name = "ollama"
description = "Get up and running with large language models"
homepage = "https://ollama.com"
version_format = "semver"
curated = true
supported_libc = ["glibc"]

[version]
github_repo = "ollama/ollama"
tag_prefix = "v"

[[steps]]
action = "github_archive"
when = { os = ["linux"], arch = "amd64" }
repo = "ollama/ollama"
asset_pattern = "ollama-linux-amd64.tar.zst"
strip_dirs = 0
binaries = ["ollama"]

[[steps]]
action = "github_archive"
when = { os = ["linux"], arch = "arm64" }
repo = "ollama/ollama"
asset_pattern = "ollama-linux-arm64.tar.zst"
strip_dirs = 0
binaries = ["ollama"]

# macOS: universal binary tarball
[[steps]]
action = "github_archive"
when = { os = ["darwin"] }
repo = "ollama/ollama"
asset_pattern = "ollama-darwin.tgz"
strip_dirs = 0
binaries = ["ollama"]

[verify]
command = "ollama --version"
pattern = "{version}"
