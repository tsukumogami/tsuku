[metadata]
name = "asdf"
description = "Extendable version manager with support for multiple languages"
homepage = "https://asdf-vm.com/"
version_format = "semver"
curated = true

# Linux: static Go binary — works on glibc and musl
[[steps]]
action = "github_archive"
repo = "asdf-vm/asdf"
when = { os = ["linux"], libc = ["glibc", "musl"] }
asset_pattern = "asdf-v{version}-linux-{arch}.tar.gz"
strip_dirs = 0
binaries = ["asdf"]

# macOS
[[steps]]
action = "github_archive"
repo = "asdf-vm/asdf"
when = { os = ["darwin"] }
asset_pattern = "asdf-v{version}-darwin-{arch}.tar.gz"
strip_dirs = 0
binaries = ["asdf"]

[verify]
command = "asdf --version"
pattern = "{version}"
