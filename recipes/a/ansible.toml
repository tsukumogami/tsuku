[metadata]
name = "ansible"
description = "Radically simple IT automation platform"
homepage = "https://www.ansible.com/"
version_format = "semver"
curated = true

# glibc Linux: pipx pulls a pure-Python wheel.
[[steps]]
action = "pipx_install"
when = { os = ["linux"], libc = ["glibc"] }
package = "ansible"
executables = ["ansible", "ansible-playbook", "ansible-galaxy", "ansible-vault", "ansible-config", "ansible-doc", "ansible-inventory", "ansible-pull", "ansible-console"]

# musl Linux (Alpine): pipx is fragile on musl; use the system package.
[[steps]]
action = "apk_install"
when = { os = ["linux"], libc = ["musl"] }
packages = ["ansible"]

# macOS: pipx works for the pure-Python ansible distribution.
[[steps]]
action = "pipx_install"
when = { os = ["darwin"] }
package = "ansible"
executables = ["ansible", "ansible-playbook", "ansible-galaxy", "ansible-vault", "ansible-config", "ansible-doc", "ansible-inventory", "ansible-pull", "ansible-console"]

[verify]
command = "ansible --version"
mode = "output"
reason = "Alpine package version may differ from upstream pypi release; output mode confirms the tool is runnable on every platform"
