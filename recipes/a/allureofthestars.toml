[metadata]
  name = "allureofthestars"
  description = "Near-future Sci-Fi roguelike and tactical squad combat game"
  homepage = "https://allureofthestars.com/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["gmp", "sdl2"]
  # darwin: no bottle for sonoma/arm64_sonoma; linux/arm64: no bottles
  unsupported_platforms = ["darwin/arm64", "darwin/amd64", "linux/arm64"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "allureofthestars"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/Allure"]

[verify]
  command = "Allure --version"
  pattern = ""
