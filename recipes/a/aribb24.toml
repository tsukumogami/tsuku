[metadata]
  name = "aribb24"
  description = "Library for ARIB STD-B24, decoding JIS 8 bit characters and parsing MPEG-TS"
  homepage = "https://code.videolan.org/jeeb/aribb24"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["libpng"]
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "aribb24"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libaribb24.a", "lib/libaribb24.so", "lib/libaribb24.so.0", "lib/libaribb24.so.0.0.0", "lib/pkgconfig/aribb24.pc", "include/aribb24/aribb24.h", "include/aribb24/bits.h", "include/aribb24/decoder.h", "include/aribb24/parser.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "aribb24"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libaribb24.0.dylib", "lib/libaribb24.a", "lib/libaribb24.dylib", "lib/pkgconfig/aribb24.pc", "include/aribb24/aribb24.h", "include/aribb24/bits.h", "include/aribb24/decoder.h", "include/aribb24/parser.h"]
  [steps.when]
    os = ["darwin"]
