[metadata]
name = "azure-cli"
description = "Microsoft Azure command-line interface"
homepage = "https://learn.microsoft.com/cli/azure/"
version_format = "semver"
curated = true
# Azure CLI bundles many C-extension dependencies (cryptography, etc.). musl
# wheels are spotty on PyPI and Alpine has no upstream apk package, so the
# install fails to compile from source. Restrict to glibc Linux and macOS.
supported_libc = ["glibc"]

# glibc Linux: pipx pulls the azure-cli distribution from PyPI.
[[steps]]
action = "pipx_install"
when = { os = ["linux"], libc = ["glibc"] }
package = "azure-cli"
executables = ["az"]

# macOS: pipx works for both Intel and Apple Silicon.
[[steps]]
action = "pipx_install"
when = { os = ["darwin"] }
package = "azure-cli"
executables = ["az"]

[verify]
command = "az --version"
pattern = "azure-cli\\s+{version}"
