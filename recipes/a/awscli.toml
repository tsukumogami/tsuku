[metadata]
name = "awscli"
description = "Official Amazon AWS command-line interface"
homepage = "https://aws.amazon.com/cli/"
version_format = "semver"
curated = true

[version]
github_repo = "aws/aws-cli"

# Linux amd64: bundled Python installer zip with PGP signature verification
[[steps]]
action = "download"
url = "https://awscli.amazonaws.com/awscli-exe-linux-x86_64-{version}.zip"
signature_url = "https://awscli.amazonaws.com/awscli-exe-linux-x86_64-{version}.zip.sig"
signature_key_url = "https://awscli.amazonaws.com/awscli.pub"
signature_key_fingerprint = "FB5DB77FD5C118B80511ADA8A6179B9A2BDEC510"
when = { os = ["linux"], arch = "amd64", libc = ["glibc"] }

[[steps]]
action = "extract"
archive = "awscli-exe-linux-x86_64-{version}.zip"
format = "zip"
when = { os = ["linux"], arch = "amd64", libc = ["glibc"] }

# Linux arm64: bundled Python installer zip with PGP signature verification
[[steps]]
action = "download"
url = "https://awscli.amazonaws.com/awscli-exe-linux-aarch64-{version}.zip"
signature_url = "https://awscli.amazonaws.com/awscli-exe-linux-aarch64-{version}.zip.sig"
signature_key_url = "https://awscli.amazonaws.com/awscli.pub"
signature_key_fingerprint = "FB5DB77FD5C118B80511ADA8A6179B9A2BDEC510"
when = { os = ["linux"], arch = "arm64", libc = ["glibc"] }

[[steps]]
action = "extract"
archive = "awscli-exe-linux-aarch64-{version}.zip"
format = "zip"
when = { os = ["linux"], arch = "arm64", libc = ["glibc"] }

# The zip extracts to aws/dist/ which is a PyInstaller onedir bundle.
# Moving dist/ contents to the tool root lets the binary's RPATH ($ORIGIN/lib)
# find the bundled Python libraries. bin/ symlinks preserve that layout after
# install_mode = "directory" copies the tree.
[[steps]]
action = "run_command"
command = '''
mv aws aws_installer
mv aws_installer/dist/* .
rm -rf aws_installer
mkdir -p bin
ln -s ../aws bin/aws
ln -s ../aws_completer bin/aws_completer
'''
description = "Flatten PyInstaller bundle and create bin symlinks"
when = { os = ["linux"], libc = ["glibc"] }

[[steps]]
action = "install_binaries"
binaries = ["bin/aws", "bin/aws_completer"]
install_mode = "directory"
when = { os = ["linux"], libc = ["glibc"] }

[verify]
command = "aws --version 2>&1"
mode = "output"
reason = "AWS publishes no versioned macOS zips (only PKG installers); Homebrew bottles fail sandbox extraction due to Python symlinks escaping the install dir. Linux installs are integrity-verified via PGP signature."
