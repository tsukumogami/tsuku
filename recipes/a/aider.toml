[metadata]
name = "aider"
description = "AI pair programming in your terminal"
homepage = "https://aider.chat"
version_format = "semver"
curated = true
supported_libc = ["glibc"]

[[steps]]
action = "pipx_install"
package = "aider-chat"
executables = ["aider"]

[verify]
command = "aider --version"
pattern = "{version}"
