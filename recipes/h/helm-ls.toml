[metadata]
  name = "helm-ls"
  description = "Language server for Helm"
  homepage = "https://github.com/mrjosh/helm-ls"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "helm-ls"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/helm_ls"]

[verify]
  command = "helm_ls --version"
  pattern = ""
