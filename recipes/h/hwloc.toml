[metadata]
  name = "hwloc"
  description = "Portable abstraction of the hierarchical topology of modern architectures"
  homepage = "https://www.open-mpi.org/projects/hwloc/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "hwloc"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/hwloc-annotate", "bin/hwloc-bind", "bin/hwloc-calc", "bin/hwloc-compress-dir", "bin/hwloc-diff", "bin/hwloc-distrib", "bin/hwloc-gather-cpuid", "bin/hwloc-gather-topology", "bin/hwloc-info", "bin/hwloc-ls", "bin/hwloc-patch", "bin/hwloc-ps", "bin/lstopo", "bin/lstopo-no-graphics"]

[verify]
  command = "hwloc-annotate --version"
  pattern = ""
