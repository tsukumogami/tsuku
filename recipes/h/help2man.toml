[metadata]
  name = "help2man"
  description = "Automatically generate simple man pages"
  homepage = "https://www.gnu.org/software/help2man/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["gettext", "perl"]
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64", "linux/arm64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "help2man"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/help2man"]

[verify]
  command = "help2man --version"
  pattern = ""
