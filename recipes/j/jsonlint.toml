[metadata]
  name = "jsonlint"
  description = "Checks JSON files for correct syntax and no silly mistakes"
  homepage = "https://github.com/dougbarth/jsonlint"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
unsupported_platforms = ["linux/arm64", "linux/debian", "linux/rhel", "linux/arch/amd64", "linux/suse", "linux/alpine"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "gem_install"
  executables = ["jsonlint"]
  gem = "jsonlint"

[verify]
  command = "jsonlint --version"
  pattern = ""
