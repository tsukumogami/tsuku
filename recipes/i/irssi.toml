[metadata]
  name = "irssi"
  description = "Modular IRC client"
  homepage = "https://irssi.org/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = [
    "gettext",
    "glib",
    "openssl",
    "perl",
  ]
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64", "linux/arm64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "irssi"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/irssi"]

[verify]
  command = "irssi --version"
  pattern = ""
