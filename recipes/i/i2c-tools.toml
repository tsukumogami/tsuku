[metadata]
  name = "i2c-tools"
  description = "Heterogeneous set of I2C tools for Linux"
  homepage = "https://i2c.wiki.kernel.org/index.php/I2C_Tools"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "i2c-tools"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/ddcmon", "bin/decode-dimms", "bin/decode-edid", "bin/decode-vaio"]

[verify]
  command = "ddcmon --version"
  pattern = ""
