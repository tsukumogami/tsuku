[metadata]
name = "istioctl"
description = "Istio configuration command-line utility"
homepage = "https://istio.io/"
version_format = "semver"
curated = true

# Linux: statically linked Go binary works on glibc and musl
[[steps]]
action = "github_archive"
when = { os = ["linux"], libc = ["glibc", "musl"] }
repo = "istio/istio"
asset_pattern = "istioctl-{version}-linux-{arch}.tar.gz"
strip_dirs = 0
binaries = ["istioctl"]

# macOS: Intel and Apple Silicon binaries (istio publishes "osx" assets)
[[steps]]
action = "github_archive"
when = { os = ["darwin"] }
repo = "istio/istio"
asset_pattern = "istioctl-{version}-osx-{arch}.tar.gz"
strip_dirs = 0
binaries = ["istioctl"]

[verify]
command = "istioctl version --remote=false"
pattern = "{version}"
