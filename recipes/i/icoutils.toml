[metadata]
  name = "icoutils"
  description = "Create and extract MS Windows icons and cursors"
  homepage = "https://www.nongnu.org/icoutils/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["libpng"]
  # macOS: no bottle for Sonoma; linux/arm64: no bottles
  unsupported_platforms = ["darwin/arm64", "darwin/amd64", "linux/arm64"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "icoutils"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/extresso", "bin/genresscript", "bin/icotool", "bin/wrestool"]

[verify]
  command = "extresso --version"
  pattern = ""
