[metadata]
  name = "isl"
  description = "Integer Set Library for the polyhedral model"
  homepage = "https://libisl.sourceforge.io/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["gmp"]
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "isl"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "isl"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libisl.a", "lib/libisl.so", "lib/libisl.so.23", "lib/libisl.so.23.4.0", "lib/pkgconfig/isl.pc", "include/isl/aff.h", "include/isl/aff_type.h", "include/isl/arg.h", "include/isl/ast.h", "include/isl/ast_build.h", "include/isl/ast_type.h", "include/isl/constraint.h", "include/isl/cpp.h", "include/isl/ctx.h", "include/isl/fixed_box.h", "include/isl/flow.h", "include/isl/hash.h", "include/isl/hmap.h", "include/isl/hmap_templ.c", "include/isl/id.h", "include/isl/id_to_ast_expr.h", "include/isl/id_to_id.h", "include/isl/id_to_pw_aff.h", "include/isl/id_type.h", "include/isl/ilp.h", "include/isl/list.h", "include/isl/local_space.h", "include/isl/lp.h", "include/isl/map.h", "include/isl/map_to_basic_set.h", "include/isl/map_type.h", "include/isl/mat.h", "include/isl/maybe.h", "include/isl/maybe_ast_expr.h", "include/isl/maybe_basic_set.h", "include/isl/maybe_id.h", "include/isl/maybe_pw_aff.h", "include/isl/maybe_templ.h", "include/isl/multi.h", "include/isl/obj.h", "include/isl/options.h", "include/isl/point.h", "include/isl/polynomial.h", "include/isl/polynomial_type.h", "include/isl/printer.h", "include/isl/printer_type.h", "include/isl/schedule.h", "include/isl/schedule_node.h", "include/isl/schedule_type.h", "include/isl/set.h", "include/isl/set_type.h", "include/isl/space.h", "include/isl/space_type.h", "include/isl/stdint.h", "include/isl/stream.h", "include/isl/stride_info.h", "include/isl/typed_cpp.h", "include/isl/union_map.h", "include/isl/union_map_type.h", "include/isl/union_set.h", "include/isl/union_set_type.h", "include/isl/val.h", "include/isl/val_gmp.h", "include/isl/val_type.h", "include/isl/vec.h", "include/isl/version.h", "include/isl/vertices.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
