[metadata]
  name = "imath"
  description = "Library of 2D and 3D vector, matrix, and math operations"
  homepage = "https://imath.readthedocs.io/en/latest/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "imath"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
