[metadata]
  name = "wget"
  description = "Internet file retriever"
  homepage = "https://www.gnu.org/software/wget/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["libidn2", "openssl@3", "gettext", "libunistring"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "wget"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/wget"]

[verify]
  command = "wget --version"
  pattern = ""
