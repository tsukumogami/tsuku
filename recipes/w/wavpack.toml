[metadata]
  name = "wavpack"
  description = "Hybrid lossless audio compression"
  homepage = "https://www.wavpack.com/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "wavpack"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/wavpack", "bin/wvgain", "bin/wvtag", "bin/wvunpack"]

[verify]
  command = "wavpack --version"
  pattern = ""
