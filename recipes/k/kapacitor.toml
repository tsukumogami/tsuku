[metadata]
  name = "kapacitor"
  description = "Open source time series data processor"
  homepage = "https://github.com/influxdata/kapacitor"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "kapacitor"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/kapacitor", "bin/kapacitord"]

[verify]
  command = "kapacitor --version"
  pattern = ""
