[metadata]
  name = "karchive"
  description = "Reading, creating, and manipulating file archives"
  homepage = "https://api.kde.org/karchive-index.html"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["openssl", "qtbase", "xz", "zstd"]
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "karchive"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "karchive"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libKF6Archive.so", "lib/libKF6Archive.so.6", "lib/libKF6Archive.so.6.23.0", "include/KF6/KArchive/K7Zip", "include/KF6/KArchive/KAr", "include/KF6/KArchive/KArchive", "include/KF6/KArchive/KArchiveDirectory", "include/KF6/KArchive/KArchiveEntry", "include/KF6/KArchive/KArchiveFile", "include/KF6/KArchive/KCompressionDevice", "include/KF6/KArchive/KFilterBase", "include/KF6/KArchive/KRcc", "include/KF6/KArchive/KTar", "include/KF6/KArchive/KZip", "include/KF6/KArchive/KZipFileEntry", "include/KF6/KArchive/k7zip.h", "include/KF6/KArchive/kar.h", "include/KF6/KArchive/karchive.h", "include/KF6/KArchive/karchive_export.h", "include/KF6/KArchive/karchive_version.h", "include/KF6/KArchive/karchivedirectory.h", "include/KF6/KArchive/karchiveentry.h", "include/KF6/KArchive/karchivefile.h", "include/KF6/KArchive/kcompressiondevice.h", "include/KF6/KArchive/kfilterbase.h", "include/KF6/KArchive/krcc.h", "include/KF6/KArchive/ktar.h", "include/KF6/KArchive/kzip.h", "include/KF6/KArchive/kzipfileentry.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "karchive"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libKF6Archive.6.23.0.dylib", "lib/libKF6Archive.6.dylib", "lib/libKF6Archive.dylib", "include/KF6/KArchive/K7Zip", "include/KF6/KArchive/KAr", "include/KF6/KArchive/KArchive", "include/KF6/KArchive/KArchiveDirectory", "include/KF6/KArchive/KArchiveEntry", "include/KF6/KArchive/KArchiveFile", "include/KF6/KArchive/KCompressionDevice", "include/KF6/KArchive/KFilterBase", "include/KF6/KArchive/KRcc", "include/KF6/KArchive/KTar", "include/KF6/KArchive/KZip", "include/KF6/KArchive/KZipFileEntry", "include/KF6/KArchive/k7zip.h", "include/KF6/KArchive/kar.h", "include/KF6/KArchive/karchive.h", "include/KF6/KArchive/karchive_export.h", "include/KF6/KArchive/karchive_version.h", "include/KF6/KArchive/karchivedirectory.h", "include/KF6/KArchive/karchiveentry.h", "include/KF6/KArchive/karchivefile.h", "include/KF6/KArchive/kcompressiondevice.h", "include/KF6/KArchive/kfilterbase.h", "include/KF6/KArchive/krcc.h", "include/KF6/KArchive/ktar.h", "include/KF6/KArchive/kzip.h", "include/KF6/KArchive/kzipfileentry.h"]
  [steps.when]
    os = ["darwin"]
