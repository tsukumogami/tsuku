[metadata]
name = "koto"
description = "Workflow orchestration engine for AI agents"
homepage = "https://github.com/tsukumogami/koto"
version_format = "semver"

[[steps]]
action = "github_file"
repo = "tsukumogami/koto"
asset_pattern = "koto-{os}-{arch}"
binary = "koto"

[verify]
command = "koto version"
pattern = "{version}"
