[metadata]
  name = "kubectl-ai"
  description = "AI powered Kubernetes Assistant"
  homepage = "https://github.com/GoogleCloudPlatform/kubectl-ai"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "kubectl-ai"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/kubectl-ai"]

[verify]
  command = "kubectl-ai --version"
  pattern = ""
