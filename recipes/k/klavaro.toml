[metadata]
  name = "klavaro"
  description = "Free touch typing tutor program"
  homepage = "https://klavaro.sourceforge.io/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["glib", "cairo", "gettext"]
  # darwin: verification failure; linux/arm64: no bottles
  unsupported_platforms = ["darwin/arm64", "darwin/amd64", "linux/arm64"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "klavaro"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/klavaro"]

[verify]
  command = "klavaro --version"
  pattern = ""
