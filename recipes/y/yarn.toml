[metadata]
name = "yarn"
description = "Fast, reliable, and secure dependency management"
homepage = "https://classic.yarnpkg.com/"
version_format = "semver"
curated = true
# Yarn Classic (1.x) — the widely-used global installer. Yarn Berry (3.x+) is
# installed per-project via Corepack and is not a standalone global CLI tool.

[[steps]]
action = "npm_install"
package = "yarn"
executables = ["yarn", "yarnpkg"]

[verify]
command = "yarn --version"
pattern = "{version}"
