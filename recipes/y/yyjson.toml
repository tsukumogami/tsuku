[metadata]
  name = "yyjson"
  description = "High performance JSON library written in ANSI C"
  homepage = "https://github.com/ibireme/yyjson"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "yyjson"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "yyjson"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libyyjson.so", "lib/libyyjson.so.0", "lib/libyyjson.so.0.12.0", "lib/pkgconfig/yyjson.pc", "include/yyjson.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "yyjson"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libyyjson.0.12.0.dylib", "lib/libyyjson.0.dylib", "lib/libyyjson.dylib", "lib/pkgconfig/yyjson.pc", "include/yyjson.h"]
  [steps.when]
    os = ["darwin"]
