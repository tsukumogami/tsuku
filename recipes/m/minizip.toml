[metadata]
  name = "minizip"
  description = "C library for zip/unzip via zLib"
  homepage = "https://www.winimage.com/zLibDll/minizip.html"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "minizip"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libminizip.a", "lib/libminizip.so", "lib/libminizip.so.1", "lib/libminizip.so.1.0.0", "lib/pkgconfig/minizip.pc", "include/minizip/crypt.h", "include/minizip/ints.h", "include/minizip/ioapi.h", "include/minizip/mztools.h", "include/minizip/unzip.h", "include/minizip/zip.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "minizip"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libminizip.1.dylib", "lib/libminizip.a", "lib/libminizip.dylib", "lib/pkgconfig/minizip.pc", "include/minizip/crypt.h", "include/minizip/ints.h", "include/minizip/ioapi.h", "include/minizip/mztools.h", "include/minizip/unzip.h", "include/minizip/zip.h"]
  [steps.when]
    os = ["darwin"]
