[metadata]
  name = "md4c"
  description = "C Markdown parser. Fast. SAX-like interface"
  homepage = "https://github.com/mity/md4c"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "md4c"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/md2html"]

[verify]
  command = "md2html --version"
  pattern = ""
