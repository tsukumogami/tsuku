[metadata]
  name = "mpg123"
  description = "MP3 player for Linux and UNIX"
  homepage = "https://www.mpg123.de/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "mpg123"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/mpg123", "bin/mpg123-id3dump", "bin/mpg123-strip", "bin/out123"]

[verify]
  command = "mpg123 --version"
  pattern = ""
