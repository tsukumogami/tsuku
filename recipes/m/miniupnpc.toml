[metadata]
  name = "miniupnpc"
  description = "UPnP IGD client library and daemon"
  homepage = "https://miniupnp.tuxfamily.org"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "miniupnpc"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/external-ip", "bin/upnp-listdevices", "bin/upnpc"]

[verify]
  command = "external-ip --version"
  pattern = ""
