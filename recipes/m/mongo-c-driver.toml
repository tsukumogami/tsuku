[metadata]
  name = "mongo-c-driver"
  description = "C driver for MongoDB"
  homepage = "https://github.com/mongodb/mongo-c-driver"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["openssl", "zstd"]
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "mongo-c-driver"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/mongoc2-stat"]

[verify]
  command = "mongoc2-stat --version"
  pattern = ""
