[metadata]
  name = "mplayer"
  description = "UNIX movie player"
  homepage = "https://mplayerhq.hu/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["fontconfig", "freetype", "jpeg-turbo", "libcaca", "libpng"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "mplayer"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/mencoder", "bin/mplayer"]

[verify]
  command = "mencoder --version"
  pattern = ""
