[metadata]
  name = "metis"
  description = "Programs that partition graphs and order matrices"
  homepage = "https://karypis.github.io/glaros/software/metis/overview.html"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "metis"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/cmpfillin", "bin/gpmetis", "bin/graphchk", "bin/m2gmetis", "bin/mpmetis", "bin/ndmetis"]

[verify]
  command = "cmpfillin --version"
  pattern = ""
