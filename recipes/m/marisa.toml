[metadata]
  name = "marisa"
  description = "Matching Algorithm with Recursively Implemented StorAge"
  homepage = "https://github.com/s-yata/marisa-trie"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "marisa"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/marisa-benchmark", "bin/marisa-build", "bin/marisa-common-prefix-search", "bin/marisa-dump", "bin/marisa-lookup", "bin/marisa-predictive-search", "bin/marisa-reverse-lookup"]

[verify]
  command = "marisa-benchmark --version"
  pattern = ""
