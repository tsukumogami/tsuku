[metadata]
name = "freetype"
description = "Software library to render fonts"
homepage = "https://www.freetype.org/"
runtime_dependencies = ["libpng"]
type = "library"

[metadata.satisfies]
homebrew = ["freetype"]

# glibc Linux: Homebrew bottle
[[steps]]
action = "homebrew"
formula = "freetype"
when = { os = ["linux"], libc = ["glibc"] }

[[steps]]
action = "install_binaries"
install_mode = "directory"
outputs = [
    "lib/libfreetype.so",
    "lib/libfreetype.a",
    "include/freetype2/freetype/freetype.h",
]
when = { os = ["linux"], libc = ["glibc"] }

# macOS: Homebrew
[[steps]]
action = "homebrew"
formula = "freetype"
when = { os = ["darwin"] }

[[steps]]
action = "install_binaries"
install_mode = "directory"
outputs = [
    "lib/libfreetype.dylib",
    "lib/libfreetype.a",
    "include/freetype2/freetype/freetype.h",
]
when = { os = ["darwin"] }
