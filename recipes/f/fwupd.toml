[metadata]
  name = "fwupd"
  description = "Firmware update daemon"
  homepage = "https://github.com/fwupd/fwupd"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = [
    "gettext",
    "glib",
    "gnutls",
    "json-glib",
    "libcbor",
    "libusb",
    "libxmlb",
    "protobuf-c",
    "readline",
    "sqlite",
    "xz",
  ]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "fwupd"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "fwupd"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/dbxtool", "bin/fwupdtool"]

[verify]
  command = "dbxtool --version"
  pattern = ""
