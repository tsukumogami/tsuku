[metadata]
  name = "fastly"
  description = "Build, deploy and configure Fastly services"
  homepage = "https://www.fastly.com/documentation/reference/cli/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "fastly"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/fastly"]

[verify]
  command = "fastly --version"
  pattern = ""
