[metadata]
  name = "container-structure-test"
  description = "Validate the structure of your container images"
  homepage = "https://github.com/GoogleContainerTools/container-structure-test"
  version_format = ""
  requires_sudo = false
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "container-structure-test"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/container-structure-test"]

[verify]
  command = "container-structure-test --version"
  pattern = ""
