[metadata]
  name = "clang-uml"
  description = "Customizable automatic UML diagram generator for C++ based on Clang"
  homepage = "https://github.com/bkryza/clang-uml"
  version_format = ""
  requires_sudo = false
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]
  tier = 0
  type = ""
  llm_validation = "skipped"
  runtime_dependencies = ["yaml-cpp"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "clang-uml"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/clang-uml"]

[verify]
  command = "clang-uml --version"
  pattern = ""
