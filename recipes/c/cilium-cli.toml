[metadata]
name = "cilium-cli"
description = "CLI to install, manage & troubleshoot Kubernetes clusters running Cilium"
homepage = "https://cilium.io"
version_format = "semver"
curated = true

# Linux: statically linked Go binary works on glibc and musl
[[steps]]
action = "github_archive"
when = { os = ["linux"], libc = ["glibc", "musl"] }
repo = "cilium/cilium-cli"
asset_pattern = "cilium-linux-{arch}.tar.gz"
strip_dirs = 0
binaries = ["cilium"]

# macOS: Intel and Apple Silicon binaries
[[steps]]
action = "github_archive"
when = { os = ["darwin"] }
repo = "cilium/cilium-cli"
asset_pattern = "cilium-darwin-{arch}.tar.gz"
strip_dirs = 0
binaries = ["cilium"]

[verify]
command = "cilium version --client"
pattern = "cilium-cli: v{version}"
