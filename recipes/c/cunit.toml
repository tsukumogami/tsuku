[metadata]
  name = "cunit"
  description = "Lightweight unit testing framework for C"
  homepage = "https://cunit.sourceforge.net/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "cunit"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "cunit"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libcunit.a", "lib/libcunit.so", "lib/libcunit.so.1", "lib/libcunit.so.1.0.1", "lib/pkgconfig/cunit.pc", "include/CUnit/Automated.h", "include/CUnit/Basic.h", "include/CUnit/CUError.h", "include/CUnit/CUnit.h", "include/CUnit/CUnit_intl.h", "include/CUnit/Console.h", "include/CUnit/MyMem.h", "include/CUnit/TestDB.h", "include/CUnit/TestRun.h", "include/CUnit/Util.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "cunit"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libcunit.1.dylib", "lib/libcunit.a", "lib/libcunit.dylib", "lib/pkgconfig/cunit.pc", "include/CUnit/Automated.h", "include/CUnit/Basic.h", "include/CUnit/CUError.h", "include/CUnit/CUnit.h", "include/CUnit/CUnit_intl.h", "include/CUnit/Console.h", "include/CUnit/MyMem.h", "include/CUnit/TestDB.h", "include/CUnit/TestRun.h", "include/CUnit/Util.h"]
  [steps.when]
    os = ["darwin"]
