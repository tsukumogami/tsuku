[metadata]
  name = "crosstool-ng"
  description = "Tool for building toolchains"
  homepage = "https://crosstool-ng.github.io/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = [
    "bash",
    "binutils",
    "bison",
    "coreutils",
    "gettext",
    "gnu-sed",
    "grep",
    "lzip",
    "m4",
    "make",
    "ncurses",
    "xz",
  ]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "crosstool-ng"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "crosstool-ng"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/ct-ng"]

[verify]
  command = "ct-ng --version"
  pattern = ""
