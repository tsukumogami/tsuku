[metadata]
  name = "cargo-nextest"
  description = "A next-generation test runner for Rust"
  homepage = "https://nexte.st"
  version_format = "semver"

[version]
  source = "github_releases"
  github_repo = "nextest-rs/nextest"
  tag_prefix = "cargo-nextest-"

# Linux: arch-specific binaries (musl for maximum compatibility)
[[steps]]
  action = "github_archive"
  repo = "nextest-rs/nextest"
  asset_pattern = "cargo-nextest-{version}-{arch}-{os}.tar.gz"
  strip_dirs = 0
  binaries = ["cargo-nextest"]
  os_mapping = { linux = "unknown-linux-musl" }
  arch_mapping = { amd64 = "x86_64", arm64 = "aarch64" }
  when = { os = ["linux"] }

# macOS: universal binary (single asset for both amd64 and arm64)
[[steps]]
  action = "github_archive"
  repo = "nextest-rs/nextest"
  asset_pattern = "cargo-nextest-{version}-{arch}-{os}.tar.gz"
  strip_dirs = 0
  binaries = ["cargo-nextest"]
  os_mapping = { darwin = "apple-darwin" }
  arch_mapping = { amd64 = "universal", arm64 = "universal" }
  when = { os = ["darwin"] }

[verify]
  command = "cargo-nextest --version"
  pattern = "cargo-nextest {version}"
