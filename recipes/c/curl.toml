[metadata]
name = "curl"
description = "Command line tool for transferring data with URLs"
homepage = "https://curl.se/"
version_format = "semver"
curated = true
dependencies = ["openssl", "zlib"]
runtime_dependencies = ["libnghttp3", "libnghttp2", "libngtcp2", "libssh2", "brotli", "zstd"]

# Linux: build from source (configure_make works on both glibc and musl)
[[steps]]
action = "download"
when = { os = ["linux"], libc = ["glibc", "musl"] }
url = "https://curl.se/download/curl-{version}.tar.gz"
signature_url = "https://curl.se/download/curl-{version}.tar.gz.asc"
signature_key_url = "https://daniel.haxx.se/mykey.asc"
signature_key_fingerprint = "27EDEAF22F3ABCEB50DB9A125CC908FDB71E12C2"

[[steps]]
action = "extract"
when = { os = ["linux"] }
archive = "curl-{version}.tar.gz"
format = "tar.gz"

[[steps]]
action = "setup_build_env"
when = { os = ["linux"] }

[[steps]]
action = "configure_make"
when = { os = ["linux"] }
source_dir = "curl-{version}"
configure_args = ["--with-openssl", "--with-zlib", "--disable-silent-rules", "--without-libpsl"]
executables = ["curl"]

# $ORIGIN-based RPATH is Linux-only (ELF); macOS is excluded above
[[steps]]
action = "set_rpath"
when = { os = ["linux"] }
binaries = [".install/bin/curl"]
rpath = "$ORIGIN/../lib:{libs_dir}/openssl-{deps.openssl.version}/lib:{libs_dir}/zlib-{deps.zlib.version}/lib"

[[steps]]
action = "install_binaries"
when = { os = ["linux"] }
install_mode = "directory"
outputs = ["bin/curl"]

# macOS: Homebrew bottle. The bottle's @rpath references libnghttp3.9.dylib,
# libnghttp2.14.dylib, libngtcp2.16.dylib, libssh2.1.dylib, libssl.3.dylib,
# libcrypto.3.dylib, libbrotli*.dylib, and libzstd.1.dylib from sibling
# homebrew packages; tsuku's homebrew action patches these references to
# point at the matching tsuku-installed dependencies.
[[steps]]
action = "homebrew"
formula = "curl"
when = { os = ["darwin"] }
dependencies = ["libnghttp3", "libnghttp2", "libngtcp2", "libssh2", "brotli", "zstd"]

[[steps]]
action = "install_binaries"
when = { os = ["darwin"] }
install_mode = "directory"
outputs = ["bin/curl"]

[verify]
command = "curl --version"
pattern = "curl {version}"
