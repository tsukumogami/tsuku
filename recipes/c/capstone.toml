[metadata]
  name = "capstone"
  description = "Multi-platform, multi-architecture disassembly framework"
  homepage = "https://www.capstone-engine.org/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["gettext"]
  # macOS: verification fails (exit 255)
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "capstone"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/cstool"]

[verify]
  command = "cstool --version"
  pattern = ""
