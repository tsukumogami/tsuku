[metadata]
  name = "libmpc"
  description = "C library for the arithmetic of high precision complex numbers"
  homepage = "https://www.multiprecision.org/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["gmp", "mpfr"]
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libmpc"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libmpc"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libmpc.a", "lib/libmpc.so", "lib/libmpc.so.3", "lib/libmpc.so.3.3.1", "include/mpc.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libmpc"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libmpc.3.dylib", "lib/libmpc.a", "lib/libmpc.dylib", "include/mpc.h"]
  [steps.when]
    os = ["darwin"]
