[metadata]
  name = "libebur128"
  description = "Library implementing the EBU R128 loudness standard"
  homepage = "https://github.com/jiixyj/libebur128"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["speex"]
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libebur128"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libebur128"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libebur128.so", "lib/libebur128.so.1", "lib/libebur128.so.1.2.6", "lib/pkgconfig/libebur128.pc", "include/ebur128.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libebur128"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libebur128.1.2.6.dylib", "lib/libebur128.1.dylib", "lib/libebur128.dylib", "lib/pkgconfig/libebur128.pc", "include/ebur128.h"]
  [steps.when]
    os = ["darwin"]
