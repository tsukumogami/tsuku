[metadata]
  name = "libtommath"
  description = "C library for number theoretic multiple-precision integers"
  homepage = "https://www.libtom.net/LibTomMath/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libtommath"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libtommath.a", "lib/libtommath.so", "lib/libtommath.so.1", "lib/libtommath.so.1.3.0", "lib/pkgconfig/libtommath.pc", "include/tommath.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libtommath"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libtommath.1.dylib", "lib/libtommath.a", "lib/libtommath.dylib", "lib/pkgconfig/libtommath.pc", "include/tommath.h"]
  [steps.when]
    os = ["darwin"]
