[metadata]
  name = "libtpms"
  description = "Library for software emulation of a Trusted Platform Module"
  homepage = "https://github.com/stefanberger/libtpms"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["openssl"]
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libtpms"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libtpms"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libtpms.a", "lib/libtpms.so", "lib/libtpms.so.0", "lib/libtpms.so.0.10.2", "lib/pkgconfig/libtpms.pc", "include/libtpms/tpm_error.h", "include/libtpms/tpm_library.h", "include/libtpms/tpm_memory.h", "include/libtpms/tpm_nvfilename.h", "include/libtpms/tpm_tis.h", "include/libtpms/tpm_types.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libtpms"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libtpms.0.dylib", "lib/libtpms.a", "lib/libtpms.dylib", "lib/pkgconfig/libtpms.pc", "include/libtpms/tpm_error.h", "include/libtpms/tpm_library.h", "include/libtpms/tpm_memory.h", "include/libtpms/tpm_nvfilename.h", "include/libtpms/tpm_tis.h", "include/libtpms/tpm_types.h"]
  [steps.when]
    os = ["darwin"]
