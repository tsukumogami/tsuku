[metadata]
  name = "libunistring"
  description = "C string library for manipulating Unicode strings"
  homepage = "https://www.gnu.org/software/libunistring/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libunistring"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libunistring"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libunistring.a", "lib/libunistring.so", "lib/libunistring.so.5", "lib/libunistring.so.5.2.1", "include/unicase.h", "include/uniconv.h", "include/unictype.h", "include/unigbrk.h", "include/unilbrk.h", "include/unimetadata.h", "include/uniname.h", "include/uninorm.h", "include/unistdio.h", "include/unistr.h", "include/unistring/cdefs.h", "include/unistring/iconveh.h", "include/unistring/inline.h", "include/unistring/localcharset.h", "include/unistring/stdint.h", "include/unistring/version.h", "include/unistring/woe32dll.h", "include/unitypes.h", "include/uniwbrk.h", "include/uniwidth.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libunistring"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libunistring.5.dylib", "lib/libunistring.a", "lib/libunistring.dylib", "include/unicase.h", "include/uniconv.h", "include/unictype.h", "include/unigbrk.h", "include/unilbrk.h", "include/unimetadata.h", "include/uniname.h", "include/uninorm.h", "include/unistdio.h", "include/unistr.h", "include/unistring/cdefs.h", "include/unistring/iconveh.h", "include/unistring/inline.h", "include/unistring/localcharset.h", "include/unistring/stdint.h", "include/unistring/version.h", "include/unistring/woe32dll.h", "include/unitypes.h", "include/uniwbrk.h", "include/uniwidth.h"]
  [steps.when]
    os = ["darwin"]
