[metadata]
  name = "libsecret"
  description = "Library for storing/retrieving passwords and other secrets"
  homepage = "https://wiki.gnome.org/Projects/Libsecret"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["glib", "libgcrypt", "gettext"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libsecret"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/secret-tool"]

[verify]
  command = "secret-tool --version"
  pattern = ""
