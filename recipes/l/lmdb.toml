[metadata]
  name = "lmdb"
  description = "Lightning memory-mapped database: key-value data store"
  homepage = "https://www.symas.com/symas-embedded-database-lmdb"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "lmdb"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/mdb_copy", "bin/mdb_dump", "bin/mdb_load", "bin/mdb_stat"]

[verify]
  command = "mdb_copy --version"
  pattern = ""
