[metadata]
  name = "libngspice"
  description = "Spice circuit simulator as shared library"
  homepage = "https://ngspice.sourceforge.io/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libngspice"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libngspice.so", "lib/libngspice.so.0", "lib/libngspice.so.0.0.14", "lib/ngspice/ivlng.so", "lib/pkgconfig/ngspice.pc", "include/ngspice/sharedspice.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libngspice"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libngspice.0.dylib", "lib/libngspice.dylib", "lib/ngspice/ivlng.so", "lib/pkgconfig/ngspice.pc", "include/ngspice/sharedspice.h"]
  [steps.when]
    os = ["darwin"]
