[metadata]
  name = "libcdio-paranoia"
  description = "CD paranoia on top of libcdio"
  homepage = "https://github.com/libcdio/libcdio-paranoia"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["libcdio"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libcdio-paranoia"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/cd-paranoia"]

[verify]
  command = "cd-paranoia --version"
  pattern = ""
