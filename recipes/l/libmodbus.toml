[metadata]
  name = "libmodbus"
  description = "Portable modbus library"
  homepage = "https://libmodbus.org/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libmodbus"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libmodbus"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libmodbus.so", "lib/libmodbus.so.5", "lib/libmodbus.so.5.1.0", "lib/pkgconfig/libmodbus.pc", "include/modbus/modbus-rtu.h", "include/modbus/modbus-tcp.h", "include/modbus/modbus-version.h", "include/modbus/modbus.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libmodbus"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libmodbus.5.dylib", "lib/libmodbus.dylib", "lib/pkgconfig/libmodbus.pc", "include/modbus/modbus-rtu.h", "include/modbus/modbus-tcp.h", "include/modbus/modbus-version.h", "include/modbus/modbus.h"]
  [steps.when]
    os = ["darwin"]
