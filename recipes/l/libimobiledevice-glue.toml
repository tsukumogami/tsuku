[metadata]
  name = "libimobiledevice-glue"
  description = "Library with common system API code for libimobiledevice projects"
  homepage = "https://libimobiledevice.org/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["libplist"]
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libimobiledevice-glue"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libimobiledevice-glue"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libimobiledevice-glue-1.0.a", "lib/libimobiledevice-glue-1.0.so", "lib/libimobiledevice-glue-1.0.so.0", "lib/libimobiledevice-glue-1.0.so.0.3.2", "lib/pkgconfig/libimobiledevice-glue-1.0.pc", "include/libimobiledevice-glue/cbuf.h", "include/libimobiledevice-glue/collection.h", "include/libimobiledevice-glue/glue.h", "include/libimobiledevice-glue/nskeyedarchive.h", "include/libimobiledevice-glue/opack.h", "include/libimobiledevice-glue/sha.h", "include/libimobiledevice-glue/socket.h", "include/libimobiledevice-glue/termcolors.h", "include/libimobiledevice-glue/thread.h", "include/libimobiledevice-glue/tlv.h", "include/libimobiledevice-glue/utils.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libimobiledevice-glue"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libimobiledevice-glue-1.0.0.dylib", "lib/libimobiledevice-glue-1.0.a", "lib/libimobiledevice-glue-1.0.dylib", "lib/pkgconfig/libimobiledevice-glue-1.0.pc", "include/libimobiledevice-glue/cbuf.h", "include/libimobiledevice-glue/collection.h", "include/libimobiledevice-glue/glue.h", "include/libimobiledevice-glue/nskeyedarchive.h", "include/libimobiledevice-glue/opack.h", "include/libimobiledevice-glue/sha.h", "include/libimobiledevice-glue/socket.h", "include/libimobiledevice-glue/termcolors.h", "include/libimobiledevice-glue/thread.h", "include/libimobiledevice-glue/tlv.h", "include/libimobiledevice-glue/utils.h"]
  [steps.when]
    os = ["darwin"]
