[metadata]
  name = "libudfread"
  description = "Universal Disk Format reader"
  homepage = "https://code.videolan.org/videolan/libudfread"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libudfread"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libudfread.a", "lib/libudfread.so", "lib/libudfread.so.3", "lib/libudfread.so.3.0.0", "lib/pkgconfig/libudfread.pc", "include/udfread/blockinput.h", "include/udfread/udfread-version.h", "include/udfread/udfread.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libudfread"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libudfread.3.dylib", "lib/libudfread.a", "lib/libudfread.dylib", "lib/pkgconfig/libudfread.pc", "include/udfread/blockinput.h", "include/udfread/udfread-version.h", "include/udfread/udfread.h"]
  [steps.when]
    os = ["darwin"]
