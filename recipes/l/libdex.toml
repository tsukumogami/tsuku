[metadata]
  name = "libdex"
  description = "Future-based programming for GLib-based applications"
  homepage = "https://gitlab.gnome.org/GNOME/libdex"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["glib"]
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libdex"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libdex-1.so", "lib/libdex-1.so.1", "lib/libdex-1.so.1.0.0", "lib/pkgconfig/libdex-1.pc", "include/libdex-1/dex-aio.h", "include/libdex-1/dex-async-pair.h", "include/libdex-1/dex-async-result.h", "include/libdex-1/dex-block.h", "include/libdex-1/dex-cancellable.h", "include/libdex-1/dex-channel.h", "include/libdex-1/dex-delayed.h", "include/libdex-1/dex-enums.h", "include/libdex-1/dex-error.h", "include/libdex-1/dex-fiber.h", "include/libdex-1/dex-future-set.h", "include/libdex-1/dex-future.h", "include/libdex-1/dex-gio.h", "include/libdex-1/dex-init.h", "include/libdex-1/dex-main-scheduler.h", "include/libdex-1/dex-object.h", "include/libdex-1/dex-platform.h", "include/libdex-1/dex-promise.h", "include/libdex-1/dex-scheduler.h", "include/libdex-1/dex-static-future.h", "include/libdex-1/dex-thread-pool-scheduler.h", "include/libdex-1/dex-thread.h", "include/libdex-1/dex-timeout.h", "include/libdex-1/dex-unix-signal.h", "include/libdex-1/dex-version-macros.h", "include/libdex-1/dex-version.h", "include/libdex-1/libdex.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libdex"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libdex-1.1.dylib", "lib/libdex-1.dylib", "lib/pkgconfig/libdex-1.pc", "include/libdex-1/dex-aio.h", "include/libdex-1/dex-async-pair.h", "include/libdex-1/dex-async-result.h", "include/libdex-1/dex-block.h", "include/libdex-1/dex-cancellable.h", "include/libdex-1/dex-channel.h", "include/libdex-1/dex-delayed.h", "include/libdex-1/dex-enums.h", "include/libdex-1/dex-error.h", "include/libdex-1/dex-fiber.h", "include/libdex-1/dex-future-set.h", "include/libdex-1/dex-future.h", "include/libdex-1/dex-gio.h", "include/libdex-1/dex-init.h", "include/libdex-1/dex-main-scheduler.h", "include/libdex-1/dex-object.h", "include/libdex-1/dex-platform.h", "include/libdex-1/dex-promise.h", "include/libdex-1/dex-scheduler.h", "include/libdex-1/dex-static-future.h", "include/libdex-1/dex-thread-pool-scheduler.h", "include/libdex-1/dex-thread.h", "include/libdex-1/dex-timeout.h", "include/libdex-1/dex-unix-signal.h", "include/libdex-1/dex-version-macros.h", "include/libdex-1/dex-version.h", "include/libdex-1/libdex.h"]
  [steps.when]
    os = ["darwin"]
