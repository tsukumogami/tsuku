[metadata]
  name = "libgit2"
  description = "C library of Git core methods that is re-entrant and linkable"
  homepage = "https://libgit2.org/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["libssh2"]
  tier = 0
  type = ""
  llm_validation = "skipped"
supported_os = ["linux"]

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libgit2"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libgit2"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/git2"]

[verify]
  command = "git2 --version"
  pattern = ""
