[metadata]
  name = "libtool"
  description = "Generic library support script"
  homepage = "https://www.gnu.org/software/libtool/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["m4"]
  tier = 0
  type = ""
  llm_validation = "skipped"
supported_os = ["linux"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libtool"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/glibtool", "bin/glibtoolize", "bin/libtool", "bin/libtoolize"]

[verify]
  command = "glibtool --version"
  pattern = ""
