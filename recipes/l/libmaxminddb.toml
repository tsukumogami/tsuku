[metadata]
  name = "libmaxminddb"
  description = "C library for the MaxMind DB file format"
  homepage = "https://github.com/maxmind/libmaxminddb"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libmaxminddb"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/mmdblookup"]

[verify]
  command = "mmdblookup --version"
  pattern = ""
