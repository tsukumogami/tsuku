[metadata]
  name = "libdeflate"
  description = "Heavily optimized DEFLATE/zlib/gzip compression and decompression"
  homepage = "https://github.com/ebiggers/libdeflate"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libdeflate"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/libdeflate-gunzip"]

[verify]
  command = "libdeflate-gunzip --version"
  pattern = ""
