[metadata]
  name = "libxlsxwriter"
  description = "C library for creating Excel XLSX files"
  homepage = "https://libxlsxwriter.github.io/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libxlsxwriter"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
