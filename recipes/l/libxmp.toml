[metadata]
  name = "libxmp"
  description = "C library for playback of module music (MOD, S3M, IT, etc)"
  homepage = "https://xmp.sourceforge.net/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libxmp"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libxmp"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libxmp.so", "lib/libxmp.so.4", "lib/libxmp.so.4.7.0", "lib/pkgconfig/libxmp.pc", "include/xmp.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libxmp"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libxmp.4.dylib", "lib/libxmp.dylib", "lib/pkgconfig/libxmp.pc", "include/xmp.h"]
  [steps.when]
    os = ["darwin"]
