[metadata]
  name = "libptytty"
  description = "Library for OS-independent pseudo-TTY management"
  homepage = "https://software.schmorp.de/pkg/libptytty.html"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libptytty"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libptytty"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libptytty.so", "lib/libptytty.so.0", "lib/pkgconfig/libptytty.pc", "include/libptytty.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libptytty"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libptytty.0.dylib", "lib/libptytty.dylib", "lib/pkgconfig/libptytty.pc", "include/libptytty.h"]
  [steps.when]
    os = ["darwin"]
