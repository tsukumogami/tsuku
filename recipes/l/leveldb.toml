[metadata]
  name = "leveldb"
  description = "Key-value storage library with ordered mapping"
  homepage = "https://github.com/google/leveldb/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["snappy"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
