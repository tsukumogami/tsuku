[metadata]
name = "libnghttp3"
description = "HTTP/3 library written in C"
homepage = "https://nghttp2.org/nghttp3/"
type = "library"
curated = true

[metadata.satisfies]
homebrew = ["libnghttp3", "nghttp3"]

# glibc Linux: Homebrew bottle.
[[steps]]
action = "homebrew"
formula = "libnghttp3"
when = { os = ["linux"], libc = ["glibc"] }

[[steps]]
action = "install_binaries"
install_mode = "directory"
outputs = [
    "lib/libnghttp3.so",
    "lib/libnghttp3.so.9",
    "lib/libnghttp3.a",
    "lib/pkgconfig/libnghttp3.pc",
    "include/nghttp3/nghttp3.h",
    "include/nghttp3/version.h",
]
when = { os = ["linux"], libc = ["glibc"] }

# musl Linux: Alpine package.
[[steps]]
action = "apk_install"
packages = ["nghttp3-dev"]
when = { os = ["linux"], libc = ["musl"] }

# macOS: Homebrew bottle. Provides libnghttp3.9.dylib referenced by the curl bottle.
[[steps]]
action = "homebrew"
formula = "libnghttp3"
when = { os = ["darwin"] }

[[steps]]
action = "install_binaries"
install_mode = "directory"
outputs = [
    "lib/libnghttp3.dylib",
    "lib/libnghttp3.9.dylib",
    "lib/libnghttp3.a",
    "lib/pkgconfig/libnghttp3.pc",
    "include/nghttp3/nghttp3.h",
    "include/nghttp3/version.h",
]
when = { os = ["darwin"] }
