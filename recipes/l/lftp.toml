[metadata]
  name = "lftp"
  description = "Sophisticated file transfer program"
  homepage = "https://lftp.yar.ru/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = [
    "gettext",
    "libidn2",
    "openssl",
    "readline",
  ]
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "lftp"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/lftp", "bin/lftpget"]

[verify]
  command = "lftp --version"
  pattern = ""
