[metadata]
  name = "libepoxy"
  description = "Library for handling OpenGL function pointer management"
  homepage = "https://github.com/anholt/libepoxy"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libepoxy"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libepoxy.so", "lib/libepoxy.so.0", "lib/libepoxy.so.0.0.0", "lib/pkgconfig/epoxy.pc", "include/epoxy/common.h", "include/epoxy/egl.h", "include/epoxy/egl_generated.h", "include/epoxy/gl.h", "include/epoxy/gl_generated.h", "include/epoxy/glx.h", "include/epoxy/glx_generated.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libepoxy"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libepoxy.0.dylib", "lib/libepoxy.dylib", "lib/pkgconfig/epoxy.pc", "include/epoxy/common.h", "include/epoxy/gl.h", "include/epoxy/gl_generated.h"]
  [steps.when]
    os = ["darwin"]
