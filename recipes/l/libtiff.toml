[metadata]
  name = "libtiff"
  description = "TIFF library and utilities"
  homepage = "https://libtiff.gitlab.io/libtiff/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["jpeg-turbo", "xz", "zstd"]
  # macOS: verification failure
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libtiff"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/fax2ps", "bin/fax2tiff", "bin/pal2rgb", "bin/ppm2tiff", "bin/raw2tiff", "bin/tiff2bw", "bin/tiff2pdf", "bin/tiff2ps", "bin/tiff2rgba", "bin/tiffcmp", "bin/tiffcp", "bin/tiffcrop", "bin/tiffdither", "bin/tiffdump", "bin/tiffinfo", "bin/tiffmedian", "bin/tiffset", "bin/tiffsplit"]

[verify]
  command = "fax2ps --version"
  pattern = ""
