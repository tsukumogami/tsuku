# Source-built libcurl for sandbox testing (no LDAP, minimal dependencies)
# Replaces Homebrew-bottled libcurl which fails in Debian containers due to
# OPENLDAP_2.200 vs OPENLDAP_2.5 symbol version mismatch.
# Tests: download + extract + setup_build_env + configure_make for library builds

[metadata]
name = "libcurl-source"
description = "Multi-protocol file transfer library (source build for testing)"
homepage = "https://curl.se/libcurl/"
type = "library"
dependencies = ["openssl", "zlib"]

[version]
source = "homebrew"
formula = "curl"

[[steps]]
action = "download"
url = "https://curl.se/download/curl-{version}.tar.gz"
signature_url = "https://curl.se/download/curl-{version}.tar.gz.asc"
signature_key_url = "https://daniel.haxx.se/mykey.asc"
signature_key_fingerprint = "27EDEAF22F3ABCEB50DB9A125CC908FDB71E12C2"

[[steps]]
action = "extract"
archive = "curl-{version}.tar.gz"
format = "tar.gz"

[[steps]]
action = "setup_build_env"

[[steps]]
action = "configure_make"
source_dir = "curl-{version}"
configure_args = [
    "--with-openssl",
    "--with-zlib",
    "--disable-ldap",
    "--disable-ldaps",
    "--without-libpsl",
    "--without-brotli",
    "--without-nghttp2",
    "--without-nghttp3",
    "--without-ngtcp2",
    "--without-libssh2",
    "--without-libidn2",
    "--without-zstd",
    "--disable-silent-rules",
    "--enable-shared",
    "--enable-static",
]

[[steps]]
action = "install_binaries"
install_mode = "directory"
outputs = [
    "bin/curl-config",
    "lib/libcurl.so",
    "lib/libcurl.so.4",
    "lib/libcurl.a",
    "lib/pkgconfig/libcurl.pc",
    "include/curl/curl.h",
    "include/curl/curlver.h",
    "include/curl/easy.h",
    "include/curl/multi.h",
    "include/curl/urlapi.h",
]

[verify]
command = "curl-config --version"
pattern = "libcurl {version}"
