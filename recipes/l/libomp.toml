[metadata]
  name = "libomp"
  description = "LLVM's OpenMP runtime library"
  homepage = "https://openmp.llvm.org/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libomp"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libomp"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libarcher.so", "lib/libarcher_static.a", "lib/libomp.a", "lib/libomp.so", "lib/libompd.so", "include/omp-tools.h", "include/omp.h", "include/ompt-multiplex.h", "include/ompt.h", "include/ompx.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libomp"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libomp.a", "lib/libomp.dylib", "include/omp-tools.h", "include/omp.h", "include/ompt.h", "include/ompx.h"]
  [steps.when]
    os = ["darwin"]
