[metadata]
  name = "libpipeline"
  description = "C library for manipulating pipelines of subprocesses"
  homepage = "https://libpipeline.gitlab.io/libpipeline/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libpipeline"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libpipeline.so", "lib/libpipeline.so.1", "lib/libpipeline.so.1.5.8", "lib/pkgconfig/libpipeline.pc", "include/pipeline.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libpipeline"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libpipeline.1.dylib", "lib/libpipeline.dylib", "lib/pkgconfig/libpipeline.pc", "include/pipeline.h"]
  [steps.when]
    os = ["darwin"]
