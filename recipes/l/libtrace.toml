[metadata]
  name = "libtrace"
  description = "Library for trace processing supporting multiple inputs"
  homepage = "https://github.com/LibtraceTeam/libtrace"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["openssl"]
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libtrace"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/traceconvert", "bin/tracediff", "bin/traceends", "bin/tracefilter", "bin/tracemcast", "bin/tracemerge", "bin/tracepktdump", "bin/tracereplay", "bin/tracereport", "bin/tracertstats", "bin/tracesplit", "bin/tracesplit_dir", "bin/tracestats", "bin/tracesummary", "bin/tracetop", "bin/tracetopends", "bin/traceucast"]

[verify]
  command = "traceconvert --version"
  pattern = ""
