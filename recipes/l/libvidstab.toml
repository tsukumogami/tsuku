[metadata]
  name = "libvidstab"
  description = "Transcode video stabilization plugin"
  homepage = "https://github.com/georgmartius/vid.stab"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libvidstab"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libvidstab.so", "lib/libvidstab.so.1.2", "lib/pkgconfig/vidstab.pc", "include/vid.stab/boxblur.h", "include/vid.stab/frameinfo.h", "include/vid.stab/libvidstab.h", "include/vid.stab/localmotion2transform.h", "include/vid.stab/motiondetect.h", "include/vid.stab/motiondetect_internal.h", "include/vid.stab/motiondetect_opt.h", "include/vid.stab/serialize.h", "include/vid.stab/transform.h", "include/vid.stab/transform_internal.h", "include/vid.stab/transformfixedpoint.h", "include/vid.stab/transformfloat.h", "include/vid.stab/transformtype.h", "include/vid.stab/transformtype_operations.h", "include/vid.stab/vidstabdefines.h", "include/vid.stab/vsvector.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libvidstab"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libvidstab.1.2.dylib", "lib/libvidstab.dylib", "lib/pkgconfig/vidstab.pc", "include/vid.stab/boxblur.h", "include/vid.stab/frameinfo.h", "include/vid.stab/libvidstab.h", "include/vid.stab/localmotion2transform.h", "include/vid.stab/motiondetect.h", "include/vid.stab/motiondetect_internal.h", "include/vid.stab/motiondetect_opt.h", "include/vid.stab/serialize.h", "include/vid.stab/transform.h", "include/vid.stab/transform_internal.h", "include/vid.stab/transformfixedpoint.h", "include/vid.stab/transformfloat.h", "include/vid.stab/transformtype.h", "include/vid.stab/transformtype_operations.h", "include/vid.stab/vidstabdefines.h", "include/vid.stab/vsvector.h"]
  [steps.when]
    os = ["darwin"]
