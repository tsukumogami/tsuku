[metadata]
  name = "libcbor"
  description = "CBOR protocol implementation for C and others"
  homepage = "https://github.com/PJK/libcbor"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libcbor"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libcbor"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libcbor.so", "lib/libcbor.so.0.13", "lib/libcbor.so.0.13.0", "lib/pkgconfig/libcbor.pc", "include/cbor/arrays.h", "include/cbor/bytestrings.h", "include/cbor/callbacks.h", "include/cbor/cbor_export.h", "include/cbor/common.h", "include/cbor/configuration.h", "include/cbor/data.h", "include/cbor/encoding.h", "include/cbor/floats_ctrls.h", "include/cbor/internal/builder_callbacks.h", "include/cbor/internal/encoders.h", "include/cbor/internal/loaders.h", "include/cbor/internal/memory_utils.h", "include/cbor/internal/stack.h", "include/cbor/internal/unicode.h", "include/cbor/ints.h", "include/cbor/maps.h", "include/cbor/serialization.h", "include/cbor/streaming.h", "include/cbor/strings.h", "include/cbor/tags.h", "include/cbor.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libcbor"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libcbor.0.13.0.dylib", "lib/libcbor.0.13.dylib", "lib/libcbor.dylib", "lib/pkgconfig/libcbor.pc", "include/cbor/arrays.h", "include/cbor/bytestrings.h", "include/cbor/callbacks.h", "include/cbor/cbor_export.h", "include/cbor/common.h", "include/cbor/configuration.h", "include/cbor/data.h", "include/cbor/encoding.h", "include/cbor/floats_ctrls.h", "include/cbor/internal/builder_callbacks.h", "include/cbor/internal/encoders.h", "include/cbor/internal/loaders.h", "include/cbor/internal/memory_utils.h", "include/cbor/internal/stack.h", "include/cbor/internal/unicode.h", "include/cbor/ints.h", "include/cbor/maps.h", "include/cbor/serialization.h", "include/cbor/streaming.h", "include/cbor/strings.h", "include/cbor/tags.h", "include/cbor.h"]
  [steps.when]
    os = ["darwin"]
