[metadata]
  name = "libconfig"
  description = "Configuration file processing library"
  homepage = "https://hyperrealm.github.io/libconfig/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libconfig"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libconfig++.a", "lib/libconfig++.so", "lib/libconfig++.so.15", "lib/libconfig++.so.15.0.0", "lib/libconfig.a", "lib/libconfig.so", "lib/libconfig.so.15", "lib/libconfig.so.15.0.0", "lib/pkgconfig/libconfig++.pc", "lib/pkgconfig/libconfig.pc", "include/libconfig.h", "include/libconfig.h++"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libconfig"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libconfig++.15.dylib", "lib/libconfig++.a", "lib/libconfig++.dylib", "lib/libconfig.15.dylib", "lib/libconfig.a", "lib/libconfig.dylib", "lib/pkgconfig/libconfig++.pc", "lib/pkgconfig/libconfig.pc", "include/libconfig.h", "include/libconfig.h++"]
  [steps.when]
    os = ["darwin"]
