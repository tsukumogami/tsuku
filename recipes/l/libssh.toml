[metadata]
  name = "libssh"
  description = "C library SSHv1/SSHv2 client and server protocols"
  homepage = "https://www.libssh.org/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["openssl"]
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libssh"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libssh"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libssh.a", "lib/libssh.so", "lib/libssh.so.4", "lib/libssh.so.4.11.0", "lib/pkgconfig/libssh.pc", "include/libssh/callbacks.h", "include/libssh/legacy.h", "include/libssh/libssh.h", "include/libssh/libssh_version.h", "include/libssh/libsshpp.hpp", "include/libssh/server.h", "include/libssh/sftp.h", "include/libssh/sftpserver.h", "include/libssh/ssh2.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libssh"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libssh.4.11.0.dylib", "lib/libssh.4.dylib", "lib/libssh.a", "lib/libssh.dylib", "lib/pkgconfig/libssh.pc", "include/libssh/callbacks.h", "include/libssh/legacy.h", "include/libssh/libssh.h", "include/libssh/libssh_version.h", "include/libssh/libsshpp.hpp", "include/libssh/server.h", "include/libssh/sftp.h", "include/libssh/sftpserver.h", "include/libssh/ssh2.h"]
  [steps.when]
    os = ["darwin"]
