[metadata]
  name = "libjodycode"
  description = "Shared code used by several utilities written by Jody Bruchon"
  homepage = "https://codeberg.org/jbruchon/libjodycode"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libjodycode"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libjodycode"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libjodycode.a", "lib/libjodycode.so", "lib/libjodycode.so.4", "lib/libjodycode.so.4.1.2", "include/libjodycode.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libjodycode"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libjodycode.4.1.2.dylib", "lib/libjodycode.4.dylib", "lib/libjodycode.a", "lib/libjodycode.dylib", "include/libjodycode.h"]
  [steps.when]
    os = ["darwin"]
