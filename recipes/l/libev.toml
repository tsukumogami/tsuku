[metadata]
  name = "libev"
  description = "Asynchronous event library"
  homepage = "https://software.schmorp.de/pkg/libev.html"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libev"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libev"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libev.a", "lib/libev.so", "lib/libev.so.4", "lib/libev.so.4.0.0", "include/ev++.h", "include/ev.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libev"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libev.4.dylib", "lib/libev.a", "lib/libev.dylib", "include/ev++.h", "include/ev.h"]
  [steps.when]
    os = ["darwin"]
