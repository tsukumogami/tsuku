[metadata]
  name = "libusb"
  description = "Library for USB device access"
  homepage = "https://libusb.info/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libusb"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libusb-1.0.a", "lib/libusb-1.0.so", "lib/libusb-1.0.so.0", "lib/libusb-1.0.so.0.5.0", "lib/pkgconfig/libusb-1.0.pc", "include/libusb-1.0/libusb.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libusb"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libusb-1.0.0.dylib", "lib/libusb-1.0.a", "lib/libusb-1.0.dylib", "lib/pkgconfig/libusb-1.0.pc", "include/libusb-1.0/libusb.h"]
  [steps.when]
    os = ["darwin"]
