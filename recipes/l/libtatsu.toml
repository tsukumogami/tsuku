[metadata]
  name = "libtatsu"
  description = "Library handling the communication with Apple's Tatsu Signing Server (TSS)"
  homepage = "https://libimobiledevice.org/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["libplist"]
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libtatsu"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libtatsu"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libtatsu.a", "lib/libtatsu.so", "lib/libtatsu.so.0", "lib/libtatsu.so.0.0.3", "lib/pkgconfig/libtatsu-1.0.pc", "include/libtatsu/tatsu.h", "include/libtatsu/tss.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libtatsu"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libtatsu.0.dylib", "lib/libtatsu.a", "lib/libtatsu.dylib", "lib/pkgconfig/libtatsu-1.0.pc", "include/libtatsu/tatsu.h", "include/libtatsu/tss.h"]
  [steps.when]
    os = ["darwin"]
