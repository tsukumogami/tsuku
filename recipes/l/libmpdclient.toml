[metadata]
  name = "libmpdclient"
  description = "Library for MPD in the C, C++, and Objective-C languages"
  homepage = "https://www.musicpd.org/libs/libmpdclient/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libmpdclient"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
