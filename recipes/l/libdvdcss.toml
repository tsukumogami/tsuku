[metadata]
  name = "libdvdcss"
  description = "Access DVDs as block devices without the decryption"
  homepage = "https://www.videolan.org/developers/libdvdcss.html"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libdvdcss"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libdvdcss.a", "lib/libdvdcss.so", "lib/libdvdcss.so.2", "lib/libdvdcss.so.2.3.0", "lib/pkgconfig/libdvdcss.pc", "include/dvdcss/dvdcpxm.h", "include/dvdcss/dvdcss.h", "include/dvdcss/version.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libdvdcss"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libdvdcss.2.dylib", "lib/libdvdcss.a", "lib/libdvdcss.dylib", "lib/pkgconfig/libdvdcss.pc", "include/dvdcss/dvdcpxm.h", "include/dvdcss/dvdcss.h", "include/dvdcss/version.h"]
  [steps.when]
    os = ["darwin"]
