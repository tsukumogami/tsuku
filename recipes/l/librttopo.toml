[metadata]
  name = "librttopo"
  description = "RT Topology Library"
  homepage = "https://git.osgeo.org/gitea/rttopo/librttopo"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["geos"]
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "librttopo"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "librttopo"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/librttopo.a", "lib/librttopo.so", "lib/librttopo.so.1", "lib/librttopo.so.1.1.0", "lib/pkgconfig/rttopo.pc", "include/librttopo.h", "include/librttopo_geom.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "librttopo"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/librttopo.1.dylib", "lib/librttopo.a", "lib/librttopo.dylib", "lib/pkgconfig/rttopo.pc", "include/librttopo.h", "include/librttopo_geom.h"]
  [steps.when]
    os = ["darwin"]
