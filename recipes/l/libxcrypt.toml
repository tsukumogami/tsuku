[metadata]
  name = "libxcrypt"
  description = "Extended crypt library for descrypt, md5crypt, bcrypt, and others"
  homepage = "https://github.com/besser82/libxcrypt"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "libxcrypt"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "libxcrypt"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libcrypt.so", "lib/libcrypt.so.2", "lib/libcrypt.so.2.0.0", "lib/pkgconfig/libcrypt.pc", "lib/pkgconfig/libxcrypt.pc", "include/crypt.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "libxcrypt"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libcrypt.2.dylib", "lib/libcrypt.dylib", "lib/pkgconfig/libcrypt.pc", "lib/pkgconfig/libxcrypt.pc", "include/crypt.h"]
  [steps.when]
    os = ["darwin"]
