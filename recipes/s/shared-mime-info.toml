[metadata]
  name = "shared-mime-info"
  description = "Database of common MIME types"
  homepage = "https://wiki.freedesktop.org/www/Software/shared-mime-info"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["glib"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "shared-mime-info"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/update-mime-database"]

[verify]
  command = "update-mime-database --version"
  pattern = ""
