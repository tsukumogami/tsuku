[metadata]
name = "syft"
description = "SBOM generation tool"
homepage = "https://github.com/anchore/syft"
version_format = "semver"
curated = true

# Linux: statically linked Go binary works on glibc and musl
[[steps]]
action = "github_archive"
when = { os = ["linux"], libc = ["glibc", "musl"] }
repo = "anchore/syft"
asset_pattern = "syft_{version}_linux_{arch}.tar.gz"
strip_dirs = 0
binaries = ["syft"]

# macOS: Intel and Apple Silicon binaries
[[steps]]
action = "github_archive"
when = { os = ["darwin"] }
repo = "anchore/syft"
asset_pattern = "syft_{version}_darwin_{arch}.tar.gz"
strip_dirs = 0
binaries = ["syft"]

[verify]
command = "syft version"
pattern = "{version}"
