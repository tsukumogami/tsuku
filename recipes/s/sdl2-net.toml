[metadata]
  name = "sdl2-net"
  description = "Small sample cross-platform networking library"
  homepage = "https://github.com/libsdl-org/SDL_net"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["sdl2"]
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "sdl2_net"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libSDL2_net-2.0.so.0", "lib/libSDL2_net-2.0.so.0.200.0", "lib/libSDL2_net.a", "lib/libSDL2_net.so", "lib/pkgconfig/SDL2_net.pc", "include/SDL2/SDL_net.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "sdl2_net"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libSDL2_net-2.0.0.dylib", "lib/libSDL2_net.a", "lib/libSDL2_net.dylib", "lib/pkgconfig/SDL2_net.pc", "include/SDL2/SDL_net.h"]
  [steps.when]
    os = ["darwin"]
