[metadata]
  name = "sonobuoy"
  description = "Kubernetes component that generates reports on cluster conformance"
  homepage = "https://sonobuoy.io/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "sonobuoy"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/sonobuoy"]

[verify]
  command = "sonobuoy --version"
  pattern = ""
