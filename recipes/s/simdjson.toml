[metadata]
  name = "simdjson"
  description = "SIMD-accelerated C++ JSON parser"
  homepage = "https://simdjson.org"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = "library"
  llm_validation = "skipped"

[version]
  source = "homebrew"
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = "simdjson"
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "simdjson"
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libsimdjson.so", "lib/libsimdjson.so.30", "lib/libsimdjson.so.30.0.0", "lib/libsimdjson_static.a", "lib/pkgconfig/simdjson.pc", "include/simdjson.h"]
  [steps.when]
    libc = ["glibc"]
    os = ["linux"]

[[steps]]
  action = "homebrew"
  formula = "simdjson"
  [steps.when]
    os = ["darwin"]

[[steps]]
  action = "install_binaries"
  install_mode = "directory"
  outputs = ["lib/libsimdjson.30.0.0.dylib", "lib/libsimdjson.30.dylib", "lib/libsimdjson.dylib", "lib/libsimdjson_static.a", "lib/pkgconfig/simdjson.pc", "include/simdjson.h"]
  [steps.when]
    os = ["darwin"]
