[metadata]
  name = "solargraph"
  description = "IDE tools for code completion, inline documentation, and static analysis"
  homepage = "https://solargraph.org"
  version_format = "semver"
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["linux/amd64", "linux/arm64", "darwin/arm64"]

[[steps]]
  action = "gem_install"
  executables = ["solargraph"]
  gem = "solargraph"

[verify]
  command = "{install_dir}/bin/solargraph --version"
  pattern = ""
