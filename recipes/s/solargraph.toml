[metadata]
  name = "solargraph"
  description = "IDE tools for code completion, inline documentation, and static analysis"
  homepage = "https://solargraph.org"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
unsupported_platforms = ["linux/arm64", "linux/debian", "linux/rhel", "linux/arch/amd64", "linux/suse", "linux/alpine", "darwin/arm64"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "gem_install"
  executables = ["solargraph"]
  gem = "solargraph"

[verify]
  command = "solargraph --version"
  pattern = ""
