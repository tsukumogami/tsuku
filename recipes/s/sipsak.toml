[metadata]
  name = "sipsak"
  description = "SIP Swiss army knife"
  homepage = "https://github.com/nils-ohlmeier/sipsak/"
  version_format = ""
  requires_sudo = false
  tier = 0
  type = ""
  llm_validation = "skipped"
  unsupported_platforms = ["darwin/arm64", "darwin/amd64", "linux/arm64"]
  runtime_dependencies = ["openssl"]

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "sipsak"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/sipsak"]

[verify]
  command = "sipsak --version"
  pattern = ""
