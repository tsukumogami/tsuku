[metadata]
  name = "srt"
  description = "Secure Reliable Transport"
  homepage = "https://www.srtalliance.org/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["openssl"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "srt"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/srt-ffplay", "bin/srt-file-transmit", "bin/srt-live-transmit", "bin/srt-tunnel"]

[verify]
  command = "srt-ffplay --version"
  pattern = ""
