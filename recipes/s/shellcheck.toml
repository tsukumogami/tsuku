[metadata]
  name = "shellcheck"
  description = "Static analysis and lint tool, for (ba)sh scripts"
  homepage = "https://www.shellcheck.net/"
  version_format = ""
  requires_sudo = false
  runtime_dependencies = ["gmp"]
  tier = 0
  type = ""
  llm_validation = "skipped"

[version]
  source = ""
  github_repo = ""
  tag_prefix = ""
  module = ""
  formula = ""
  cask = ""
  tap = ""
  fossil_repo = ""
  project_name = ""
  version_separator = ""
  timeline_tag = ""

[[steps]]
  action = "homebrew"
  formula = "shellcheck"

[[steps]]
  action = "install_binaries"
  binaries = ["bin/shellcheck"]

[verify]
  command = "shellcheck --version"
  pattern = ""
