<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Pipeline Dashboard v2: observability enhancements -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="tsuku batch pipeline status dashboard">
    <title>Pipeline Dashboard - tsuku</title>
    <link rel="stylesheet" href="/assets/style.css">
    <style>
        /* Dashboard-specific styles */
        .dashboard-header {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .panels {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .panel {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .panel h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .status-bars {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .queue-summary {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .queue-summary-stat {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
        }

        .queue-summary-detail {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .queue-actionable {
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .queue-action-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
        }

        .queue-action-item:hover {
            color: var(--accent);
        }

        .queue-action-count {
            font-weight: 600;
            font-family: "SF Mono", Consolas, monospace;
            color: var(--text);
        }

        .queue-action-item:hover .queue-action-count {
            color: var(--accent);
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            border-radius: 4px;
            padding: 0.25rem;
            margin: -0.25rem;
            transition: background 0.15s ease;
        }

        .status-row:hover {
            background: var(--bg);
        }

        .status-label {
            width: 80px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-bar-container {
            flex: 1;
            height: 20px;
            background: var(--bg);
            border-radius: 4px;
            overflow: hidden;
        }

        .status-bar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .status-bar.pending { background: var(--text-muted); }
        .status-bar.failed { background: #f85149; }
        .status-bar.requires_manual { background: #bc8cff; }
        .status-bar.blocked { background: #d29922; }
        .status-bar.success { background: #3fb950; }

        .status-count {
            width: 60px;
            text-align: right;
            font-size: 0.85rem;
            font-family: "SF Mono", Consolas, monospace;
        }

        .blocker-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .blocker-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }

        .blocker-item:last-child {
            border-bottom: none;
        }

        .blocker-name {
            font-family: "SF Mono", Consolas, monospace;
            font-size: 0.9rem;
        }

        .blocker-count {
            background: var(--bg);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .run-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .run-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .run-id {
            font-family: "SF Mono", Consolas, monospace;
            color: var(--text-muted);
        }

        .run-rate {
            font-weight: 600;
        }

        .run-rate.good { color: #3fb950; }
        .run-rate.medium { color: #d29922; }
        .run-rate.bad { color: #f85149; }

        .no-data {
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            padding: 1rem;
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 3rem 2rem;
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .raw-data-links {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .raw-data-links a {
            color: var(--accent);
            margin: 0 0.5rem;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .panel-header h2 {
            margin-bottom: 0;
        }

        .panel-header .view-all {
            font-size: 0.8rem;
            color: var(--accent);
            text-decoration: none;
        }

        .panel-header .view-all:hover {
            text-decoration: underline;
        }

        .health-grid {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 0.5rem 1rem;
            align-items: center;
            font-size: 0.85rem;
        }

        .health-label {
            color: var(--text-muted);
            font-weight: 600;
        }

        .health-value a {
            color: var(--accent);
            text-decoration: none;
        }

        .health-value a:hover {
            text-decoration: underline;
        }

        .breaker-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #000;
        }

        .breaker-closed { background: #3fb950; }
        .breaker-open { background: #f85149; color: #fff; }
        .breaker-half-open { background: #d29922; }

        .eco-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .eco-badge-link {
            text-decoration: none;
        }

        .breaker-summary {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.75rem;
        }

        .breaker-summary .count-highlight {
            font-weight: 600;
            color: #f85149;
        }

        .eco-widgets-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            grid-column: 1 / -1;
        }

        @media (max-width: 800px) {
            .eco-widgets-row {
                grid-template-columns: 1fr;
            }
        }

        .eco-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .eco-table th,
        .eco-table td {
            text-align: left;
            padding: 0.4rem 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .eco-table th {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .eco-table tr:last-child td {
            border-bottom: none;
        }

        .eco-table tbody tr {
            transition: background 0.15s ease;
        }

        .eco-table a {
            color: inherit;
            text-decoration: none;
        }

        .eco-table tbody tr:hover {
            background: var(--bg);
        }

        .eco-table .eco-name {
            font-family: "SF Mono", Consolas, monospace;
        }

        .eco-table .eco-count {
            text-align: right;
            font-family: "SF Mono", Consolas, monospace;
        }

        .eco-table .recovery-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .eco-clickable-row {
            cursor: pointer;
        }

        .mini-progress {
            display: flex;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            background: var(--bg);
            min-width: 80px;
        }

        .mini-progress .seg-success { background: #3fb950; }
        .mini-progress .seg-pending { background: var(--text-muted); }
        .mini-progress .seg-failed { background: #f85149; }
        .mini-progress .seg-blocked { background: #d29922; }
        .mini-progress .seg-requires_manual { background: #bc8cff; }

        .health-warning {
            background: #d29922;
            color: #000;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 0.75rem;
        }

        .failures-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .failures-table th,
        .failures-table td {
            text-align: left;
            padding: 0.4rem 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .failures-table th {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .failures-table tr:last-child td {
            border-bottom: none;
        }

        .failures-table tbody tr {
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .failures-table tbody tr:hover {
            background: var(--bg);
        }

        .failures-table a {
            color: inherit;
            text-decoration: none;
        }

        .failures-table .pkg-name {
            font-family: "SF Mono", Consolas, monospace;
        }

        .failures-table .time-ago {
            color: var(--text-muted);
        }

        .subcategory-indent {
            padding-left: 1.5rem;
            font-size: 0.8rem;
        }

        .curated-stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .curated-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
        }

        .curated-stat .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .curated-stat .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .curated-stat .stat-valid { color: #3fb950; }
        .curated-stat .stat-invalid { color: #f85149; }

        .invalid-badge {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            background: #f85149;
            color: #fff;
            margin-left: 0.25rem;
            vertical-align: middle;
        }

        .run-ecosystem {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: 0.25rem;
        }

        .run-item-detail {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }

        .run-item-detail:last-child {
            border-bottom: none;
        }

        .run-item-detail a {
            color: inherit;
            text-decoration: none;
        }

        .run-item-detail a:hover {
            background: var(--bg);
        }

        .run-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .run-datetime {
            font-size: 0.85rem;
        }

        .run-date {
            font-weight: 600;
        }

        .run-time {
            color: var(--text-muted);
            margin-left: 0.35rem;
        }

        .run-stats {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.85rem;
        }

        .run-duration {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .run-bottom-row {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            flex-wrap: wrap;
        }

        .run-eco-badge {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            font-size: 0.7rem;
            background: var(--bg);
            color: var(--text-muted);
            font-family: "SF Mono", Consolas, monospace;
            text-decoration: none;
            cursor: pointer;
        }

        .run-eco-badge:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .failures-table .pkg-link {
            color: var(--accent);
            text-decoration: none;
        }

        .failures-table .pkg-link:hover {
            text-decoration: underline;
        }

        .failures-table .timestamp-et {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: block;
        }

        .panel-wide {
            grid-column: span 2;
        }

        @media (max-width: 600px) {
            .panels {
                grid-template-columns: 1fr;
            }
            .panel-wide {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">tsuku</a>
            <a href="https://github.com/tsukumogami/tsuku" class="github-link" aria-label="GitHub">
                <svg viewBox="0 0 16 16" width="24" height="24" fill="currentColor">

                </svg>
            </a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Pipeline Dashboard</h1>
            <p class="tagline">Batch recipe generation status</p>
        </section>

        <div id="dashboard-content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading dashboard...</p>
            </div>
        </div>

        <section class="links">
            <a href="/" class="link-btn">Back to Home</a>
        </section>
    </main>

    <footer>
        <p>
            <a href="/telemetry">Privacy</a>
            <span class="sep">|</span>
            <a href="https://github.com/tsukumogami/tsuku">GitHub</a>
        </p>
    </footer>

    <script>
        function esc(s) {
            if (s == null) return '';
            const div = document.createElement('div');
            div.textContent = String(s);
            return div.innerHTML;
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                timeZone: 'America/New_York',
                timeZoneName: 'short'
            });
        }

        function formatDateShort(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                timeZone: 'America/New_York'
            });
        }

        function formatPercent(rate) {
            return (rate * 100).toFixed(0) + '%';
        }

        function rateClass(rate) {
            if (rate >= 0.7) return 'good';
            if (rate >= 0.4) return 'medium';
            return 'bad';
        }

        function timeAgo(isoString) {
            if (!isoString) return '';
            const now = Date.now();
            const then = new Date(isoString).getTime();
            const diffMs = now - then;
            if (diffMs < 0) return 'just now';
            const minutes = Math.floor(diffMs / 60000);
            if (minutes < 1) return 'just now';
            if (minutes < 60) return minutes + 'm ago';
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return hours + 'h ago';
            const days = Math.floor(hours / 24);
            return days + 'd ago';
        }

        function renderByTier(byTier) {
            if (!byTier || Object.keys(byTier).length === 0) return '';
            const tiers = Object.keys(byTier).sort();
            const statusCols = ['pending', 'failed', 'success', 'requires_manual', 'blocked'];
            const rows = tiers.map(tier => {
                const counts = byTier[tier];
                const total = statusCols.reduce((sum, s) => sum + (counts[s] || 0), 0);
                const cells = statusCols.map(s => '<td style="text-align: right; font-family: \'SF Mono\', Consolas, monospace; font-size: 0.8rem;">' + (counts[s] || 0) + '</td>').join('');
                return '<tr><td style="font-weight: 600;">P' + esc(tier) + '</td>' + cells + '<td style="text-align: right; font-family: \'SF Mono\', Consolas, monospace; font-size: 0.8rem;">' + total + '</td></tr>';
            }).join('');
            return '<div style="margin-top: 1rem;"><table class="eco-table"><thead><tr><th>Tier</th><th style="text-align: right;">Pend</th><th style="text-align: right;">Fail</th><th style="text-align: right;">OK</th><th style="text-align: right;">Manual</th><th style="text-align: right;">Block</th><th style="text-align: right;">Total</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
        }

        function renderDashboard(data) {
            const container = document.getElementById('dashboard-content');
            const total = data.queue.total || 1;

            // Render Pipeline Health panel (pipeline-level only, no per-ecosystem badges)
            let healthPanel = '';
            const health = data.health;
            if (health) {
                // Last run info
                let lastRunHtml = '<span class="health-value" style="color: var(--text-muted);">N/A</span>';
                if (health.last_run) {
                    const lr = health.last_run;
                    const lrText = `${esc(timeAgo(lr.timestamp))} - ${esc(lr.succeeded)}/${esc(lr.total)} succeeded`;
                    if (lr.total) {
                        lastRunHtml = `<span class="health-value"><a href="/pipeline/run.html?id=${encodeURIComponent(lr.batch_id)}">${lrText}</a></span>`;
                    } else {
                        lastRunHtml = `<span class="health-value">${lrText}</span>`;
                    }
                }

                // Last success info
                let lastSuccessHtml = '<span class="health-value" style="color: var(--text-muted);">N/A</span>';
                if (health.last_successful_run) {
                    const ls = health.last_successful_run;
                    const lsText = `${esc(timeAgo(ls.timestamp))} - ${esc(ls.recipes_merged || 0)} merged`;
                    if (ls.total) {
                        lastSuccessHtml = `<span class="health-value"><a href="/pipeline/run.html?id=${encodeURIComponent(ls.batch_id)}">${lsText}</a></span>`;
                    } else {
                        lastSuccessHtml = `<span class="health-value">${lsText}</span>`;
                    }
                }

                // Runs since last success (no ecosystem context from pipeline level)
                let runsSinceHtml = `<span class="health-value"><a href="/pipeline/runs.html?since_success=true">${esc(health.runs_since_last_success)} runs</a></span>`;

                // Warning if last run was more than 2 hours ago
                let warningHtml = '';
                if (health.last_run && health.last_run.timestamp) {
                    const hoursSinceRun = Math.floor((Date.now() - new Date(health.last_run.timestamp).getTime()) / 3600000);
                    if (hoursSinceRun > 2) {
                        warningHtml = `<div class="health-warning">No run in ${esc(hoursSinceRun)} hours</div>`;
                    }
                }

                // Breaker summary: count of open/half-open ecosystems
                let breakerSummaryHtml = '';
                const ecoEntries = Object.entries(health.ecosystems || {});
                if (ecoEntries.length > 0) {
                    const openCount = ecoEntries.filter(([, info]) => info.breaker_state === 'open').length;
                    const halfOpenCount = ecoEntries.filter(([, info]) => info.breaker_state === 'half-open').length;
                    const unhealthy = openCount + halfOpenCount;
                    if (unhealthy > 0) {
                        const parts = [];
                        if (openCount > 0) parts.push(`${openCount} open`);
                        if (halfOpenCount > 0) parts.push(`${halfOpenCount} half-open`);
                        breakerSummaryHtml = `<div class="breaker-summary"><span class="count-highlight">${unhealthy}</span> of ${ecoEntries.length} breakers unhealthy (${parts.join(', ')})</div>`;
                    } else {
                        breakerSummaryHtml = `<div class="breaker-summary">All ${ecoEntries.length} breakers closed</div>`;
                    }
                }

                healthPanel = `
                    <div class="panel panel-wide">
                        <h2>Pipeline Health</h2>
                        <div class="health-grid">
                            <span class="health-label">Last Run</span>
                            ${lastRunHtml}
                            <span class="health-label">Last Success</span>
                            ${lastSuccessHtml}
                            <span class="health-label">Runs Since</span>
                            ${runsSinceHtml}
                        </div>
                        ${breakerSummaryHtml}
                        ${warningHtml}
                    </div>
                `;
            } else {
                healthPanel = `
                    <div class="panel panel-wide">
                        <h2>Pipeline Health</h2>
                        <div class="no-data">No health data available</div>
                    </div>
                `;
            }

            // Render Ecosystem Health widget (circuit breaker details per ecosystem)
            let ecoHealthPanel = '';
            if (health && health.ecosystems) {
                const ecoEntries = Object.entries(health.ecosystems);
                if (ecoEntries.length > 0) {
                    const ecoRows = ecoEntries
                        .sort(([a], [b]) => a.localeCompare(b))
                        .map(([eco, info]) => {
                            const state = info.breaker_state || 'unknown';
                            let badgeClass = 'breaker-closed';
                            if (state === 'open') badgeClass = 'breaker-open';
                            else if (state === 'half-open') badgeClass = 'breaker-half-open';

                            const failureCount = info.failures || 0;
                            const lastFailure = info.last_failure ? timeAgo(info.last_failure) : '-';

                            // Time until recovery for open breakers
                            let recoveryHtml = '-';
                            if (state === 'open' && info.opens_at) {
                                const opensAt = new Date(info.opens_at).getTime();
                                const now = Date.now();
                                const diffMs = opensAt - now;
                                if (diffMs > 0) {
                                    const mins = Math.ceil(diffMs / 60000);
                                    if (mins >= 60) {
                                        const hrs = Math.floor(mins / 60);
                                        const remainMins = mins % 60;
                                        recoveryHtml = `<span class="recovery-time">${hrs}h ${remainMins}m</span>`;
                                    } else {
                                        recoveryHtml = `<span class="recovery-time">${mins}m</span>`;
                                    }
                                } else {
                                    recoveryHtml = `<span class="recovery-time">due now</span>`;
                                }
                            }

                            return `
                                <tr class="eco-clickable-row" onclick="location.href='/pipeline/failures.html?ecosystem=${encodeURIComponent(eco)}'">
                                    <td><a href="/pipeline/failures.html?ecosystem=${encodeURIComponent(eco)}"><span class="eco-name">${esc(eco)}</span></a></td>
                                    <td><span class="breaker-badge ${badgeClass}">${esc(state)}</span></td>
                                    <td class="eco-count">${esc(failureCount)}</td>
                                    <td>${esc(lastFailure)}</td>
                                    <td>${recoveryHtml}</td>
                                </tr>
                            `;
                        }).join('');

                    ecoHealthPanel = `
                        <div class="panel panel-wide">
                            <h2>Ecosystem Health</h2>
                            <table class="eco-table">
                                <thead>
                                    <tr>
                                        <th>Ecosystem</th>
                                        <th>Breaker</th>
                                        <th style="text-align: right;">Failures</th>
                                        <th>Last Failure</th>
                                        <th>Recovery</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${ecoRows}
                                </tbody>
                            </table>
                        </div>
                    `;
                } else {
                    ecoHealthPanel = `
                        <div class="panel panel-wide">
                            <h2>Ecosystem Health</h2>
                            <div class="no-data">No ecosystem data available</div>
                        </div>
                    `;
                }
            } else {
                ecoHealthPanel = `
                    <div class="panel panel-wide">
                        <h2>Ecosystem Health</h2>
                        <div class="no-data">No ecosystem data available</div>
                    </div>
                `;
            }

            // Render Ecosystem Pipeline widget (per-ecosystem queue counts)
            let ecoPipelinePanel = '';
            const byEcosystem = data.queue && data.queue.by_ecosystem;
            if (byEcosystem && Object.keys(byEcosystem).length > 0) {
                const statusCols = ['pending', 'failed', 'success', 'blocked', 'requires_manual'];
                const ecoRows = Object.entries(byEcosystem)
                    .sort(([a], [b]) => a.localeCompare(b))
                    .map(([eco, counts]) => {
                        const ecoTotal = counts.total || statusCols.reduce((sum, s) => sum + (counts[s] || 0), 0);
                        const cells = statusCols.map(s => `<td class="eco-count">${counts[s] || 0}</td>`).join('');

                        // Mini progress bar segments
                        const barTotal = ecoTotal || 1;
                        const segments = statusCols
                            .map(s => {
                                const pct = ((counts[s] || 0) / barTotal * 100).toFixed(1);
                                return pct > 0 ? `<div class="seg-${s}" style="width: ${pct}%"></div>` : '';
                            }).join('');

                        return `
                            <tr class="eco-clickable-row" onclick="location.href='/pipeline/pending.html?ecosystem=${encodeURIComponent(eco)}'">
                                <td><a href="/pipeline/pending.html?ecosystem=${encodeURIComponent(eco)}"><span class="eco-name">${esc(eco)}</span></a></td>
                                <td class="eco-count">${esc(ecoTotal)}</td>
                                ${cells}
                                <td><div class="mini-progress">${segments}</div></td>
                            </tr>
                        `;
                    }).join('');

                ecoPipelinePanel = `
                    <div class="panel panel-wide">
                        <h2>Ecosystem Pipeline</h2>
                        <table class="eco-table">
                            <thead>
                                <tr>
                                    <th>Ecosystem</th>
                                    <th style="text-align: right;">Total</th>
                                    <th style="text-align: right;">Pend</th>
                                    <th style="text-align: right;">Fail</th>
                                    <th style="text-align: right;">OK</th>
                                    <th style="text-align: right;">Block</th>
                                    <th style="text-align: right;">Manual</th>
                                    <th>Progress</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${ecoRows}
                            </tbody>
                        </table>
                    </div>
                `;
            } else {
                ecoPipelinePanel = `
                    <div class="panel panel-wide">
                        <h2>Ecosystem Pipeline</h2>
                        <div class="no-data">No per-ecosystem data available</div>
                    </div>
                `;
            }

            // Calculate status percentages
            const successCount = data.queue.by_status.success || 0;
            const successPct = (successCount / total * 100).toFixed(1);
            const failedCount = data.queue.by_status.failed || 0;
            const manualCount = data.queue.by_status.requires_manual || 0;

            const statusOrder = ['pending', 'success', 'failed', 'requires_manual', 'blocked'];
            const statusDisplayLabel = { requires_manual: 'manual' };
            const statusPageMap = { failed: 'failures.html?status=failed' };
            const statusBars = statusOrder.map(status => {
                const count = data.queue.by_status[status] || 0;
                const pct = (count / total * 100).toFixed(1);
                const label = statusDisplayLabel[status] || status;
                const href = statusPageMap[status]
                    ? '/pipeline/' + statusPageMap[status]
                    : '/pipeline/' + status + '.html';
                return `
                    <a href="${href}" class="status-row">
                        <span class="status-label">${label}</span>
                        <div class="status-bar-container">
                            <div class="status-bar ${status}" style="width: ${pct}%"></div>
                        </div>
                        <span class="status-count">${count}</span>
                    </a>
                `;
            }).join('');

            // Render blockers (clickable, link to blocked.html with filter)
            const blockerItems = (data.blockers || []).slice(0, 10).map(b => `
                <a href="/pipeline/blocked.html?blocker=${encodeURIComponent(b.dependency)}" class="status-row">
                    <span class="blocker-name">${esc(b.dependency)}</span>
                    <span class="blocker-count" title="${esc(b.direct_count)} direct">
                        ${esc(b.total_count)} blocked
                    </span>
                </a>
            `).join('') || '<div class="no-data">No blocking dependencies</div>';

            // Render failure categories from current queue (not historical)
            const failedPackages = data.queue.packages?.failed || [];
            const failuresByCategory = {};
            failedPackages.forEach(pkg => {
                const cat = pkg.category || 'unknown';
                failuresByCategory[cat] = (failuresByCategory[cat] || 0) + 1;
            });

            // Build subcategory breakdown from failure_details
            const failureDetails = data.failure_details || [];
            const subcatByCategory = {};
            failureDetails.forEach(fd => {
                const cat = fd.category || 'unknown';
                if (!subcatByCategory[cat]) subcatByCategory[cat] = {};
                if (fd.subcategory) {
                    subcatByCategory[cat][fd.subcategory] = (subcatByCategory[cat][fd.subcategory] || 0) + 1;
                }
            });

            const failureItems = Object.entries(failuresByCategory)
                .sort((a, b) => b[1] - a[1])
                .map(([cat, count]) => {
                    let subcatHtml = '';
                    const subcats = subcatByCategory[cat];
                    if (subcats) {
                        subcatHtml = Object.entries(subcats)
                            .sort((a, b) => b[1] - a[1])
                            .map(([subcat, subcount]) => `
                                <a href="/pipeline/failures.html?category=${encodeURIComponent(cat)}&subcategory=${encodeURIComponent(subcat)}" class="status-row subcategory-indent">
                                    <span class="blocker-name" style="font-size: 0.8rem;">${esc(subcat)}</span>
                                    <span class="blocker-count">${subcount}</span>
                                </a>
                            `).join('');
                    }
                    return `
                        <a href="/pipeline/failures.html?category=${encodeURIComponent(cat)}" class="status-row">
                            <span class="blocker-name">${esc(cat)}</span>
                            <span class="blocker-count">${count}</span>
                        </a>
                        ${subcatHtml}
                    `;
                }).join('') || '<div class="no-data">No current failures</div>';

            // Render recent runs (clickable, link to run.html?id=)
            const runItems = (data.runs || []).slice(0, 10).map(run => {
                // Format timestamp in ET, split into date and time
                let dateHtml = '';
                if (run.timestamp) {
                    const d = new Date(run.timestamp);
                    const datePart = d.toLocaleDateString('en-US', {
                        month: 'short', day: 'numeric',
                        timeZone: 'America/New_York'
                    });
                    const timePart = d.toLocaleTimeString('en-US', {
                        hour: '2-digit', minute: '2-digit',
                        timeZone: 'America/New_York'
                    });
                    dateHtml = `<span class="run-date">${esc(datePart)}</span><span class="run-time">${esc(timePart)} ET</span>`;
                } else {
                    dateHtml = `<span class="run-id">${esc(run.batch_id)}</span>`;
                }

                // Ecosystem badges from run.ecosystems object
                let ecoBadgesHtml = '';
                if (run.ecosystems && typeof run.ecosystems === 'object') {
                    const badges = Object.entries(run.ecosystems)
                        .sort(([, a], [, b]) => b - a)
                        .map(([eco, count]) => `<a href="/pipeline/runs.html?ecosystem=${encodeURIComponent(eco)}" class="run-eco-badge" onclick="event.stopPropagation(); event.preventDefault(); location.href=this.href;">${esc(eco)} ${esc(count)}</a>`)
                        .join('');
                    ecoBadgesHtml = badges;
                }

                // Duration
                let durationHtml = '';
                if (run.duration != null) {
                    durationHtml = `<span class="run-duration">${esc(run.duration)}m</span>`;
                }

                return `
                <div class="run-item-detail">
                    <a href="/pipeline/run.html?id=${encodeURIComponent(run.batch_id)}">
                        <div class="run-top-row">
                            <span class="run-datetime">${dateHtml}</span>
                            <span class="run-stats">
                                <span class="run-rate ${rateClass(run.rate)}">${esc(run.merged)}/${esc(run.total)} (${esc(formatPercent(run.rate))})</span>
                                ${durationHtml}
                            </span>
                        </div>
                        ${ecoBadgesHtml ? `<div class="run-bottom-row">${ecoBadgesHtml}</div>` : ''}
                    </a>
                </div>
            `}).join('') || '<div class="no-data">No batch runs recorded yet</div>';

            // Render Recent Failures panel
            let recentFailuresPanel = '';
            if (failureDetails.length > 0) {
                const recentFive = failureDetails.slice(0, 5);
                const failureRows = recentFive.map(fd => {
                    // Category display: prefer subcategory when available
                    const categoryDisplay = fd.subcategory
                        ? esc(fd.subcategory)
                        : esc(fd.category);

                    // Ecosystem badge
                    const ecoHtml = fd.ecosystem
                        ? `<span class="run-eco-badge">${esc(fd.ecosystem)}</span>`
                        : '';

                    // Package name as clickable link to package.html
                    const pkgHtml = `<a href="/pipeline/package.html?id=${encodeURIComponent(fd.package)}" class="pkg-link"><span class="pkg-name">${esc(fd.package)}</span></a>`;

                    // Time: relative time-ago plus absolute ET timestamp
                    const timeAgoStr = timeAgo(fd.timestamp);
                    const absTime = fd.timestamp ? formatDateShort(fd.timestamp) + ' ET' : '';

                    return `
                    <tr onclick="location.href='/pipeline/failure.html?id=${encodeURIComponent(fd.id)}'">
                        <td>${pkgHtml}</td>
                        <td>${ecoHtml}</td>
                        <td><a href="/pipeline/failure.html?id=${encodeURIComponent(fd.id)}">${categoryDisplay}</a></td>
                        <td><a href="/pipeline/failure.html?id=${encodeURIComponent(fd.id)}"><span class="time-ago">${esc(timeAgoStr)}</span><span class="timestamp-et">${esc(absTime)}</span></a></td>
                    </tr>
                `}).join('');
                recentFailuresPanel = `
                    <div class="panel panel-wide">
                        <div class="panel-header">
                            <h2>Recent Failures</h2>
                            <a href="/pipeline/failures.html" class="view-all">View all</a>
                        </div>
                        <table class="failures-table">
                            <thead>
                                <tr>
                                    <th>Package</th>
                                    <th>Ecosystem</th>
                                    <th>Category</th>
                                    <th>Time</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${failureRows}
                            </tbody>
                        </table>
                    </div>
                `;
            } else {
                recentFailuresPanel = `
                    <div class="panel panel-wide">
                        <div class="panel-header">
                            <h2>Recent Failures</h2>
                            <a href="/pipeline/failures.html" class="view-all">View all</a>
                        </div>
                        <div class="no-data">No recent failures</div>
                    </div>
                `;
            }

            // Render Curated Overrides panel
            let curatedPanel = '';
            const curated = data.curated || [];
            if (curated.length > 0) {
                const totalCount = curated.length;
                const invalidCount = curated.filter(c => c.validation_status === 'invalid').length;
                const validCount = curated.filter(c => c.validation_status === 'valid').length;
                const invalidBadge = invalidCount > 0 ? `<span class="invalid-badge">${invalidCount} invalid</span>` : '';
                curatedPanel = `
                    <div class="panel panel-wide">
                        <h2><a href="/pipeline/curated.html" style="color: inherit; text-decoration: none;">Curated Overrides</a> ${invalidBadge}</h2>
                        <div class="curated-stats">
                            <a href="/pipeline/curated.html" class="curated-stat" style="text-decoration: none; color: inherit;">
                                <span class="stat-value">${totalCount}</span>
                                <span class="stat-label">Total</span>
                            </a>
                            <a href="/pipeline/curated.html?status=valid" class="curated-stat" style="text-decoration: none; color: inherit;">
                                <span class="stat-value stat-valid">${validCount}</span>
                                <span class="stat-label">Valid</span>
                            </a>
                            <a href="/pipeline/curated.html?status=invalid" class="curated-stat" style="text-decoration: none; color: inherit;">
                                <span class="stat-value ${invalidCount > 0 ? 'stat-invalid' : ''}">${invalidCount}</span>
                                <span class="stat-label">Invalid</span>
                            </a>
                        </div>
                    </div>
                `;
            } else {
                curatedPanel = `
                    <div class="panel panel-wide">
                        <h2>Curated Overrides</h2>
                        <div class="no-data">No curated overrides</div>
                    </div>
                `;
            }

            // Render disambiguation stats
            let disambiguationPanel = '';
            if (data.disambiguations && data.disambiguations.total > 0) {
                const d = data.disambiguations;
                const reasonItems = Object.entries(d.by_reason || {})
                    .sort((a, b) => b[1] - a[1])
                    .map(([reason, count]) => `
                        <a href="/pipeline/disambiguations.html?reason=${encodeURIComponent(reason)}" class="status-row">
                            <span class="blocker-name">${esc(reason)}</span>
                            <span class="blocker-count">${count}</span>
                        </a>
                    `).join('');

                const reviewItems = (d.need_review || []).slice(0, 5).map(tool => `
                    <div class="blocker-item">
                        <a href="/pipeline/disambiguations.html?status=needs_review" class="blocker-name" style="color: var(--accent); text-decoration: none;">${esc(tool)}</a>
                        <span class="blocker-count" style="background: #d29922; color: white;">review</span>
                    </div>
                `).join('');

                disambiguationPanel = `
                    <div class="panel">
                        <h2><a href="/pipeline/disambiguations.html" style="color: inherit; text-decoration: none;">Disambiguation (${d.total} tools)</a></h2>
                        <div class="blocker-list">
                            ${reasonItems}
                            ${d.high_risk > 0 ? `<a href="/pipeline/disambiguations.html?reason=priority_fallback" class="status-row" style="border-top: 2px solid var(--border); padding-top: 0.75rem;">
                                <span class="blocker-name" style="color: #d29922;">High-risk</span>
                                <span class="blocker-count" style="background: #d29922; color: white;">${d.high_risk}</span>
                            </a>` : ''}
                        </div>
                        ${reviewItems ? `<h3 style="font-size: 0.9rem; margin-top: 1rem; margin-bottom: 0.5rem; color: var(--text-muted);">Needs Review</h3><div class="blocker-list">${reviewItems}</div>` : ''}
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="dashboard-header">
                    <span>Updated ${esc(formatDate(data.generated_at))}</span>
                </div>

                <div class="panels">
                    ${healthPanel}

                    <div class="eco-widgets-row">
                        ${ecoHealthPanel}
                        ${ecoPipelinePanel}
                    </div>

                    <div class="panel">
                        <h2>Queue Status (${data.queue.total} packages)</h2>
                        <div class="queue-summary">
                            <span class="queue-summary-stat">${successPct}% complete</span>
                            <span class="queue-summary-detail">${successCount} of ${data.queue.total} packages</span>
                        </div>
                        <div class="status-bars">
                            ${statusBars}
                        </div>
                        ${renderByTier(data.queue.by_tier)}
                        <div class="queue-actionable">
                            <a href="/pipeline/failures.html?status=failed" class="queue-action-item">
                                <span class="queue-action-count">${failedCount}</span> need investigation
                            </a>
                            <a href="/pipeline/requires_manual.html" class="queue-action-item">
                                <span class="queue-action-count">${manualCount}</span> need manual review
                            </a>
                        </div>
                    </div>

                    <div class="panel">
                        <div class="panel-header">
                            <h2>Recent Runs</h2>
                            <a href="/pipeline/runs.html" class="view-all">View all</a>
                        </div>
                        <div class="run-list">
                            ${runItems}
                        </div>
                    </div>

                    <div class="panel panel-wide">
                        <div class="panel-header">
                            <h2>Failure Categories</h2>
                            <a href="/pipeline/failures.html" class="view-all">View all</a>
                        </div>
                        <div class="blocker-list">
                            ${failureItems}
                        </div>
                    </div>

                    ${recentFailuresPanel}

                    <div class="panel${disambiguationPanel ? '' : ' panel-wide'}" id="blockers">
                        <h2>Top Blockers</h2>
                        <div class="blocker-list">
                            ${blockerItems}
                        </div>
                    </div>

                    ${disambiguationPanel}

                    ${curatedPanel}
                </div>

                <div class="raw-data-links">
                    Raw data:
                    <a href="https://github.com/tsukumogami/tsuku/blob/main/data/queues/priority-queue.json">queue</a>
                    <a href="https://github.com/tsukumogami/tsuku/tree/main/data/failures">failures</a>
                    <a href="https://github.com/tsukumogami/tsuku/blob/main/data/metrics/batch-runs.jsonl">metrics</a>
                </div>
            `;
        }

        function renderError(message) {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = `
                <div class="error">
                    <h3>Unable to load dashboard</h3>
                    <p>${esc(message)}</p>
                    <button class="retry-btn" onclick="loadDashboard()">Retry</button>
                </div>
            `;
        }

        async function loadDashboard() {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading dashboard...</p>
                </div>
            `;

            try {
                const response = await fetch('/pipeline/dashboard.json');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                renderError(error.message);
            }
        }

        // Load on page load
        loadDashboard();
    </script>
</body>
</html>
