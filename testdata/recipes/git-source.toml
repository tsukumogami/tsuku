# Ground truth recipe for git (source build with complex dependencies)
# Used for testing configure_make action with multiple library dependencies
# Tests: download + extract + setup_build_env + configure_make with libcurl, openssl, zlib, expat

[metadata]
name = "git-source"
description = "Distributed revision control system (source build for testing)"
homepage = "https://git-scm.com/"
# libcurl-source is built from source with --disable-ldap to avoid OPENLDAP
# symbol version mismatch in Debian sandbox containers.
# NO_TCLTK skips gitk/git-gui (need msgfmt in container).
dependencies = ["libcurl-source", "openssl", "zlib", "expat"]

[version]
source = "homebrew"
formula = "git"

[[steps]]
action = "download"
url = "https://mirrors.edge.kernel.org/pub/software/scm/git/git-{version}.tar.xz"

[[steps]]
action = "extract"
archive = "git-{version}.tar.xz"
format = "tar.xz"

[[steps]]
action = "setup_build_env"

[[steps]]
action = "configure_make"
source_dir = "git-{version}"
executables = ["git"]
skip_configure = true
make_args = [
    "RUNTIME_PREFIX=YesPlease",
    "gitexecdir=libexec/git-core",
    "NO_GETTEXT=YesPlease",
    "NO_TCLTK=YesPlease",
    "NO_CURL=",
    "CURLDIR={libs_dir}/libcurl-source-{deps.libcurl-source.version}",
    "CURL_LIBCURL=-L{libs_dir}/libcurl-source-{deps.libcurl-source.version}/lib -lcurl",
]

[[steps]]
action = "install_binaries"
install_mode = "directory"
outputs = ["bin/git"]

[verify]
command = "git --version"
pattern = "git version {version}"
