# Bash - Bourne Again SHell
# Official site: https://www.gnu.org/software/bash/
# NOTE: Embedded as a dependency for recipes that need bash (e.g., Rust installer on Alpine)

[metadata]
name = "bash"
description = "Bourne Again SHell"
homepage = "https://www.gnu.org/software/bash/"
binaries = ["bin/bash"]
supported_os = ["linux"]

[version]
source = "homebrew"
formula = "bash"

# glibc Linux: Homebrew bottles
[[steps]]
action = "homebrew"
formula = "bash"
when = { os = ["linux"], libc = ["glibc"] }

[[steps]]
action = "install_binaries"
install_mode = "directory"
outputs = ["bin/bash"]
when = { os = ["linux"], libc = ["glibc"] }

# musl Linux: System packages
[[steps]]
action = "apk_install"
packages = ["bash"]
when = { os = ["linux"], libc = ["musl"] }

[verify]
command = "bash --version"
pattern = "GNU bash, version {version}"
