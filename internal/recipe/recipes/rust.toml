# Rust - Systems programming language
# Official site: https://www.rust-lang.org/
# NOTE: Uses GitHub for version detection, downloads from static.rust-lang.org

[metadata]
name = "rust"
description = "Rust programming language toolchain (execution dependency for cargo-based tools)"
homepage = "https://www.rust-lang.org/"
version_format = "semver"

[version]
github_repo = "rust-lang/rust"  # Detect version from GitHub releases

# glibc Linux: Download pre-built binaries from static.rust-lang.org
[[steps]]
action = "download"
url = "https://static.rust-lang.org/dist/rust-{version}-{arch}-{os}.tar.gz"
checksum_url = "https://static.rust-lang.org/dist/rust-{version}-{arch}-{os}.tar.gz.sha256"
os_mapping = { linux = "unknown-linux-gnu" }
arch_mapping = { amd64 = "x86_64", arm64 = "aarch64" }
when = { os = ["linux"], libc = ["glibc"] }

[[steps]]
action = "extract"
archive = "rust-{version}-{arch}-{os}.tar.gz"
format = "tar.gz"
strip_dirs = 1
os_mapping = { linux = "unknown-linux-gnu" }
arch_mapping = { amd64 = "x86_64", arm64 = "aarch64" }
when = { os = ["linux"], libc = ["glibc"] }

[[steps]]
action = "run_command"
command = "./install.sh --prefix={install_dir} --disable-ldconfig"
description = "Running Rust installer to set up toolchain"
when = { os = ["linux"], libc = ["glibc"] }

[[steps]]
action = "install_binaries"
outputs = ["bin/cargo", "bin/rustc", "bin/rustdoc", "bin/rustfmt", "bin/cargo-clippy", "bin/clippy-driver", "bin/rust-analyzer"]
install_mode = "directory"
when = { os = ["linux"], libc = ["glibc"] }

# Alpine/musl Linux: Download musl-linked binaries from static.rust-lang.org
[[steps]]
action = "download"
url = "https://static.rust-lang.org/dist/rust-{version}-{arch}-{os}.tar.gz"
checksum_url = "https://static.rust-lang.org/dist/rust-{version}-{arch}-{os}.tar.gz.sha256"
os_mapping = { linux = "unknown-linux-musl" }
arch_mapping = { amd64 = "x86_64", arm64 = "aarch64" }
when = { os = ["linux"], linux_family = "alpine" }

[[steps]]
action = "extract"
archive = "rust-{version}-{arch}-{os}.tar.gz"
format = "tar.gz"
strip_dirs = 1
os_mapping = { linux = "unknown-linux-musl" }
arch_mapping = { amd64 = "x86_64", arm64 = "aarch64" }
when = { os = ["linux"], linux_family = "alpine" }

[[steps]]
action = "run_command"
command = "./install.sh --prefix={install_dir} --disable-ldconfig"
