when = { os = ["linux"], linux_family = "alpine" }

[[steps]]
action = "install_binaries"
outputs = ["bin/cargo", "bin/rustc", "bin/rustdoc", "bin/rustfmt", "bin/cargo-clippy", "bin/clippy-driver", "bin/rust-analyzer"]
install_mode = "directory"
when = { os = ["linux"], linux_family = "alpine" }

# macOS: Download pre-built binaries from static.rust-lang.org
[[steps]]
action = "download"
url = "https://static.rust-lang.org/dist/rust-{version}-{arch}-{os}.tar.gz"
checksum_url = "https://static.rust-lang.org/dist/rust-{version}-{arch}-{os}.tar.gz.sha256"
os_mapping = { darwin = "apple-darwin" }
arch_mapping = { amd64 = "x86_64", arm64 = "aarch64" }
when = { os = ["darwin"] }

[[steps]]
action = "extract"
archive = "rust-{version}-{arch}-{os}.tar.gz"
format = "tar.gz"
strip_dirs = 1
os_mapping = { darwin = "apple-darwin" }
arch_mapping = { amd64 = "x86_64", arm64 = "aarch64" }
when = { os = ["darwin"] }

[[steps]]
action = "run_command"
command = "./install.sh --prefix={install_dir} --disable-ldconfig"
description = "Running Rust installer to set up toolchain"
when = { os = ["darwin"] }

[[steps]]
action = "install_binaries"
outputs = ["bin/cargo", "bin/rustc", "bin/rustdoc", "bin/rustfmt", "bin/cargo-clippy", "bin/clippy-driver", "bin/rust-analyzer"]
install_mode = "directory"
when = { os = ["darwin"] }

[verify]
command = "cargo --version"
pattern = "cargo {version}"
