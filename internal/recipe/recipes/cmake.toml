[metadata]
name = "cmake"
description = "Cross-platform build system"
homepage = "https://cmake.org"
version_format = "semver"
curated = true

[version]
github_repo = "Kitware/CMake"
tag_prefix = "v"

# Linux glibc: platform-specific tarballs with SHA-256 verification
[[steps]]
action = "download"
url = "https://github.com/Kitware/CMake/releases/download/v{version}/cmake-{version}-linux-{arch}.tar.gz"
checksum_url = "https://github.com/Kitware/CMake/releases/download/v{version}/cmake-{version}-SHA-256.txt"
arch_mapping = { amd64 = "x86_64", arm64 = "aarch64" }
when = { os = ["linux"], libc = ["glibc"] }

[[steps]]
action = "extract"
archive = "cmake-{version}-linux-{arch}.tar.gz"
format = "tar.gz"
strip_dirs = 1
arch_mapping = { amd64 = "x86_64", arm64 = "aarch64" }
when = { os = ["linux"], libc = ["glibc"] }

# Linux musl: system package (prebuilt binaries are glibc-linked)
[[steps]]
action = "apk_install"
packages = ["cmake", "cmake-extras"]
when = { os = ["linux"], libc = ["musl"] }

# macOS: universal binary (Intel + Apple Silicon) with SHA-256 verification
[[steps]]
action = "download"
url = "https://github.com/Kitware/CMake/releases/download/v{version}/cmake-{version}-macos-universal.tar.gz"
checksum_url = "https://github.com/Kitware/CMake/releases/download/v{version}/cmake-{version}-SHA-256.txt"
when = { os = ["darwin"] }

# macOS tarballs nest binaries three levels deep:
# cmake-{version}-macos-universal/CMake.app/Contents/bin/cmake
# strip_dirs=3 lands bin/ at the root of the work directory.
[[steps]]
action = "extract"
archive = "cmake-{version}-macos-universal.tar.gz"
format = "tar.gz"
strip_dirs = 3
when = { os = ["darwin"] }

[[steps]]
action = "install_binaries"
binaries = ["bin/cmake", "bin/ctest", "bin/cpack"]
install_mode = "directory"

[verify]
command = "cmake --version"
mode = "output"
reason = "Alpine musl installs cmake via apk at a different version than the GitHub release; output mode verifies availability across all platforms"
